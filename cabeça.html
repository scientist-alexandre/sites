<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Anime Face Rig Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --accent: #ff69b4;
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --text: #ffffff;
            --input-bg: #2a2a2a;
            --timeline-h: 180px;
            --sidebar-w: 480px;
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
        }

        .app-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        #canvas-container { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #222 0%, #000 100%);
            padding: 20px;
            position: relative;
        }
        canvas { 
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 100%;
            max-height: 100%;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            height: 100%;
            padding: 25px;
            box-shadow: -2px 0 15px rgba(0,0,0,0.5);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        h2 { color: var(--accent); font-size: 18px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 0; }
        
        details { background: #151515; border-radius: 5px; margin-bottom: 8px; border: 1px solid #333; }
        summary { cursor: pointer; padding: 10px; font-weight: bold; color: var(--accent); list-style: none; font-size: 12px; text-transform: uppercase; }
        summary:hover { background: #252525; }
        summary::before { content: '▶ '; font-size: 10px; }
        details[open] summary::before { content: '▼ '; }

        .controls-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 10px;
            border-top: 1px solid #222;
        }

        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: 500; color: #ccc; }
        
        input[type="range"] { 
            width: 100%; 
            accent-color: var(--accent);
            cursor: pointer;
            background: var(--input-bg);
            height: 6px;
            border-radius: 5px;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: white; border-radius: 50%; cursor: pointer; }

        .timeline-container {
            height: var(--timeline-h);
            background: #111;
            border-top: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-reset:hover { filter: brightness(1.2); transform: translateY(-2px); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-main">
        <div id="canvas-container"></div>

        <div class="sidebar">
            <h2>Anime Rig 360°</h2>
            
            <div class="sidebar-content" id="rig-controls"></div>

            <p id="counter" style="font-size: 10px; color: #666; text-align: center; margin-top: 10px;"></p>
            <button class="btn-reset" onclick="resetSliders()">Resetar Expressão</button>
        </div>
    </div>

    <div class="timeline-container">
        Timeline / Keyframes Workspace
    </div>

<script>
    const FW = 1920, FH = 1080;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111); 
    const camera = new THREE.PerspectiveCamera(35, FW / FH, 1, 10000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    
    const canvasContainer = document.getElementById('canvas-container');
    canvasContainer.appendChild(renderer.domElement);
    camera.position.z = 2500; // Recuado para compensar o FOV e dar volume

    let faceGroup = new THREE.Group();
    faceGroup.scale.set(0.85, 0.85, 0.85); 
    scene.add(faceGroup);

    function createHighResTexture(drawFn, w = 2048, h = 2048) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        drawFn(ctx, w, h);
        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        return tex;
    }

    const skinColor = '#ffdbac';
    const lineStroke = '#3a251b';
    const hairColor = '#46b3b3'; 
    const hairShadow = '#2d7a7a';
    const hairHigh = '#a0e6e6';

    // 1. Rosto / Pele Base Sinuosa Loomis
    const faceMat = new THREE.MeshBasicMaterial({ 
        map: createHighResTexture((ctx, w, h) => {
            const cx = w/2, cy = h/2;

            // Sombra do pescoço
            ctx.fillStyle = '#d1a38a';
            ctx.beginPath();
            ctx.arc(cx, cy - 100, 540, Math.PI, 0);
            ctx.bezierCurveTo(cx + 540, cy + 150, cx + 400, cy + 550, cx, cy + 650);
            ctx.bezierCurveTo(cx - 400, cy + 550, cx - 540, cy + 150, cx - 540, cy - 100);
            ctx.closePath();
            ctx.fill();

            // Orelhas Anatômicas Perfeitamente Simétricas
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.ellipse(cx - 510, cy + 80, 80, 160, -Math.PI/15, 0, Math.PI*2);
            ctx.ellipse(cx + 510, cy + 80, 80, 160, Math.PI/15, 0, Math.PI*2);
            ctx.fill();

            // Rosto principal - Formato Bulma
            ctx.fillStyle = skinColor;
            ctx.beginPath();
            ctx.arc(cx, cy - 150, 520, Math.PI, 0);
            ctx.bezierCurveTo(cx + 520, cy + 50, cx + 500, cy + 280, cx + 380, cy + 450); 
            ctx.bezierCurveTo(cx + 250, cy + 580, cx + 120, cy + 620, cx, cy + 630);    
            ctx.bezierCurveTo(cx - 120, cy + 620, cx - 250, cy + 580, cx - 380, cy + 450);
            ctx.bezierCurveTo(cx - 500, cy + 280, cx - 520, cy + 50, cx - 520, cy - 150);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = '#3a251b22';
            ctx.lineWidth = 10;
            ctx.stroke();
        }, 2048, 2048),
        transparent: true, side: THREE.DoubleSide, depthTest: false, depthWrite: false,
        stencilWrite: true, stencilRef: 1, stencilFunc: THREE.AlwaysStencilFunc, stencilZPass: THREE.ReplaceStencilOp
    });
    const faceGeo = new THREE.PlaneGeometry(1400, 1600, 32, 32);
    const faceMesh = new THREE.Mesh(faceGeo, faceMat);
    faceMesh.renderOrder = 1; 
    faceGroup.add(faceMesh);
    const faceOrigV = new Float32Array(faceGeo.attributes.position.array);

    // Cabelo Traseiro Cobertura Total 360°
    const hairBackMat = new THREE.MeshBasicMaterial({
        map: createHighResTexture((ctx, w, h) => {
            const cx = w/2, cy = h/2;
            
            // Fundo Sombreado
            ctx.fillStyle = hairShadow;
            ctx.beginPath();
            ctx.arc(cx, cy - 200, 650, Math.PI, 0);
            ctx.lineTo(cx + 650, cy + 720);         
            ctx.lineTo(cx - 650, cy + 720);
            ctx.closePath();
            ctx.fill();

            // Camada Principal
            ctx.fillStyle = hairColor;
            ctx.beginPath();
            ctx.arc(cx, cy - 200, 620, Math.PI, 0); 
            ctx.lineTo(cx + 620, cy + 700);         
            ctx.lineTo(cx - 620, cy + 700);
            ctx.closePath();
            ctx.fill();

            // Brilho superior
            ctx.fillStyle = hairHigh;
            ctx.beginPath();
            ctx.ellipse(cx, cy - 620, 280, 40, 0, 0, Math.PI * 2);
            ctx.fill();
        }, 2048, 2048),
        transparent: true, side: THREE.DoubleSide, depthTest: false, depthWrite: false
    });
    const hairBack = new THREE.Mesh(new THREE.PlaneGeometry(1600, 1800), hairBackMat);
    hairBack.position.z = -10; 
    hairBack.renderOrder = 0; 
    hairBack.frustumCulled = false;
    faceGroup.add(hairBack);

    // 2. RECUPERAÇÃO DOS OLHOS ORIGINAIS (Preservados integralmente)
    function createEyeCanvas() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024; canvas.height = 1024;
        return canvas;
    }

    const eyeCanvasL = createEyeCanvas();
    const eyeCanvasR = createEyeCanvas();
    const eyeTexL = new THREE.CanvasTexture(eyeCanvasL);
    const eyeTexR = new THREE.CanvasTexture(eyeCanvasR);

    function updateEyeTexture(canvas, tex, isOpen, irisX = 0, irisY = 0, pupilScale = 1.0, squint = 0, wide = 0) {
        const ctx = canvas.getContext('2d');
        const w = 1024, h = 1024;
        const cx = w/2, cy = h/2;
        ctx.clearRect(0, 0, w, h);
        
        const upperY = (wide * -40) + (squint * 30);
        const lowerY = (squint * -70);

        if (isOpen > 0.1) {
            const scleraPath = new Path2D();
            scleraPath.moveTo(cx - 280, cy - 120 + upperY); 
            scleraPath.quadraticCurveTo(cx - 20, cy - 380 + upperY, cx + 260, cy - 160 + upperY);
            scleraPath.lineTo(cx + 190, cy + 205 + lowerY);
            scleraPath.quadraticCurveTo(cx, cy + 270 + lowerY, cx - 190, cy + 205 + lowerY);
            scleraPath.closePath();
            
            ctx.fillStyle = 'white';
            ctx.fill(scleraPath);

            ctx.save();
            ctx.clip(scleraPath);

            const ix = cx + irisX * 2.2;
            const iy = cy - irisY * 2.2;
            
            ctx.save();
            ctx.beginPath();
            ctx.arc(ix, iy, 160 * pupilScale, 0, Math.PI * 2);
            ctx.clip();

            // Seus tons Castanho/Mel originais restaurados
            const grad = ctx.createLinearGradient(ix, iy - 200, ix, iy + 200);
            grad.addColorStop(0, '#2a1a12'); 
            grad.addColorStop(1, '#8b4513'); 
            
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(ix, iy, 70 * pupilScale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(ix - 50, iy - 60, 40, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
            ctx.restore(); 
        }

        ctx.strokeStyle = '#1a0f0a';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.lineWidth = 52;
        ctx.beginPath();
        ctx.moveTo(cx - 280, cy - 120 + upperY);
        ctx.quadraticCurveTo(cx - 20, cy - 400 + upperY, cx + 260, cy - 160 + upperY);
        ctx.stroke();

        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(cx - 190, cy + 205 + lowerY);
        ctx.quadraticCurveTo(cx, cy + 250, cx + 190, cy + 205 + lowerY);
        ctx.stroke();
        tex.needsUpdate = true;
    }

    const eyeGeo = new THREE.PlaneGeometry(320, 320);
    const eyeL = new THREE.Mesh(eyeGeo, new THREE.MeshBasicMaterial({ 
        map: eyeTexL, transparent: true, side: THREE.DoubleSide, depthTest: false,
        stencilWrite: true, stencilRef: 1, stencilFunc: THREE.EqualStencilFunc
    }));
    const eyeR = new THREE.Mesh(eyeGeo, new THREE.MeshBasicMaterial({ 
        map: eyeTexR, transparent: true, side: THREE.DoubleSide, depthTest: false,
        stencilWrite: true, stencilRef: 1, stencilFunc: THREE.EqualStencilFunc
    }));
    eyeL.position.set(-250, 80, 1.5); eyeR.position.set(250, 80, 1.5);
    eyeL.renderOrder = 4; eyeR.renderOrder = 4;
    faceGroup.add(eyeL); faceGroup.add(eyeR);

    // 3. Sobrancelhas
    const browTex = createHighResTexture((ctx, w, h) => {
        ctx.strokeStyle = '#2a1a12'; ctx.lineWidth = 15; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(w*0.1, h*0.6); ctx.quadraticCurveTo(w*0.5, h*0.4, w*0.9, h*0.6); ctx.stroke();
    }, 512, 256);
    const browL = new THREE.Mesh(new THREE.PlaneGeometry(240, 120), new THREE.MeshBasicMaterial({ map: browTex, transparent: true, side: THREE.DoubleSide, depthTest: false, stencilWrite: true, stencilRef: 1, stencilFunc: THREE.EqualStencilFunc }));
    const browR = new THREE.Mesh(new THREE.PlaneGeometry(240, 120), new THREE.MeshBasicMaterial({ map: browTex, transparent: true, side: THREE.DoubleSide, depthTest: false, stencilWrite: true, stencilRef: 1, stencilFunc: THREE.EqualStencilFunc }));
    browL.position.set(-250, 240, 6); browR.position.set(250, 240, 6);
    browL.renderOrder = 6; browR.renderOrder = 6;
    faceGroup.add(browL); faceGroup.add(browR);

    // 4. Boca Deformável
    const mouthCanvas = document.createElement('canvas');
    mouthCanvas.width = 512; mouthCanvas.height = 512;
    const mouthCtx = mouthCanvas.getContext('2d');
    const mouthTexture = new THREE.CanvasTexture(mouthCanvas);
    const mouthGeo = new THREE.PlaneGeometry(350, 350, 32, 32);
    const mouthMesh = new THREE.Mesh(mouthGeo, new THREE.MeshBasicMaterial({ map: mouthTexture, transparent: true, side: THREE.DoubleSide, depthTest: false, depthWrite: false, stencilWrite: true, stencilRef: 1, stencilFunc: THREE.EqualStencilFunc }));
    mouthMesh.position.set(0, -260, 1.5); mouthMesh.renderOrder = 4;
    faceGroup.add(mouthMesh);
    const mouthOrigV = new Float32Array(mouthGeo.attributes.position.array);

    // 5. Nariz e Blush
    const nose = new THREE.Mesh(new THREE.CircleGeometry(7, 16), new THREE.MeshBasicMaterial({ color: '#d9b3a1', depthTest: false, stencilWrite: true, stencilRef: 1, stencilFunc: THREE.EqualStencilFunc }));
    nose.position.set(0, -80, 2); nose.renderOrder = 7;
    faceGroup.add(nose);

    const blushMat = new THREE.MeshBasicMaterial({ 
        map: createHighResTexture((ctx, w, h) => {
            function drawBlushSide(offsetX) {
                const grad = ctx.createRadialGradient(offsetX, h*0.5, 5, offsetX, h*0.5, 160);
                grad.addColorStop(0, 'rgba(255, 105, 180, 0.5)'); grad.addColorStop(1, 'rgba(255, 105, 180, 0)');
                ctx.fillStyle = grad; ctx.fillRect(offsetX - 200, 0, 400, h);
            }
            drawBlushSide(w * 0.25); drawBlushSide(w * 0.75);
        }, 1024, 256), transparent: true, opacity: 0.8, side: THREE.DoubleSide, depthTest: false, stencilWrite: true, stencilRef: 1, stencilFunc: THREE.EqualStencilFunc
    });
    const blush = new THREE.Mesh(new THREE.PlaneGeometry(900, 250), blushMat);
    blush.position.set(0, 30, 0.5); blush.renderOrder = 2;
    faceGroup.add(blush);

    // 6. SOLUÇÃO ANTI-CALVÍCIE: Franha Atualizada com Mechas Laterais Envelopantes
    const hairFrontMat = new THREE.MeshBasicMaterial({
        map: createHighResTexture((ctx, w, h) => {
            const cx = w/2, cy = h/2;
            ctx.fillStyle = hairColor;

            // FRANJA INTEGRADA COM LINDAS MECHAS LATERAIS
            ctx.beginPath();
            ctx.arc(cx, cy - 250, 560, Math.PI, 0); // Calota craniana superior
            
            // Desce desenhando a Mecha Lateral Direita (Evita calvície ao girar)
            ctx.lineTo(cx + 560, cy + 160);
            ctx.lineTo(cx + 440, cy + 100); // Curva interna da mecha direita
            
            // Desenho pontiagudo estiloso da franja frontal (Estilo Anime Bulma)
            ctx.lineTo(cx + 300, cy - 230);
            ctx.lineTo(cx + 180, cy - 120);  
            ctx.lineTo(cx + 80, cy - 210);
            ctx.lineTo(cx, cy - 90);       // Ponta central clássica entre os olhos
            ctx.lineTo(cx - 80, cy - 210);
            ctx.lineTo(cx - 180, cy - 120);  
            ctx.lineTo(cx - 300, cy - 230);
            
            // Desce desenhando a Mecha Lateral Esquerda
            ctx.lineTo(cx - 440, cy + 100);
            ctx.lineTo(cx - 560, cy + 160);
            ctx.closePath();
            ctx.fill();

            // Contornos internos para dar volume e fios de alta definição
            ctx.strokeStyle = hairShadow;
            ctx.lineWidth = 14;
            ctx.stroke();
        }, 2048, 2048),
        transparent: true, side: THREE.DoubleSide, depthTest: false, depthWrite: false
    });
    const hairFront = new THREE.Mesh(new THREE.PlaneGeometry(1600, 1600), hairFrontMat);
    hairFront.position.set(0, 50, 5); hairFront.renderOrder = 5;
    faceGroup.add(hairFront);

    // Configuração de Controles ARKit 52 Blendshapes
    const categories = [
        { name: "Sobrancelhas", keys: { "browDownLeft": "Sobrancelha Baixo Esq", "browDownRight": "Sobrancelha Baixo Dir", "browOuterUpLeft": "Sobrancelha Ponta Esq Cima", "browOuterUpRight": "Sobrancelha Ponta Dir Cima", "browInnerUp": "Sobrancelha Centro Cima" } },
        { name: "Olhos", keys: { "eyeBlinkLeft": "Piscar Esq", "eyeBlinkRight": "Piscar Dir", "eyeLookDownLeft": "Olhar Baixo Esq", "eyeLookDownRight": "Olhar Baixo Dir", "eyeLookInLeft": "Olhar Centro Esq", "eyeLookInRight": "Olhar Centro Dir", "eyeLookOutLeft": "Olhar Fora Esq", "eyeLookOutRight": "Olhar Fora Dir", "eyeLookUpLeft": "Olhar Cima Esq", "eyeLookUpRight": "Olhar Cima Dir", "eyeSquintLeft": "Semicerrar Esq", "eyeSquintRight": "Semicerrar Dir", "eyeWideLeft": "Arregalar Esq", "eyeWideRight": "Arregalar Dir" } },
        { name: "Nariz e Boca", keys: { "noseSneerLeft": "Nariz Torcer Esq", "noseSneerRight": "Nariz Torcer Dir", "cheekPuff": "Inflar Bochechas", "cheekSquintLeft": "Bochecha Esq Cima", "cheekSquintRight": "Bochecha Dir Cima", "mouthFunnel": "Boca em O", "jawOpen": "Abrir Boca", "jawForward": "Mandíbula p/ Frente", "jawLeft": "Mandíbula Esq", "jawRight": "Mandíbula Dir", "mouthSmileLeft": "Sorriso Esq", "mouthSmileRight": "Sorriso Dir", "mouthFrownLeft": "Triste Esq", "mouthFrownRight": "Triste Dir", "mouthStretchLeft": "Esticar Esq", "mouthStretchRight": "Esticar Dir", "mouthPucker": "Beicinho", "mouthClose": "Fechar Lábios", "mouthUpperUpLeft": "Lábio Sup Cima Esq", "mouthUpperUpRight": "Lábio Sup Cima Dir", "mouthLowerDownLeft": "Lábio Inf Baixo Esq", "mouthLowerDownRight": "Lábio Inf Baixo Dir", "mouthShrugUpper": "Enrugar Sup", "mouthShrugLower": "Enrugar Inf", "mouthRollUpper": "Lamber Lábio Sup", "mouthRollLower": "Lamber Lábio Inf", "tongueOut": "Língua p/ Fora", "tongueLeft": "Língua p/ Esquerda", "tongueRight": "Língua p/ Direita" } },
        { name: "Cabeça", keys: { "headLookUp": "Olhar para Cima", "headLookDown": "Olhar para Baixo", "headLookLeft": "Olhar para Esquerda", "headLookRight": "Olhar para Direita", "headTiltLeft": "Inclinar Esquerda", "headTiltRight": "Inclinar Direita" } }
    ];

    function getAllKeys() { let k = []; categories.forEach(c => { Object.keys(c.keys).forEach(id => k.push(id)); }); return k; };

    function initSidebar() {
        const container = document.getElementById('rig-controls'); let total = 0;
        categories.forEach(cat => {
            const det = document.createElement('details');
            const sum = document.createElement('summary'); sum.innerText = cat.name; det.appendChild(sum);
            const grid = document.createElement('div'); grid.className = 'controls-grid';
            Object.entries(cat.keys).forEach(([id, label]) => {
                const isLeft = id.toLowerCase().endsWith('left'); const isRight = id.toLowerCase().endsWith('right');
                let hasPair = isLeft ? !!cat.keys[id.replace(/left$/i, 'Right')] : (isRight ? !!cat.keys[id.replace(/right$/i, 'Left')] : false);
                const group = document.createElement('div'); group.className = 'control-group';
                if (!hasPair) group.style.gridColumn = "span 2";
                group.innerHTML = `<div class="label-row"><span>${label}</span><span id="val-${id}">0</span></div><input type="range" id="${id}" min="0" max="100" value="0" oninput="updateRig()">`;
                grid.appendChild(group); total++;
            });
            det.appendChild(grid); container.appendChild(det);
        });
        document.getElementById('counter').innerText = `${total} Shape Keys Ativas`;
    }

    // MATRIZ MATEMÁTICA PARA MUDANÇA E ROTAÇÃO 360° COMPLETA
    function updateRig() {
        const values = {};
        getAllKeys().forEach(key => {
            const slider = document.getElementById(key);
            if (slider) { values[key] = slider.value / 100; document.getElementById(`val-${key}`).innerText = slider.value; }
        });

        // 1. Rotações e Ângulos Base
        const hPitch = (values.headLookUp || 0) - (values.headLookDown || 0);
        const hYaw = (values.headLookRight || 0) - (values.headLookLeft || 0);
        const hRoll = (values.headTiltRight || 0) - (values.headTiltLeft || 0);

        const yawAngle = hYaw * (15 * Math.PI / 180); // Limitado a 15 graus para esquerda/direita
        const pitchAngle = hPitch * 0.5;
        const isFront = Math.cos(yawAngle) > 0;

        // 2. Atualização das Texturas dos Olhos
        const lookXL = (values.eyeLookInLeft || 0) - (values.eyeLookOutLeft || 0);
        const lookYL = (values.eyeLookUpLeft || 0) - (values.eyeLookDownLeft || 0);
        updateEyeTexture(eyeCanvasL, eyeTexL, 1 - values.eyeBlinkLeft, lookXL * 45, lookYL * 35, 1.0, (values.eyeSquintLeft || 0) + (values.cheekSquintLeft || 0), values.eyeWideLeft || 0);
        
        const lookXR = (values.eyeLookOutRight || 0) - (values.eyeLookInRight || 0);
        const lookYR = (values.eyeLookUpRight || 0) - (values.eyeLookDownRight || 0);
        updateEyeTexture(eyeCanvasR, eyeTexR, 1 - values.eyeBlinkRight, lookXR * 45, lookYR * 35, 1.0, (values.eyeSquintRight || 0) + (values.cheekSquintRight || 0), values.eyeWideRight || 0);

        // 3. Deformação Profissional do Rosto (Cilíndrica)
        updateFaceWarp(values.cheekPuff || 0, yawAngle, hPitch);

        // Função auxiliar para projetar elementos na superfície curva
        const projectToHead = (baseX, baseY, zOffset = 0.01) => {
            const R = 700;
            const theta = (baseX / R) * (Math.PI / 2.5);
            const angle = theta + yawAngle;
            const cosA = Math.cos(angle);
            
            const pFactor = hPitch * 0.38; // Suavizado para evitar compressão excessiva
            const cosP = Math.cos(pFactor);
            const sinP = Math.sin(pFactor);
            const localZ = R * (cosA - 1);
            
            return {
                x: R * Math.sin(angle),
                y: ((baseY + 200) * cosP) - (localZ * sinP) - 200 + (hPitch * 220), // Pivot deslocado para cima
                z: (baseY * sinP) + (localZ * cosP) + zOffset,      
                scaleX: Math.max(0.01, cosA) * (1 + (cosA - 1) * 0.15), 
                scaleY: 1 + (cosP - 1) * 0.5, // Foreshortening menos agressivo
                rotationY: angle, // Alinha o plano com a tangente do cilindro
                visible: cosA > 0 && isFront
            };
        };

        // Grupo de transformações globais suaves
        faceGroup.rotation.x = -hPitch * 0.15; // Adiciona o tilt real ao grupo para volume 3D
        faceGroup.rotation.z = hRoll * 0.2;
        faceGroup.position.y = hPitch * 50; // Movimento global da cabeça

        // 4. Mecânica de Inversão de Camadas (360)
        if (isFront) {
            hairBack.renderOrder = 0; // Cabelo atrás do crânio
            hairBack.position.set(-Math.sin(yawAngle) * 80, -hPitch * 40, -1);
            hairBack.rotation.y = yawAngle;
        } else {
            hairBack.renderOrder = 8; // Cabelo passa p/ frente cobrindo o rosto ao virar de costas
            hairBack.position.set(-Math.sin(yawAngle) * 80, -hPitch * 40, 1);
            hairBack.rotation.y = yawAngle;
        }

        // 5. Parallax da Franja (segue curva atenuada)
        const hF = projectToHead(0, 50, 0.2);
        hairFront.position.set(hF.x * 1.2, hF.y, hF.z);
        hairFront.scale.set(hF.scaleX, hF.scaleY, 1);
        hairFront.rotation.y = hF.rotationY;
        hairFront.visible = Math.cos(yawAngle) > -0.6;

        // 6. Projeção Orbital dos Olhos e Sobrancelhas
        const pL = projectToHead(-250, 80, 0.1);
        const pR = projectToHead(250, 80, 0.1);

        eyeL.position.set(pL.x, pL.y, pL.z); eyeL.scale.set(pL.scaleX, pL.scaleY, 1); eyeL.visible = pL.visible; eyeL.rotation.y = pL.rotationY;
        eyeR.position.set(pR.x, pR.y, pR.z); eyeR.scale.set(pR.scaleX, pR.scaleY, 1); eyeR.visible = pR.visible; eyeR.rotation.y = pR.rotationY;

        const bIn = values.browInnerUp * 30;
        const pBL = projectToHead(-250, 240 + bIn - (values.browDownLeft * 40), 0.2);
        const pBR = projectToHead(250, 240 + bIn - (values.browDownRight * 40), 0.2);

        browL.position.set(pBL.x, pBL.y, pBL.z); browL.scale.set(pBL.scaleX, pBL.scaleY, 1); browL.visible = pBL.visible; browL.rotation.y = pBL.rotationY;
        browR.position.set(pBR.x, pBR.y, pBR.z); browR.scale.set(pBR.scaleX, pBR.scaleY, 1); browR.visible = pBR.visible; browR.rotation.y = pBR.rotationY;
        
        browL.rotation.z = (values.browOuterUpLeft * 0.3) - (values.browDownLeft * 0.2) + (hRoll * 0.15);
        browR.rotation.z = -(values.browOuterUpRight * 0.3) + (values.browDownRight * 0.2) + (hRoll * 0.15);

        // 7. Boca, Nariz e Maquiagem Dinâmica
        const sL = (values.mouthSmileLeft || 0) - (values.mouthFrownLeft || 0);
        const sR = (values.mouthSmileRight || 0) - (values.mouthFrownRight || 0);
        const mOpen = values.jawOpen || 0;
        const sL_stretch = values.mouthStretchLeft || 0;
        const sR_stretch = values.mouthStretchRight || 0;
        const mClose = values.mouthClose || 0;
        const mPucker = values.mouthPucker || 0;
        const mFunnel = values.mouthFunnel || 0;
        const mUpperUpL = values.mouthUpperUpLeft || 0;
        const mUpperUpR = values.mouthUpperUpRight || 0;
        const mLowerDownL = values.mouthLowerDownLeft || 0;
        const mLowerDownR = values.mouthLowerDownRight || 0;
        const mShrugU = values.mouthShrugUpper || 0;
        const mShrugL = values.mouthShrugLower || 0;
        const mRollU = values.mouthRollUpper || 0;
        const mRollL = values.mouthRollLower || 0;
        const mTongue = values.tongueOut || 0;
        const tLeft = values.tongueLeft || 0;
        const tRight = values.tongueRight || 0;

        const jawX = (values.jawRight - values.jawLeft) * 50;
        const jawForwardY = (values.jawForward || 0) * 20;
        const effectiveOpen = mOpen * (1 - mClose);

        const nSneer = (values.noseSneerLeft || 0) + (values.noseSneerRight || 0);
        const nSide = (values.noseSneerRight || 0) - (values.noseSneerLeft || 0);
        
        // Projeção do Nariz e Boca
        const pN = projectToHead((nSide * 40), -80 + (nSneer * 20), 0.5);
        nose.position.set(pN.x, pN.y, pN.z);
        nose.rotation.y = pN.rotationY;
        nose.visible = pN.visible;

        // A boca agora usa a mesma origem de warp do rosto para sincronia total
        mouthMesh.position.set(0, 0, 0); 
        mouthMesh.rotation.set(0, 0, 0);
        mouthMesh.visible = isFront;

        const pBl = projectToHead(0, 30, 0.1);
        blush.position.set(pBl.x, pBl.y, pBl.z);
        blush.scale.set(pBl.scaleX, pBl.scaleY, 1);
        blush.rotation.y = pBl.rotationY;
        blush.visible = isFront;

        updateMouthWarp(sL, sR, effectiveOpen, sL_stretch, sR_stretch, mPucker, mFunnel, mShrugU, mShrugL, mRollU, mRollL, mClose, yawAngle, hPitch, jawX, jawForwardY);
        renderMouthTexture({
            smileL: sL, smileR: sR, open: effectiveOpen, stretchL: sL_stretch, stretchR: sR_stretch, pucker: mPucker, funnel: mFunnel,
            upperL: mUpperUpL, upperR: mUpperUpR, lowerL: mLowerDownL, lowerR: mLowerDownR, close: mClose, tongue: mTongue, tongueX: (tRight - tLeft) * 120,
            shrugU: mShrugU, shrugL: mShrugL, rollU: mRollU, rollL: mRollL
        });
    }

    function resetSliders() { getAllKeys().forEach(key => { const slider = document.getElementById(key); if (slider) slider.value = 0; }); updateRig(); }

    function renderMouthTexture(params) {
        const { smileL, smileR, open, stretchL, stretchR, pucker, funnel, upperL, upperR, lowerL, lowerR, shrugU, shrugL, rollU, rollL, close, tongue, tongueX } = params;
        const ctx = mouthCtx; const cx = 256, cy = 256; ctx.clearRect(0, 0, 512, 512);

        // 1. Ajuste de Largura e Altura (O "Funnel" agora encolhe muito mais a largura)
        const baseWL = (130 - (pucker * 70) - (funnel * 85)) * (1 + stretchL * 0.5);
        const baseWR = (130 - (pucker * 70) - (funnel * 85)) * (1 + stretchR * 0.5);
        const openH = (open * 280) + (funnel * 220) - (close * 180); 
        
        // 2. Altura dos Cantos: Agora o sorriso puxa para CIMA (Y negativo) sem afetar a abertura
        const smileYL = (smileL * -70) + (open * 30) + (funnel * 50);
        const smileYR = (smileR * -70) + (open * 30) + (funnel * 50);
        
        // 3. Curvatura do Lábio Superior (Arqueia para CIMA para o formato D/O de anime)
        const topCurveBias = (open * -60) + (funnel * -100) + (Math.max(smileL, smileR) * 20); 

        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // 1. Cavidade da Boca (Fundo escuro)
        if (open > 0.05 || funnel > 0.1) {
            ctx.beginPath();
            ctx.moveTo(cx - baseWL, cy + smileYL);
            ctx.quadraticCurveTo(cx, cy + topCurveBias, cx + baseWR, cy + smileYR);
            // Bezier para criar o formato Oval na parte inferior
            ctx.bezierCurveTo(cx + baseWR, cy + openH, cx - baseWL, cy + openH, cx - baseWL, cy + smileYL);
            ctx.fillStyle = '#4a1010'; ctx.fill();
            
            ctx.save(); ctx.clip();
            
            ctx.restore();
        }

        // 2. Linha Principal da Boca (Thinner Stroke)
        ctx.strokeStyle = '#2a1a12'; ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(cx - baseWL, cy + smileYL);
        ctx.quadraticCurveTo(cx, cy + topCurveBias, cx + baseWR, cy + smileYR);
        if (open > 0.02 || funnel > 0.02) {
            ctx.bezierCurveTo(cx + baseWR, cy + openH, cx - baseWL, cy + openH, cx - baseWL, cy + smileYL);
        }
        ctx.stroke();

        // 3. Lógica Unificada da Língua (Língua p/ fora, Lamber Sup/Inf) - No fim para ficar à frente
        const tVal = Math.max(tongue, rollU, rollL);
        if (tVal > 0.05) {
            ctx.save();
            const tx = cx + tongueX;
            const tw = 55 * tVal;
            const th = 80 * tVal;

            ctx.fillStyle = '#ff7b92';
            ctx.strokeStyle = '#2a1a12';
            ctx.lineWidth = 5;
            ctx.beginPath();

            if (rollU > tongue && rollU > rollL) {
                // Lamber Lábio Superior (Virada para Cima)
                let ty = cy + (smileYL + smileYR)/2 - 5;
                ctx.moveTo(tx - tw, ty);
                ctx.bezierCurveTo(tx - tw, ty - th * 1.8, tx + tw, ty - th * 1.8, tx + tw, ty);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                
                ctx.beginPath(); ctx.lineWidth = 3;
                ctx.moveTo(tx, ty - th * 0.4); ctx.lineTo(tx, ty - th * 0.9);
                ctx.stroke();
            } else if (rollL > tongue && rollL > rollU) {
                // Lamber Lábio Inferior (Virada para Baixo)
                let ty = cy + openH + 5;
                ctx.moveTo(tx - tw, ty);
                ctx.bezierCurveTo(tx - tw, ty + th * 1.8, tx + tw, ty + th * 1.8, tx + tw, ty);
                ctx.closePath();
                ctx.fill(); ctx.stroke();

                ctx.beginPath(); ctx.lineWidth = 3;
                ctx.moveTo(tx, ty + th * 0.4); ctx.lineTo(tx, ty + th * 0.9);
                ctx.stroke();
            } else {
                // Língua p/ Fora (Formato "U" clássico)
                let tyBase = cy + openH * 0.25;
                ctx.moveTo(tx - tw, tyBase);
                ctx.bezierCurveTo(tx - tw, tyBase + th * 1.4, tx + tw, tyBase + th * 1.4, tx + tw, tyBase);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                
                ctx.beginPath(); ctx.lineWidth = 3;
                ctx.moveTo(tx, tyBase + th * 0.3); ctx.lineTo(tx, tyBase + th * 0.7);
                ctx.stroke();
            }
            ctx.restore();
        }

        mouthTexture.needsUpdate = true;
    }

    function updateMouthWarp(smileL, smileR, open, stretchL, stretchR, pucker, funnel, shrugU, shrugL, rollU, rollL, close, yaw, pitch, jawX, jawForwardY) {
        const attr = mouthMesh.geometry.attributes.position; const v = attr.array;
        const R = 700;
        const pFactor = pitch * 0.38;
        const cosP = Math.cos(pFactor);
        const sinP = Math.sin(pFactor);

        for (let i = 0; i < v.length; i += 3) {
            let x = mouthOrigV[i]; 
            let y = mouthOrigV[i+1]; 
            
            // Removida a deformação interna que causava a junção quadrada.
            // Agora a malha da boca se move suavemente como um todo acompanhando a mandíbula.
            const jawDrop = open * 35; // Deslocamento físico da mandíbula para baixo

            // 2. Aplica Projeção 360 Cilíndrica + Pitch na boca para "colar" no rosto
            const baseY = y - 260 + jawForwardY + jawDrop; 
            const baseX = x + jawX;
            const theta = (baseX / R) * (Math.PI / 2.5);
            const cosA = Math.cos(theta + yaw);
            const localZ = R * (cosA - 1);

            v[i] = R * Math.sin(theta + yaw);
            v[i+1] = ((baseY + 200) * cosP) - (localZ * sinP) - 200 + (pitch * 220);
            v[i+2] = (baseY * sinP) + (localZ * cosP) + 0.2; 
        }
        attr.needsUpdate = true;
    }

    function updateFaceWarp(puff, yaw, pitch) {
        const attr = faceMesh.geometry.attributes.position; const v = attr.array;
        const R = 700;
        const pFactor = pitch * 0.38;
        const cosP = Math.cos(pFactor);
        const sinP = Math.sin(pFactor);

        for (let i = 0; i < v.length; i += 3) {
            const ox = faceOrigV[i]; const oy = faceOrigV[i+1];
            const theta = (ox / R) * (Math.PI / 2.5); // Arco do rosto

            const cosA = Math.cos(theta + yaw);
            const localZ = R * (cosA - 1);

            v[i] = R * Math.sin(theta + yaw);
            // Aplica rotação de Pitch (X-axis rotation) nos vértices
            v[i+1] = ((oy + 200) * cosP) - (localZ * sinP) - 200 + (pitch * 220);
            v[i+2] = (oy * sinP) + (localZ * cosP);

            if (Math.abs(ox) > 200 && oy < 100 && oy > -400) {
                const distToCenter = Math.abs(oy + 150);
                const weight = Math.max(0, 1 - distToCenter / 300);
                v[i] += (ox > 0 ? 1 : -1) * puff * 100 * weight * cosA;
            }
        }
        attr.needsUpdate = true;
    }

    function onResize() {
        const containerW = canvasContainer.clientWidth; const containerH = canvasContainer.clientHeight;
        const aspect = FW / FH; let newW = containerW; let newH = containerW / aspect;
        if (newH > containerH - 40) { newH = containerH; newW = containerH * aspect; }
        renderer.setSize(newW, newH);
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

    window.addEventListener('resize', onResize);
    initSidebar(); onResize(); resetSliders(); animate();
</script>
