<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animation Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: white;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            margin: 0;
        }

        .bg-fixed-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .glass-item {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: fadeInUp 0.6s ease forwards; }

        /* Estilo suave para o container de doação */
        .donate-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 50;
        }
    </style>
</head>
<body class="p-6">

    <div class="bg-fixed-overlay"></div>

    <div class="container max-w-md w-full relative z-10 flex flex-col items-center my-auto mx-auto">
        <header class="text-center mb-12 animate-up">
            <h1 class="text-2xl font-bold tracking-tight mb-2 drop-shadow-lg">
                Estudio de Animação
            </h1>
        </header>

        <div class="grid grid-cols-1 gap-4 w-full animate-up" style="animation-delay: 0.2s;">
            
            
            <a href="desenhar.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">Desenhar</span>
            </a>

            <a href="estudio3d.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">Estúdio 3D</span>
            </a>
                  
            <a href="fxstudio.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">VFX Studio</span>
            </a>
  
            <a href="chromakey.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">Chromakey</span>
            </a>

            <a href="videoeditor.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">Video Editor</span>
            </a>

            <a href="colorcorrection.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">Correção de Cores</span>
            </a>

            <a href="videoplayer.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">Video Player</span>
            </a>

              <a href="mochila digital.html" class="glass-item p-4 rounded-full text-center font-semibold text-white group relative overflow-hidden">
                <span class="relative z-10">Mochila Digital</span>
            </a>

        </div>
    </div>
    <div class="fixed bottom-6 left-6 text-xs text-white/40 z-50 select-none">
        por Alexandre Rossi Alves
    </div>
</body>
</html>
