        };

        // Garante que o canvas seja transparente inicialmente (fundo branco vem do CSS)
        ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        renderTimeline(true);
        refreshLayerDisplay();
        saveFrameState(0);

        // Desativa o menu de contexto (clique direito/toque longo) para evitar o "Salvar Imagem"
        window.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- Mapeamento de Coordenadas com Resolução Flexível ---
        function getMousePos(evt) {
            const rect = mainCanvas.getBoundingClientRect();
            
            // Calcula a escala real baseado no tamanho redimensionado pelo CSS
            const scaleX = mainCanvas.width / rect.width;
            const scaleY = mainCanvas.height / rect.height;

            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        function hexToRgba(hex, opacity) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity / 100})`;
        }

        // --- Lógica de Desenho ---
        function startDrawing(e) {
            if (isPlaying) return;
            isDrawing = true;
            layersDropdown.classList.remove('show'); // Fecha o menu ao começar a desenhar para limpar a visão
            
            // Tira um snapshot do frame atual para renderização live sem beading
            snapshotCanvas.width = mainCanvas.width;
            snapshotCanvas.height = mainCanvas.height;
            snapCtx.clearRect(0, 0, snapshotCanvas.width, snapshotCanvas.height);
            snapCtx.drawImage(mainCanvas, 0, 0);

            const pos = getMousePos(e); 
            
            if (currentTool === 'eyedropper') {
                sampleColor(pos.x, pos.y);
                isDrawing = false;
                return;
            }
            
            if (currentTool === 'lasso' || currentTool === 'perspective') {
                if (isTransforming) {
                    const hit = getTransformHit(pos);
                    if (hit) {
                        transformMode = hit;
                        dragStart = { 
                            x: pos.x, 
                            y: pos.y, 
                            startAngle: selectionBox.angle,
                            startScale: selectionBox.scale,
                            startBoxX: selectionBox.x,
                            startBoxY: selectionBox.y,
                            startCorners: selectionCorners.map(c => ({...c}))
                        };
                        return;
                    }
                }
                selectionPath = [pos];
                return;
            }
            
            if (currentTool === 'bucket') {
                const color = nativeColorPicker.value;
                const opacity = document.getElementById('brushOpacity').value;
                const rgb = hexToRgb(color);
                floodFill(pos.x, pos.y, { r: rgb.r, g: rgb.g, b: rgb.b, a: Math.floor(opacity * 2.55) }, bucketToleranceSlider.value);
                saveFrameState(currentFrameIndex);
                isDrawing = false;
                return;
            }

            lastX = pos.x; lastY = pos.y;
            lastMidX = pos.x; lastMidY = pos.y;

            // Cacheia os valores no início do traço para não pesar o processamento no movimento
            cachedSize = parseFloat(document.getElementById('brushSize').value);
            cachedOpacity = parseFloat(document.getElementById('brushOpacity').value);
            cachedColor = nativeColorPicker.value;

            dCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
            
            dCtx.beginPath();
            dCtx.arc(lastX, lastY, cachedSize / 2, 0, Math.PI * 2);
            
            if (currentTool === 'eraser') {
                dCtx.globalCompositeOperation = 'source-over';
                dCtx.fillStyle = '#000'; // Cor interna do buffer não importa, apenas a forma
            } else {
                dCtx.globalCompositeOperation = 'source-over';
                dCtx.fillStyle = cachedColor; // Desenha 100% opaco no buffer
            }
            
            dCtx.fill();
            renderLiveStroke();
        }

        function draw(e) {
            if (!isDrawing || isPlaying) return;

            // Captura múltiplos pontos entre quadros de atualização (essencial para mesas digitalizadoras)
            const events = (e.getCoalescedEvents && e.getCoalescedEvents().length > 0) 
                ? e.getCoalescedEvents() 
                : [e];
            
            if (currentTool === 'lasso' || currentTool === 'perspective' || currentTool === 'bucket') {
                const pos = getMousePos(e);
                if (isTransforming && transformMode) {
                    if (transformMode === 'move') {
                        const dx = pos.x - dragStart.x;
                        const dy = pos.y - dragStart.y;
                        selectionCorners.forEach((c, i) => {
                            c.x = dragStart.startCorners[i].x + dx;
                            c.y = dragStart.startCorners[i].y + dy;
                        });
                        selectionBox.x = dragStart.startBoxX + (pos.x - dragStart.x);
                        selectionBox.y = dragStart.startBoxY + (pos.y - dragStart.y);
                    } 
                    else if (transformMode === 'rotate') {
                        const centerX = selectionBox.x + selectionBox.w / 2;
                        const centerY = selectionBox.y + selectionBox.h / 2;
                        const angle = Math.atan2(pos.y - centerY, pos.x - centerX);
                        const startAngle = Math.atan2(dragStart.y - centerY, dragStart.x - centerX);
                        selectionBox.angle = dragStart.startAngle + (angle - startAngle);
                    }
                    else if (transformMode === 'scale') {
                        const centerX = selectionBox.x + selectionBox.w / 2;
                        const centerY = selectionBox.y + selectionBox.h / 2;
                        const dist = Math.hypot(pos.x - centerX, pos.y - centerY);
                        const startDist = Math.hypot(dragStart.x - centerX, dragStart.y - centerY);
                        selectionBox.scale = Math.max(0.1, dragStart.startScale * (dist / startDist));
                    }
                    else if (transformMode.startsWith('corner')) {
                        const idx = parseInt(transformMode.replace('corner', ''));
                        selectionCorners[idx].x = dragStart.startCorners[idx].x + (pos.x - dragStart.x);
                        selectionCorners[idx].y = dragStart.startCorners[idx].y + (pos.y - dragStart.y);
                    }
                    
                    drawTransformUI();
                } else {
                    selectionPath.push(pos);
                    drawLassoPath();
                }
                return;
            }

            // Inicia o caminho para o lote de eventos atuais
            dCtx.beginPath();
            dCtx.lineCap = 'round';
            dCtx.lineJoin = 'round';
            dCtx.globalCompositeOperation = 'source-over';
            dCtx.strokeStyle = currentTool === 'eraser' ? '#000' : cachedColor;
            dCtx.lineWidth = cachedSize; // Tamanho fixo para melhor performance

            // Processa todos os pontos acumulados desde o último movimento processado
            for (const event of events) {
                const pos = getMousePos(event);
                
                // Filtro de ruído: ignora movimentos irrelevantes (menores que 0.5px)
                if (Math.hypot(pos.x - lastX, pos.y - lastY) < 0.5) continue;

                const streamline = 1.0;
                const targetX = lastX + (pos.x - lastX) * streamline;
                const targetY = lastY + (pos.y - lastY) * streamline;
                
                const midX = (lastX + targetX) / 2;
                const midY = (lastY + targetY) / 2;

                dCtx.moveTo(lastMidX, lastMidY);
                dCtx.quadraticCurveTo(lastX, lastY, midX, midY);

                lastX = targetX;
                lastY = targetY;
                lastMidX = midX;
                lastMidY = midY;
            }
            dCtx.stroke();

            renderLiveStroke();
        }

        // Renderiza o traço do buffer para o canvas principal em tempo real
        function renderLiveStroke() {
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            ctx.drawImage(snapshotCanvas, 0, 0); // Restaura o frame original
            
            ctx.save();
            ctx.globalAlpha = cachedOpacity / 100;
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
            } else {
                ctx.globalCompositeOperation = 'source-over';
            }
            ctx.drawImage(drawingCanvas, 0, 0); // Aplica o buffer (sem beading)
            ctx.restore();
        }

        function stopDrawing(e) {
            if (isDrawing) {
                if (currentTool !== 'lasso' && currentTool !== 'perspective' && currentTool !== 'bucket' && e) {
                    const pos = getMousePos(e);
                    dCtx.beginPath();
                    dCtx.moveTo(lastMidX, lastMidY);
                    dCtx.quadraticCurveTo(lastX, lastY, pos.x, pos.y);
                    dCtx.stroke();
                    renderLiveStroke(); // Última renderização
                }
                
                dCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
                isDrawing = false;
                if ((currentTool === 'lasso' || currentTool === 'perspective') && !isTransforming && selectionPath.length > 3) {
                    createSelection();
                } else if (currentTool !== 'lasso' && currentTool !== 'perspective' && currentTool !== 'bucket') {
                    transformMode = null;
                    saveFrameState(currentFrameIndex);
                }
            }
        }

        function drawLassoPath() {
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            uiCtx.setLineDash([5, 5]);
            uiCtx.strokeStyle = "#007aff";
            uiCtx.lineWidth = 2;
            uiCtx.beginPath();
            uiCtx.moveTo(selectionPath[0].x, selectionPath[0].y);
            selectionPath.forEach(p => uiCtx.lineTo(p.x, p.y));
            uiCtx.stroke();
            uiCtx.setLineDash([]);
        }

        function sampleColor(x, y) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = mainCanvas.width;
            tempCanvas.height = mainCanvas.height;
            const tCtx = tempCanvas.getContext('2d');

            // Composição para amostragem fiel ao que o usuário vê (achata as camadas)
            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tCtx.drawImage(bgCanvas, 0, 0);

            for (let i = 0; i < 3; i++) {
                if (i === activeLayerIndex) {
                    tCtx.drawImage(mainCanvas, 0, 0);
                } else {
                    const lCanvas = document.getElementById(`layer${i}`);
                    tCtx.drawImage(lCanvas, 0, 0);
                }
            }

            const pixel = tCtx.getImageData(x, y, 1, 1).data;
            const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
            nativeColorPicker.value = hex;
            cachedColor = hex;
            currentTool = 'brush'; // Retorna ao pincel após capturar a cor
            updateToolUI();
        }

        function createSelection() {
            // Calcula Bounding Box
            const xs = selectionPath.map(p => p.x);
            const ys = selectionPath.map(p => p.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            
            selectionBox = { x: minX, y: minY, w: maxX - minX, h: maxY - minY, angle: 0, scale: 1 };
            
            // Inicializa cantos para a ferramenta de perspectiva
            selectionCorners = [
                { x: minX, y: minY }, { x: maxX, y: minY },
                { x: maxX, y: maxY }, { x: minX, y: maxY }
            ];
            
            // Prepara canvas de seleção
            selectionCanvas.width = selectionBox.w;
            selectionCanvas.height = selectionBox.h;
            
            // Recorta o conteúdo do canvas principal
            sCtx.save();
            sCtx.translate(-minX, -minY);
            sCtx.beginPath();
            sCtx.moveTo(selectionPath[0].x, selectionPath[0].y);
            selectionPath.forEach(p => sCtx.lineTo(p.x, p.y));
            sCtx.clip();
            sCtx.drawImage(mainCanvas, 0, 0);
            sCtx.restore();

            // Apaga do original
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(selectionPath[0].x, selectionPath[0].y);
            selectionPath.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.clip();
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            ctx.restore();

            isTransforming = true;
            saveFrameState(currentFrameIndex); // Salva o frame atual sem os pixels recortados
            drawTransformUI();
        }

        function drawTransformUI() {
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            const b = selectionBox;

            if (currentTool === 'perspective') {
                renderDistorted(uiCtx, selectionCanvas, selectionCorners);
                uiCtx.strokeStyle = "#ff3b30";
                uiCtx.setLineDash([5, 5]);
                uiCtx.beginPath();
                uiCtx.moveTo(selectionCorners[0].x, selectionCorners[0].y);
                selectionCorners.forEach(c => uiCtx.lineTo(c.x, c.y));
                uiCtx.closePath();
                uiCtx.stroke();

                // Gizmos de Perspectiva (Cantos)
                uiCtx.setLineDash([]);
                uiCtx.fillStyle = "#fff";
                selectionCorners.forEach(c => {
                    uiCtx.beginPath();
                    uiCtx.arc(c.x, c.y, 8, 0, Math.PI * 2);
                    uiCtx.fill();
                    uiCtx.stroke();
                });
                return;
            }
            
            uiCtx.save();
            uiCtx.translate(b.x + b.w/2, b.y + b.h/2);
            uiCtx.rotate(b.angle);
            uiCtx.scale(b.scale, b.scale);
            
            // Desenha o conteúdo recortado
            uiCtx.drawImage(selectionCanvas, -b.w/2, -b.h/2);
            
            // Desenha a moldura de seleção
            uiCtx.strokeStyle = "#007aff";
            uiCtx.setLineDash([5, 5]);
            uiCtx.strokeRect(-b.w/2, -b.h/2, b.w, b.h);
            
            // Gizmos (Alças de Escala - 8 pontos)
            uiCtx.fillStyle = "#fff";
            uiCtx.setLineDash([]);

            const scalePoints = [
                { x: -b.w/2, y: -b.h/2 }, { x: b.w/2, y: -b.h/2 }, // Cantos superiores
                { x: -b.w/2, y: b.h/2 },  { x: b.w/2, y: b.h/2 },  // Cantos inferiores
                { x: -b.w/2, y: 0 },       { x: b.w/2, y: 0 },       // Meio laterais
                { x: 0, y: -b.h/2 },       { x: 0, y: b.h/2 }        // Meio topo/baixo
            ];

            scalePoints.forEach(p => {
                uiCtx.fillRect(p.x - 8, p.y - 8, 16, 16);
                uiCtx.strokeRect(p.x - 8, p.y - 8, 16, 16);
            });

            // Alças de Rotação (4 lados)
            const hOff = 30 * (1/b.scale), lOff = 22 * (1/b.scale);
            const rotationHandles = [
                { x: 0, y: -b.h/2, lx: 0, ly: -b.h/2 - lOff, hx: 0, hy: -b.h/2 - hOff }, // Topo
                { x: 0, y: b.h/2, lx: 0, ly: b.h/2 + lOff, hx: 0, hy: b.h/2 + hOff },    // Baixo
                { x: -b.w/2, y: 0, lx: -b.w/2 - lOff, ly: 0, hx: -b.w/2 - hOff, hy: 0 }, // Esquerda
                { x: b.w/2, y: 0, lx: b.w/2 + lOff, ly: 0, hx: b.w/2 + hOff, hy: 0 }    // Direita
            ];

            rotationHandles.forEach(h => {
                uiCtx.beginPath();
                uiCtx.arc(h.hx, h.hy, 8, 0, Math.PI * 2);
                uiCtx.fill();
                uiCtx.stroke();
                
                uiCtx.beginPath();
                uiCtx.moveTo(h.x, h.y);
                uiCtx.lineTo(h.lx, h.ly);
                uiCtx.stroke();
            });
            
            uiCtx.restore();
        }

        // Algoritmo de Balde de Tinta (Flood Fill)
        function floodFill(startX, startY, fillRGBA, tolerance) {
            if (isTransforming) finishSelection();
            const width = mainCanvas.width;
            const height = mainCanvas.height;
            const imgData = ctx.getImageData(0, 0, width, height, { colorSpace: 'srgb' });
            const data = imgData.data;
            const uint32Data = new Uint32Array(data.buffer);

            const x = Math.floor(startX);
            const y = Math.floor(startY);
            if (x < 0 || x >= width || y < 0 || y >= height) return;

            const baseIdx = (y * width + x);
            const startColor32 = uint32Data[baseIdx];
            
            // Extração para caso de tolerância
            const startR = data[baseIdx];
            const startG = data[baseIdx + 1];
            const startB = data[baseIdx + 2];
            const startA = data[baseIdx + 3];

            // Se a cor clicada já for muito próxima da cor de preenchimento, cancela para evitar loop
            if (Math.abs(startR - fillRGBA.r) < 2 && Math.abs(startG - fillRGBA.g) < 2 && 
                Math.abs(startB - fillRGBA.b) < 2 && Math.abs(startA - fillRGBA.a) < 2) return;

            const stack = [[x, y]];
            const visited = new Uint8Array(width * height);
            const fill32 = (fillRGBA.a << 24) | (fillRGBA.b << 16) | (fillRGBA.g << 8) | fillRGBA.r;

            while (stack.length > 0) {
                const [currX, currY] = stack.pop();
                const posIdx = currY * width + currX;
                
                if (currX < 0 || currX >= width || currY < 0 || currY >= height || visited[posIdx]) continue;
                visited[posIdx] = 1;

                const color32 = uint32Data[posIdx];
                const idx = posIdx * 4;
                
                const isMatch = tolerance == 0 ? 
                                color32 === startColor32 :
                                Math.abs(data[idx] - startR) <= tolerance &&
                                Math.abs(data[idx+1] - startG) <= tolerance &&
                                Math.abs(data[idx+2] - startB) <= tolerance &&
                                Math.abs(data[idx+3] - startA) <= tolerance;

                if (isMatch) {
                    uint32Data[posIdx] = fill32;
                    stack.push([currX + 1, currY]);
                    stack.push([currX - 1, currY]);
                    stack.push([currX, currY + 1]);
                    stack.push([currX, currY - 1]);
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        // Função matemática para distorcer a imagem usando triângulos (Affine Transformation)
        function renderDistorted(targetCtx, img, p) {
            const w = img.width;
            const h = img.height;
            
            const drawTriangle = (p0, p1, p2, u0, v0, u1, v1, u2, v2) => {
                targetCtx.save();
                targetCtx.beginPath();
                targetCtx.moveTo(p0.x, p0.y);
                targetCtx.lineTo(p1.x, p1.y);
                targetCtx.lineTo(p2.x, p2.y);
                targetCtx.closePath();
                targetCtx.clip();

                const delta = u0 * (v1 - v2) + u1 * (v2 - v0) + u2 * (v0 - v1);
                const a = (p0.x * (v1 - v2) + p1.x * (v2 - v0) + p2.x * (v0 - v1)) / delta;
                const b = (p0.y * (v1 - v2) + p1.y * (v2 - v0) + p2.y * (v0 - v1)) / delta;
                const c = (p0.x * (u2 - u1) + p1.x * (u0 - u2) + p2.x * (u1 - u0)) / delta;
                const d = (p0.y * (u2 - u1) + p1.y * (u0 - u2) + p2.y * (u1 - u0)) / delta;
                const e = (p0.x * (u1 * v2 - u2 * v1) + p1.x * (u2 * v0 - u0 * v2) + p2.x * (u0 * v1 - u1 * v0)) / delta;
                const f = (p0.y * (u1 * v2 - u2 * v1) + p1.y * (u2 * v0 - u0 * v2) + p2.y * (u0 * v1 - u1 * v0)) / delta;

                targetCtx.transform(a, b, c, d, e, f);
                targetCtx.drawImage(img, 0, 0);
                targetCtx.restore();
            };

            drawTriangle(p[0], p[1], p[3], 0, 0, w, 0, 0, h);
            drawTriangle(p[1], p[2], p[3], w, 0, w, h, 0, h);
        }

        function getTransformHit(pos) {
            if (currentTool === 'perspective') {
                for (let i = 0; i < selectionCorners.length; i++) {
                    if (Math.hypot(pos.x - selectionCorners[i].x, pos.y - selectionCorners[i].y) < 20) return 'corner' + i;
                }
                if (isPointInPoly(pos, selectionCorners)) return 'move';
                return null;
            }

            const b = selectionBox;
            const centerX = b.x + b.w / 2;
            const centerY = b.y + b.h / 2;
            
            // Converter clique para coordenadas locais do box (rotacionadas)
            const dx = pos.x - centerX;
            const dy = pos.y - centerY;
            const cos = Math.cos(-b.angle);
            const sin = Math.sin(-b.angle);
            const localX = dx * cos - dy * sin;
            const localY = dx * sin + dy * cos;

            const s = b.scale;
            const hDist = 30 * s;

            // Checar alças de rotação (4 lados)
            if (Math.hypot(localX, localY + (b.h/2 * s + hDist)) < 15) return 'rotate'; // Topo
            if (Math.hypot(localX, localY - (b.h/2 * s + hDist)) < 15) return 'rotate'; // Baixo
            if (Math.hypot(localX + (b.w/2 * s + hDist), localY) < 15) return 'rotate'; // Esquerda
            if (Math.hypot(localX - (b.w/2 * s + hDist), localY) < 15) return 'rotate'; // Direita

            // Checar alças de escala (8 pontos)
            const sPoints = [
                { x: -b.w/2 * s, y: -b.h/2 * s }, { x: b.w/2 * s, y: -b.h/2 * s },
                { x: -b.w/2 * s, y: b.h/2 * s },  { x: b.w/2 * s, y: b.h/2 * s },
                { x: -b.w/2 * s, y: 0 },           { x: b.w/2 * s, y: 0 },
                { x: 0, y: -b.h/2 * s },           { x: 0, y: b.h/2 * s }
            ];
            for (let p of sPoints) {
                if (Math.abs(localX - p.x) < 15 && Math.abs(localY - p.y) < 15) return 'scale';
            }

            // Checar se está dentro para mover
            if (Math.abs(localX) < (b.w/2 * s) && Math.abs(localY) < (b.h/2 * s)) return 'move';
            
            return null;
        }

        function isPointInPoly(pt, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                if (((poly[i].y > pt.y) !== (poly[j].y > pt.y)) &&
                    (pt.x < (poly[j].x - poly[i].x) * (pt.y - poly[i].y) / (poly[j].y - poly[i].y) + poly[i].x)) inside = !inside;
            }
            return inside;
        }

        // --- Funções de Clipboard ---
        function handleCopy() {
            if (!isTransforming) return;
            clipboardCanvas = document.createElement('canvas');
            clipboardCanvas.width = selectionCanvas.width;
            clipboardCanvas.height = selectionCanvas.height;
            const cbCtx = clipboardCanvas.getContext('2d');
            cbCtx.drawImage(selectionCanvas, 0, 0);
            // Salva a posição e metadados da transformação
            clipboardBox = { ...selectionBox };
            clipboardCorners = selectionCorners.map(c => ({...c}));
        }

        function handleCut() {
            if (!isTransforming) return;
            handleCopy();
            // Simplesmente encerra sem aplicar o desenho de volta ao ctx
            isTransforming = false;
            transformMode = null;
            selectionPath = [];
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            saveFrameState(currentFrameIndex);
        }

        function handlePaste() {
            if (!clipboardCanvas) return;
            finishSelection(); // Garante que a seleção anterior seja aplicada

            // Prepara a nova seleção baseada no clipboard
            selectionCanvas.width = clipboardCanvas.width;
            selectionCanvas.height = clipboardCanvas.height;
            sCtx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
            sCtx.drawImage(clipboardCanvas, 0, 0);

            // Restaura a posição exata de onde foi copiado
            selectionBox = { ...clipboardBox };
            selectionCorners = clipboardCorners.map(c => ({...c}));

            isTransforming = true;
            currentTool = 'lasso';
            updateToolUI();
            drawTransformUI();
        }

        function finishSelection() {
            if (isTransforming) {
                if (currentTool === 'perspective') {
                    renderDistorted(ctx, selectionCanvas, selectionCorners);
                } else {
                    const b = selectionBox;
                    ctx.save();
                    ctx.translate(b.x + b.w/2, b.y + b.h/2);
                    ctx.rotate(b.angle);
                    ctx.scale(b.scale, b.scale);
                    ctx.drawImage(selectionCanvas, -b.w/2, -b.h/2);
                    ctx.restore();
                }
                
                isTransforming = false;
                transformMode = null;
                selectionPath = [];
                uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
                saveFrameState(currentFrameIndex);
            }
        }

        mainCanvas.addEventListener('pointerdown', startDrawing);
        window.addEventListener('pointermove', draw); // Escuta no window para capturar movimentos fora do canvas
        window.addEventListener('pointerup', stopDrawing);

        // Clique fora da seleção para confirmar
        workspace.addEventListener('mousedown', (e) => { if(e.target === workspace) finishSelection(); });

        // --- Gerenciamento de Frames ---
        async function saveFrameState(index) {
            if (isHistoryAction || !frames[index]) return;
            
            const oldData = frames[index].layers[activeLayerIndex];
            const newData = await createImageBitmap(mainCanvas);
            
            undoStack.push({ index: index, layer: activeLayerIndex, data: oldData });
            
            // LIMPEZA CRÍTICA: Fecha os bitmaps que estavam no Redo antes de limpar a stack
            redoStack.forEach(action => { if (action.data && action.data.close) action.data.close(); });
            redoStack = [];
            
            if (undoStack.length > 30) {
                const discarded = undoStack.shift();
                if (discarded.data && discarded.data.close) discarded.data.close();
            }

            frames[index].layers[activeLayerIndex] = newData;
            updateSingleThumbnail(index);
            updateLayerIndicators();
        }

        // --- Atalhos de Tamanho e Exibição ---
        const brushSizeInput = document.getElementById('brushSize');
        const brushOpacityInput = document.getElementById('brushOpacity');
        const sizeValDisplay = document.getElementById('sizeValDisplay');
        const opacityValDisplay = document.getElementById('opacityValDisplay');

        brushSizeInput.oninput = () => sizeValDisplay.textContent = brushSizeInput.value;
        brushOpacityInput.oninput = () => opacityValDisplay.textContent = brushOpacityInput.value + '%';

        function setBrushSize(val) {
            brushSizeInput.value = val;
            sizeValDisplay.textContent = val;
        }
        window.setBrushSize = setBrushSize; // Torna acessível globalmente para o onclick

        async function undo() {
            if (undoStack.length === 0) return;
            isHistoryAction = true;
            finishSelection();
            const lastAction = undoStack.pop();
            redoStack.push({ index: lastAction.index, layer: lastAction.layer, data: frames[lastAction.index].layers[lastAction.layer] });
            
            frames[lastAction.index].layers[lastAction.layer] = lastAction.data;
            activeLayerIndex = lastAction.layer;
            await loadFrame(lastAction.index);
            isHistoryAction = false;
        }

        async function redo() {
            if (redoStack.length === 0) return;
            isHistoryAction = true;
            finishSelection();
            const nextAction = redoStack.pop();
            
            // Antes de sobrescrever o frame atual com o redo, guardamos o estado atual no undo
            const currentData = frames[nextAction.index].layers[nextAction.layer];
            
            undoStack.push({ index: nextAction.index, layer: nextAction.layer, data: frames[nextAction.index].layers[nextAction.layer] });
            
            frames[nextAction.index].layers[nextAction.layer] = nextAction.data;
            activeLayerIndex = nextAction.layer;
            await loadFrame(nextAction.index);
            isHistoryAction = false;
        }

        async function deleteFrame(index) {
            if (isPlaying) return;
            finishSelection(); // Aplica qualquer transformação pendente antes de alterar a estrutura
            if (frames.length <= 1) {
                frames[0].layers.forEach(l => l && l.close && l.close());
                ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                frames = [{ layers: [null, null, null] }];
                currentFrameIndex = 0;
                renderTimeline(true);
                updateLayerIndicators();
                return;
            }

            frames[index].layers.forEach(l => l && l.close && l.close());
            const wasActive = (index === currentFrameIndex);
            frames.splice(index, 1);
            
            if (wasActive) {
                // Se deletou o frame que estava aberto, seleciona o vizinho sem salvar o estado anterior
                currentFrameIndex = Math.min(index, frames.length - 1);
                isHistoryAction = true; // Flag para impedir que loadFrame sobrescreva dados incorretamente
                loadFrame(currentFrameIndex);
                isHistoryAction = false;
            } else {
                // Se deletou um frame que não era o ativo, ajusta o índice se ele estava antes do atual
                if (index < currentFrameIndex) currentFrameIndex--;
            updateOnionSkin();
                renderTimeline();
            }
        }

        async function loadFrame(index) {
            finishSelection(); // Confirma qualquer seleção pendente no frame atual antes de trocar
            
            if (!isHistoryAction && frames[currentFrameIndex]) {
                const old = frames[currentFrameIndex].layers[activeLayerIndex];
                frames[currentFrameIndex].layers[activeLayerIndex] = await createImageBitmap(mainCanvas);
                if (old && old.close) old.close();
            }

            currentFrameIndex = index;
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            const activeData = frames[index].layers[activeLayerIndex];
            if (activeData) ctx.drawImage(activeData, 0, 0);

            updateOnionSkin();
            refreshLayerDisplay();
            renderTimeline();

            // Centraliza o frame atual na linha do tempo automaticamente (Scroll)
            const activeThumb = document.getElementById(`thumb-${index}`);
            if (activeThumb) {
                activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function updateLayerIndicators() {
            for (let i = 0; i < 3; i++) {
                const stat = document.getElementById(`l${i}-stat`);
                stat.textContent = frames[currentFrameIndex].layers[i] ? "●" : "○";
            }
        }

        function refreshLayerDisplay() {
            // Ajusta a profundidade do canvas de desenho para a posição da camada ativa
            mainCanvas.style.zIndex = activeLayerIndex + 1;
            
            // Modo Solo: Se ligado, esconde o fundo para economizar processamento
            bgCanvas.style.visibility = (soloMode) ? 'hidden' : 'visible';
            canvasContainer.style.backgroundColor = (soloMode) ? '#222' : '#ffffff';

            // Atualiza o destaque visual (cor azul) no menu de camadas para a camada ativa
            document.querySelectorAll('.layer-item').forEach((el, i) => {
                el.classList.toggle('active', (2 - i) === activeLayerIndex);
            });

            // Limpa e redesenha os canvases de visualização de camadas (exceto a ativa)
            for (let i = 0; i < 3; i++) {
                const lCanvas = document.getElementById(`layer${i}`);
                const lCtx = lCanvas.getContext('2d');
                
                // No modo solo, escondemos as outras camadas
                if (i === activeLayerIndex || (soloMode && i !== activeLayerIndex)) {
                    lCtx.clearRect(0, 0, lCanvas.width, lCanvas.height);
                } else if (!soloMode && frames[currentFrameIndex].layers[i]) {
                    lCtx.clearRect(0, 0, lCanvas.width, lCanvas.height);
                    lCtx.drawImage(frames[currentFrameIndex].layers[i], 0, 0);
                } else {
                    lCtx.clearRect(0, 0, lCanvas.width, lCanvas.height);
                }
            }
            updateLayerIndicators();
        }

        async function addBlankFrame() {
            if (isPlaying) return;
            finishSelection();
            await saveFrameState(currentFrameIndex);
            
            frames.splice(currentFrameIndex + 1, 0, { layers: [null, null, null], duration: 1 });
            await loadFrame(currentFrameIndex + 1);
        }

        async function duplicateFrame() {
            if (isPlaying) return;
            finishSelection();
            await saveFrameState(currentFrameIndex);
            
            // Clona as camadas criando novos Bitmaps para evitar problemas de referência compartilhada
            const newLayers = await Promise.all(frames[currentFrameIndex].layers.map(async (l) => {
                return l ? await createImageBitmap(l) : null;
            }));

            frames.splice(currentFrameIndex + 1, 0, { 
                layers: newLayers, 
                duration: frames[currentFrameIndex].duration || 1 
            });
            await loadFrame(currentFrameIndex + 1);
        }

        onionToggle.addEventListener('change', updateOnionSkin);
        onionOpacitySlider.addEventListener('input', (e) => {
            onionCanvas.style.opacity = e.target.value / 100;
        });

        function updateOnionSkin() {
            onionCtx.clearRect(0, 0, onionCanvas.width, onionCanvas.height);
            if (onionToggle.checked && currentFrameIndex > 0 && !isPlaying) {
                // Onion skin agora mostra a união das camadas do frame anterior
                const prevFrame = frames[currentFrameIndex - 1];
                prevFrame.layers.forEach(layerData => {
                    if (layerData) onionCtx.drawImage(layerData, 0, 0);
                });
            }
        }

        // --- Lógica de Background ---
        bgImgBtn.onclick = () => bgInput.click();
        clearBgBtn.onclick = () => {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgInput.value = ""; 
            showNotification("Imagem de fundo removida");
        };
        bgInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                    // Desenha a imagem preenchendo o canvas proporcionalmente (cover)
                    const scale = Math.max(bgCanvas.width / img.width, bgCanvas.height / img.height);
                    const x = (bgCanvas.width / 2) - (img.width / 2) * scale;
                    const y = (bgCanvas.height / 2) - (img.height / 2) * scale;
                    bgCtx.drawImage(img, x, y, img.width * scale, img.height * scale);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // --- Menu Arquivo e Importação ---
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
            layersDropdown.classList.remove('show');
        });

        window.addEventListener('click', (e) => {
            // O menu principal fecha se clicar fora dele
            if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
                menuDropdown.classList.remove('show');
            }
            // O menu de camadas NÃO fecha ao clicar na timeline ou nos botões de controle
        });

        importImgMenu.onclick = (e) => {
            e.preventDefault();
            importInput.click();
        };

        exportPngSequenceMenu.onclick = (e) => { e.preventDefault(); exportPngSequence(); };
        exportImgTransparentMenu.onclick = (e) => { e.preventDefault(); exportFrames(false); };
        exportImgBackgroundMenu.onclick = (e) => { e.preventDefault(); exportFrames(true); };
        exportVideoMenu.onclick = (e) => { e.preventDefault(); exportVideo(false); };
        exportVideoTransparentMenu.onclick = (e) => { e.preventDefault(); exportVideo(true); };

        async function exportFrames(withBackground) {
            finishSelection();
            saveFrameState(currentFrameIndex);

            const zip = new JSZip();
            const imgFolder = zip.folder("frames");
            
            // Canvas temporário para compor as camadas antes de exportar
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = mainCanvas.width;
            tempCanvas.height = mainCanvas.height;
            const tCtx = tempCanvas.getContext('2d');

            for (let i = 0; i < frames.length; i++) {
                tCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
                
                if (withBackground) {
                    // Preenche com branco (folha) e depois desenha o cenário (bgCanvas)
                    tCtx.fillStyle = '#ffffff';
                    tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                    tCtx.drawImage(bgCanvas, 0, 0);
                }

                for(let l = 0; l < 3; l++) {
                    const layerData = frames[i].layers[l];
                    if(layerData) tCtx.drawImage(layerData, 0, 0);
                }

                const base64Data = tempCanvas.toDataURL('image/png').split(',')[1];
                imgFolder.file(`frame_${String(i + 1).padStart(3, '0')}.png`, base64Data, {base64: true});
            }

            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = withBackground ? "animacao_com_fundo.zip" : "animacao_transparente.zip";
            link.click();
            showNotification("ZIP gerado com sucesso!");
        }

        async function exportPngSequence() {
            if (frames.length === 0) {
                showNotification("Nenhum frame para exportar");
                return;
            }
            finishSelection();
            saveFrameState(currentFrameIndex);

            try {
                const dirHandle = await window.showDirectoryPicker();
                
                const exportFps = 24;
                // Calcula a duração total da animação baseada no FPS atual da linha do tempo
                const animationDuration = frames.length / fps;
                // Define o total de frames necessários para uma saída de 24 FPS
                const totalExportFrames = Math.max(1, Math.floor(animationDuration * exportFps));

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = mainCanvas.width;
                tempCanvas.height = mainCanvas.height;
                const tCtx = tempCanvas.getContext('2d');

                for (let i = 0; i < totalExportFrames; i++) {
                    // Mapeia o frame de exportação atual para o frame correspondente na animação original
                    const frameIdx = Math.floor((i / exportFps) * fps);
                    const targetFrame = Math.min(frameIdx, frames.length - 1);

                    tCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
                    
                    for(let l = 0; l < 3; l++) {
                        const layerData = frames[targetFrame].layers[l];
                        if(layerData) tCtx.drawImage(layerData, 0, 0);
                    }

                    const blob = await new Promise(resolve => tempCanvas.toBlob(resolve, 'image/png'));
                    const fileName = `frame_${String(i + 1).padStart(5, '0')}.png`;
                    const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                }
                showNotification(`Exportação concluída: ${totalExportFrames} frames`);
            } catch (e) {
                if (e.name !== 'AbortError') showNotification("Erro: " + e.message);
            }
        }

        async function exportVideo(withTransparency = false) {
            if (frames.length === 0) {
                showNotification("Nenhum frame para exportar");
                return;
            }
            finishSelection();
            saveFrameState(currentFrameIndex);

            // Prepara canvas de composição (1080p)
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = mainCanvas.width;
            tempCanvas.height = mainCanvas.height;
            const tCtx = tempCanvas.getContext('2d');

            // Inicializa o Muxer (VP9)
            const muxer = new WebMMuxer.Muxer({
                target: new WebMMuxer.ArrayBufferTarget(),
                video: {
                    codec: withTransparency ? 'V_VP8' : 'V_VP9',
                    width: tempCanvas.width,
                    height: tempCanvas.height,
                    frameRate: parseInt(fps)
                }
            });

            // Configura o VideoEncoder (WebCodecs)
            const encoder = new VideoEncoder({
                output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                error: (e) => console.error(e)
            });

            encoder.configure({
                codec: withTransparency ? 'vp8' : 'vp09.00.10.08', // VP8 é necessário para exportar canal Alpha corretamente
                width: tempCanvas.width,
                height: tempCanvas.height,
                bitrate: 5e6, // 5 Mbps para alta qualidade
            });

            const frameDuration = 1000000 / fps; // microssegundos

            for (let i = 0; i < frames.length; i++) {
                // Composição do frame
                tCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);

                if (!withTransparency) {
                    tCtx.fillStyle = '#ffffff';
                    tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                    tCtx.drawImage(bgCanvas, 0, 0);
                }

                for(let l = 0; l < 3; l++) {
                    const layerData = frames[i].layers[l];
                    if(layerData) tCtx.drawImage(layerData, 0, 0);
                }

                // Cria o VideoFrame a partir do canvas composto
                const frame = new VideoFrame(tempCanvas, { timestamp: i * frameDuration });
                encoder.encode(frame);
                frame.close(); // Libera memória imediatamente
            }

            await encoder.flush();
            muxer.finalize();

            // Download do resultado
            const { buffer } = muxer.target;
            const blob = new Blob([buffer], { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = withTransparency ? "animacao_transparente.webm" : "animacao_vp9.webm";
            a.click();
            URL.revokeObjectURL(url);
            showNotification("Vídeo exportado!");
        }

        // --- Salvar e Carregar Projeto ---
        saveProjectMenu.onclick = async (e) => {
            e.preventDefault();
            finishSelection();
            await saveFrameState(currentFrameIndex);

            // Converte Bitmaps e Duração para o salvamento
            const serializedFrames = await Promise.all(frames.map(async f => {
                const layers = await Promise.all(f.layers.map(async l => {
                    if (!l) return null;
                    const canvas = document.createElement('canvas');
                    canvas.width = mainCanvas.width;
                    canvas.height = mainCanvas.height;
                    canvas.getContext('2d').drawImage(l, 0, 0);
                    return canvas.toDataURL();
                }));
                return { layers, duration: f.duration || 1 };
            }));

            const projectData = {
                fps: fps,
                frames: serializedFrames,
                background: bgCanvas.toDataURL()
            };

            const blob = new Blob([JSON.stringify(projectData)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "meu_projeto_animacao.json";
            a.click();
            URL.revokeObjectURL(url);
            showNotification("Projeto salvo com sucesso!");
        };

        loadProjectMenu.onclick = (e) => {
            e.preventDefault();
            projectInput.click();
        };

        projectInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const data = JSON.parse(event.target.result);
                
                fps = data.fps || 12;
                document.getElementById('fpsSlider').value = fps;
                document.getElementById('fpsValue').textContent = fps;

                const bgImg = new Image();
                bgImg.onload = () => {
                    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                    bgCtx.drawImage(bgImg, 0, 0);
                };
                bgImg.src = data.background;

                // Converter Base64 de volta para Bitmaps para performance
                frames = await Promise.all(data.frames.map(async f => {
                    const layers = await Promise.all(f.layers.map(async l => {
                        if (!l) return null;
                        const img = new Image();
                        img.src = l;
                        await new Promise(res => img.onload = res);
                        const bmp = await createImageBitmap(img);
                        return bmp;
                    }));
                    return { layers, duration: f.duration || 1 };
                }));

                undoStack = [];
                redoStack = [];
                isHistoryAction = true; // Impede que o canvas atual sobrescreva o primeiro frame do projeto carregado
                loadFrame(0);
                isHistoryAction = false;
            };
            reader.readAsText(file);
        };

        importInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    finishSelection(); // Aplica qualquer seleção anterior
                    selectionCanvas.width = img.width;
                    selectionCanvas.height = img.height;
                    sCtx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
                    sCtx.drawImage(img, 0, 0);

                    const x = mainCanvas.width / 2 - img.width / 2;
                    const y = mainCanvas.height / 2 - img.height / 2;
                    selectionBox = { x, y, w: img.width, h: img.height, angle: 0, scale: 1 };
                    selectionCorners = [{x,y}, {x:x+img.width,y}, {x:x+img.width,y:y+img.height}, {x,y:y+img.height}];
                    isTransforming = true;
                    currentTool = 'lasso';
                    updateToolUI();
                    drawTransformUI();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function renderTimeline(full = false) {
            // Atualiza o contador numérico de frames
            const counter = document.getElementById('frameCounterDisplay');
            if (counter) counter.textContent = `${currentFrameIndex + 1}/${frames.length}`;

            if (!full && timeline.children.length === frames.length) {
                // Se o número de frames não mudou, apenas atualizamos o destaque visual (borda azul)
                Array.from(timeline.children).forEach((thumb, index) => {
                    thumb.classList.toggle('active', index === currentFrameIndex);
                });
                updateSingleThumbnail(currentFrameIndex);
                return;
            }

            timeline.innerHTML = '';
            frames.forEach((frameData, index) => {
                const thumb = document.createElement('div');
                thumb.className = `frame-thumb ${index === currentFrameIndex ? 'active' : ''}`;
                thumb.id = `thumb-${index}`;
                thumb.draggable = true;
                
                thumb.onclick = () => { if (!isPlaying) loadFrame(index); };

                // Handlers para Arrastar e Soltar
                thumb.ondragstart = (e) => {
                    if (isPlaying) return e.preventDefault();
                    e.dataTransfer.setData('text/plain', index);
                    setTimeout(() => thumb.style.opacity = '0.5', 0);
                };

                thumb.ondragend = () => {
                    thumb.style.opacity = '1';
                };

                thumb.ondragover = (e) => {
                    e.preventDefault(); // Necessário para permitir o drop
                };

                thumb.ondrop = (e) => {
                    e.preventDefault();
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIndex = index;
                    if (fromIndex !== toIndex) {
                        moveFrame(fromIndex, toIndex);
                    }
                };

                timeline.appendChild(thumb);
                updateSingleThumbnail(index);

                // Adiciona interface de duração
                const badge = document.createElement('div');
                badge.className = 'duration-badge';
                badge.textContent = `${frameData.duration || 1}x`;
                thumb.appendChild(badge);

                const controls = document.createElement('div');
                controls.className = 'duration-controls';
                
                const minus = document.createElement('button');
                minus.className = 'dur-btn'; minus.textContent = '-';
                minus.onclick = (e) => {
                    e.stopPropagation();
                    frameData.duration = Math.max(1, (frameData.duration || 1) - 1);
                    badge.textContent = `${frameData.duration}x`; // Atualiza apenas o texto
                };
                const plus = document.createElement('button');
                plus.className = 'dur-btn'; plus.textContent = '+';
                plus.onclick = (e) => {
                    e.stopPropagation();
                    frameData.duration = (frameData.duration || 1) + 1;
                    badge.textContent = `${frameData.duration}x`; // Atualiza apenas o texto
                };
                controls.append(minus, plus);
                thumb.appendChild(controls);
            });
        }

        async function moveFrame(from, to) {
            finishSelection();
            await saveFrameState(currentFrameIndex); // Garante que o desenho atual foi salvo antes de mover

            const activeFrameObj = frames[currentFrameIndex];
            const movedFrame = frames.splice(from, 1)[0];
            frames.splice(to, 0, movedFrame);
            
            // Encontra a nova posição do frame que estávamos editando
            const newIndex = frames.indexOf(activeFrameObj);
            
            // Carrega o frame na nova posição e atualiza toda a interface
            isHistoryAction = true; // Impede salvamento redundante durante o recarregamento
            await loadFrame(newIndex);
            isHistoryAction = false;
        }

        async function updateSingleThumbnail(index) {
            const thumb = document.getElementById(`thumb-${index}`);
            if (!thumb) return;
            
            const lastFilledLayer = [...frames[index].layers].reverse().find(l => l !== null);
            if (lastFilledLayer) {
                const canvas = document.createElement('canvas');
                canvas.width = 160; canvas.height = 90;
                canvas.getContext('2d').drawImage(lastFilledLayer, 0, 0, 160, 90);
                thumb.style.backgroundImage = `url(${canvas.toDataURL()})`;
            } else {
                thumb.style.backgroundImage = 'none';
            }
        }

        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            saveFrameState(currentFrameIndex);
        });

        document.getElementById('deleteCurrentFrameBtn').addEventListener('click', () => {
            deleteFrame(currentFrameIndex);
        });

        document.getElementById('addFrameBtn').addEventListener('click', addBlankFrame);
        document.getElementById('duplicateFrameBtn').addEventListener('click', duplicateFrame);

        // Eventos de Clipboard
        document.getElementById('copyBtn').onclick = handleCopy;
        document.getElementById('cutBtn').onclick = handleCut;
        document.getElementById('pasteBtn').onclick = handlePaste;
        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('redoBtn').onclick = redo;

        // Atalhos de Teclado
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'c' || e.key === 'C') handleCopy();
                if (e.key === 'v' || e.key === 'V') handlePaste();
                if (e.key === 'x' || e.key === 'X') handleCut();
                if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); if(e.shiftKey) redo(); else undo(); }
                if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); redo(); }
            }
            if (e.key === 'Enter') finishSelection();
            if (e.key === 'Delete' || e.key === 'Backspace') if(isTransforming) handleCut(); // Delete funciona como cut sem salvar
        });

        // Controle de FPS
        document.getElementById('fpsSlider').addEventListener('input', (e) => {
            fps = e.target.value;
            document.getElementById('fpsValue').textContent = fps;
            if (isPlaying) {
                toggleAnimation(); // Reinicia para aplicar a nova velocidade
                toggleAnimation();
            }
        });

        // --- Player de Animação ---
        let playSessionId = 0;

        function toggleAnimation() {
            if (frames.length <= 1) return;
            finishSelection(); // Garante que não haja nada flutuando ao dar play
            
            if (!isPlaying) {
                saveFrameState(currentFrameIndex);
                playSessionId++;
            }

            isPlaying = !isPlaying;
            
            document.getElementById('playBtn').style.display = isPlaying ? 'none' : 'block';
            document.getElementById('stopBtn').style.display = isPlaying ? 'block' : 'none';
            playbackCanvas.style.display = isPlaying ? 'block' : 'none';

            if (isPlaying) {
                const currentSession = playSessionId;
                toggleStaticLayersVisibility(false);
                mainCanvas.style.visibility = 'hidden'; 
                onionCtx.clearRect(0, 0, onionCanvas.width, onionCanvas.height);
                
                // Criar o canvas de buffer apenas UMA vez ao iniciar o play para economizar memória e CPU
                const offscreen = document.createElement('canvas');
                offscreen.width = playbackCanvas.width;
                offscreen.height = playbackCanvas.height;
                const offCtx = offscreen.getContext('2d');
                
                let playIndex = 0;
                const runPlayback = () => {
                    if (!isPlaying || currentSession !== playSessionId) return;
                    const startTime = performance.now(); // Marca o início do processamento do frame

                    offCtx.fillStyle = 'white'; 
                    offCtx.fillRect(0, 0, offscreen.width, offscreen.height);
                    offCtx.drawImage(bgCanvas, 0, 0);

                    for (const layerData of frames[playIndex].layers) {
                        if (layerData) offCtx.drawImage(layerData, 0, 0);
                    }

                    if (isPlaying && currentSession === playSessionId) {
                        pCtx.clearRect(0, 0, playbackCanvas.width, playbackCanvas.height);
                        pCtx.drawImage(offscreen, 0, 0);
                        
                        const hold = frames[playIndex].duration || 1;
                        const targetInterval = (1000 / fps) * hold;
                        playIndex = (playIndex + 1) % frames.length;

                        // Calcula quanto tempo o desenho demorou e subtrai do próximo delay
                        const processingTime = performance.now() - startTime;
                        const nextDelay = Math.max(0, targetInterval - processingTime);
                        
                        setTimeout(runPlayback, nextDelay);
                    }
                };

                runPlayback();
            } else {
                playSessionId++; // Invalida callbacks de imagens que ainda estejam carregando
                mainCanvas.style.visibility = 'visible';
                toggleStaticLayersVisibility(true);
                isHistoryAction = true; // Impede que o loadFrame salve a imagem mesclada do playback sobre a sua camada original
                loadFrame(currentFrameIndex);
                isHistoryAction = false;
            }
        }

        function toggleStaticLayersVisibility(visible) {
            const display = visible ? 'block' : 'none';
            document.getElementById('layer0').style.display = display;
            document.getElementById('layer1').style.display = display;
            document.getElementById('layer2').style.display = display;
            const onion = document.getElementById('onionCanvas');
            if (onion) onion.style.display = display;
        }

        document.getElementById('playBtn').addEventListener('click', toggleAnimation);
        document.getElementById('stopBtn').addEventListener('click', toggleAnimation);

    </script>
