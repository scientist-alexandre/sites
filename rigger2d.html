            const btnDown = document.createElement('button');
            btnDown.innerText = "↓";
            btnDown.className = "btn-import-small";
            btnDown.onclick = (e) => { e.stopPropagation(); moveLayer(idx, -1); };

            const btnDelLayer = document.createElement('button');
            btnDelLayer.innerText = "❌";
            btnDelLayer.className = "btn-import-small";
            btnDelLayer.title = "Deletar Camada/Pasta";
            btnDelLayer.style.color = "var(--accent-red)";
            btnDelLayer.onclick = (e) => { 
                e.stopPropagation(); 
                deleteLayer(idx); 
            };

            controls.appendChild(btnVis);
            if (l.isFolder) {
                const btnSync = document.createElement('button');
                btnSync.innerText = "🔗";
                btnSync.className = "btn-import-small";
                btnSync.title = "Sincronizar Transformação (Copia posição, rotação e escala da camada selecionada para todas nesta pasta)";
                btnSync.onclick = (e) => { 
                    e.stopPropagation(); 
                    syncFolderTransforms(idx); 
                };
                controls.appendChild(btnSync);
            }
            controls.appendChild(btnRename);
            controls.appendChild(btnExport); // Export button always present for layers
            controls.appendChild(btnUp);
            controls.appendChild(btnDown);
            if (!l.isFolder) {
                const btnDelAsset = document.createElement('button');
                btnDelAsset.innerText = "🗑️";
                btnDelAsset.className = "btn-import-small";
                btnDelAsset.title = "Deletar esta variação de imagem";
                btnDelAsset.onclick = (e) => { 
                    e.stopPropagation(); 
                    deleteAssetFromLayer(idx); 
                };
                controls.appendChild(btnDelAsset);
            }
            controls.appendChild(btnDelLayer);
            div.appendChild(renameInput);
            div.appendChild(nameSpan);
            if (assetSelect) div.appendChild(assetSelect);
            div.appendChild(controls);
            list.appendChild(div);

            if (l.isFolder && l.expanded) {
                layers.map((child, cIdx) => ({child, cIdx}))
                      .filter(item => item.child.parentId === l.uid)
                      .sort((a, b) => b.cIdx - a.cIdx)
                      .forEach(item => renderLayer(item.child, item.cIdx));
            }
        };

        layers.map((l, i) => ({l, i}))
              .filter(item => !item.l.parentId || !layers.some(p => p.uid === item.l.parentId))
              .sort((a, b) => b.i - a.i)
              .forEach(item => renderLayer(item.l, item.i));

        // CORREÇÃO: Removida a proteção contra ciclos agressiva.
        // O bug ocorria porque itens dentro de pastas fechadas não eram marcados como 'renderedUids',
        // fazendo com que este loop resetasse o parentId deles para null, tirando-os da pasta.
        // Camadas órfãs (sem pai existente) já são tratadas pelo filtro de raiz no início da função.
        // Camadas em circularidade são evitadas pelos guards no handleDrop.
    }

    function handleDrop(toIndex, toRoot = false) {
        if (draggedLayerIndex === null) return;
        if (!toRoot && draggedLayerIndex === toIndex) return;
        
        const fromLayer = layers[draggedLayerIndex];

        // Validação de segurança: impede circularidade antes de processar
        if (!toRoot) {
            const toLayer = layers[toIndex];
            if (fromLayer.uid === toLayer.uid || isDescendant(fromLayer.uid, toLayer.uid)) {
                alert("Operação inválida: não é possível mover um item para dentro de si mesmo ou de seus sub-itens.");
                draggedLayerIndex = null;
                return;
            }
        }

        const block = [fromLayer, ...getDescendants(fromLayer.uid)];
        const fromIndices = block.map(l => layers.indexOf(l)).sort((a, b) => a - b);

        if (toRoot) {
            fromLayer.parentId = null;
        } else {
            const toLayer = layers[toIndex];
            if (toLayer.isFolder) {
                fromLayer.parentId = toLayer.uid;
            } else if (toLayer.parentId) {
                fromLayer.parentId = toLayer.parentId;
            } else {
                fromLayer.parentId = null;
            }
        }

        // Referência para manter a camada ativa selecionada após a reordenação
        const activeLayerObj = (activeLayerIndex !== -1 && activeLayerIndex !== 'bg') ? layers[activeLayerIndex] : null;

        // Extrai o bloco (itens e estados)
        const removedItems = [];
        const removedStates = keyframes.map(() => []);

        // Remove de trás para frente para não invalidar os índices durante a remoção
        [...fromIndices].reverse().forEach(idx => {
            removedItems.push(layers.splice(idx, 1)[0]);
            keyframes.forEach((kf, kIdx) => {
                removedStates[kIdx].push(kf.layerStates.splice(idx, 1)[0]);
            });
        });

        removedItems.reverse();
        removedStates.forEach(rs => rs.reverse());

        // Ajusta o índice de destino após as remoções
        let adjToIndex = toIndex;
        fromIndices.forEach(idx => {
            if (idx < adjToIndex) adjToIndex--;
        });

        // Insere o bloco na nova posição
        layers.splice(adjToIndex, 0, ...removedItems);
        keyframes.forEach((kf, kIdx) => {
            kf.layerStates.splice(adjToIndex, 0, ...removedStates[kIdx]);
            
            // Sênior Fix: Garante que a nova hierarquia persista em todos os quadros da animação
            if (kf.layerStates[adjToIndex]) {
                kf.layerStates[adjToIndex].parentId = fromLayer.parentId;
            }
        });

        // 3. Atualiza o índice da camada ativa baseado na nova posição do objeto
        if (activeLayerObj) activeLayerIndex = layers.indexOf(activeLayerObj);

        draggedLayerIndex = null;
        updateLayersUI();
        draw();
    }

    function moveLayer(index, direction) {
        const item = layers[index];
        const block = [item, ...getDescendants(item.uid)];
        const blockIndices = block.map(l => layers.indexOf(l)).sort((a, b) => a - b);
        const first = blockIndices[0];
        const last = blockIndices[blockIndices.length - 1];

        if (direction > 0) { // Mover para Cima (Frente no Z)
            if (last >= layers.length - 1) return;
            const targetIdx = last + 1;
            const targetItem = layers.splice(targetIdx, 1)[0];
            layers.splice(first, 0, targetItem);
            keyframes.forEach(kf => {
                const state = kf.layerStates.splice(targetIdx, 1)[0];
                kf.layerStates.splice(first, 0, state);
            });
        } else { // Mover para Baixo (Trás no Z)
            if (first <= 0) return;
            const targetIdx = first - 1;
            const targetItem = layers.splice(targetIdx, 1)[0];
            layers.splice(last, 0, targetItem);
            keyframes.forEach(kf => {
                const state = kf.layerStates.splice(targetIdx, 1)[0];
                kf.layerStates.splice(last, 0, state);
            });
        }
        activeLayerIndex = layers.indexOf(item);
        updateLayersUI();
        draw();
    }

    function syncFolderTransforms(folderIdx) {
        // Sincroniza o estado global atual com o objeto da camada ativa antes de espalhar
        syncActiveLayer();

        const folder = layers[folderIdx];
        if (activeLayerIndex === -1 || activeLayerIndex === 'bg') return;
        const refLayer = layers[activeLayerIndex];

        // Verifica se a referência é a própria pasta ou um descendente dela
        if (refLayer.uid !== folder.uid && !isDescendant(folder.uid, refLayer.uid)) {
            alert("Selecione uma camada ou a própria pasta para servir de referência.");
            return;
        }

        const descendants = getDescendants(folder.uid);
        descendants.forEach(l => {
            if (l.isFolder) return;
            l.gPos = { x: refLayer.gPos.x, y: refLayer.gPos.y };
            l.gRotation = refLayer.gRotation;
            l.gScale = refLayer.gScale;
        });

        setKeyframe(false);
        draw();
    }

    function deleteLayer(idx) {
        layers.splice(idx, 1);
        keyframes.forEach(kf => {
            if (kf.layerStates) kf.layerStates.splice(idx, 1);
        });
        if (activeLayerIndex === idx) activeLayerIndex = -1;
        else if (activeLayerIndex > idx) activeLayerIndex--;
        
        updateLayersUI();
        draw();
    }

    function deleteBgAsset(idx) {
        if (idx === -1) return;
        bgAssets.splice(idx, 1);
        activeBgAssetIndex = bgAssets.length > 0 ? 0 : -1;
        keyframes.forEach(kf => {
            kf.bgAssetIndex = activeBgAssetIndex;
        });
        updateLayersUI();
        draw();
    }

    // Função de Easing (Suavização) Profissional - Ease In Out
    function easeInOutQuad(t) {
        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    function deleteAssetFromLayer(lIdx) {
        const l = layers[lIdx];
        if (l.assets.length <= 1) return;
        l.assets.splice(l.activeAssetIndex, 1);
        l.activeAssetIndex = 0;
        updateLayersUI();
        draw();
    }

    function importAudio(input) {
        const file = input.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const audio = new Audio(url);
        
        audio.onloadedmetadata = () => {
            const fps = getFps();
            const durationFrames = Math.ceil(audio.duration * fps);
            const clip = {
                id: generateUid(),
                name: file.name,
                element: audio,
                startFrame: Math.round(currentFrame),
                durationFrames: durationFrames,
                startTimeOffset: 0
            };
            audioClips.push(clip);
            updateTimelineVisual();
            input.value = "";
        };
    }

    function splitAudio() {
        if (selectedAudioClip) {
            splitSpecificAudio(selectedAudioClip);
        } else {
            // Se nada estiver selecionado, tenta cortar o áudio da pista 0 que estiver sob o playhead
            const f = Math.round(currentFrame);
            const clipsAtFrame = audioClips.filter(c => f > c.startFrame && f < c.startFrame + c.durationFrames);
            if (clipsAtFrame.length > 0) {
                // Ordena por pista para pegar o mais "visível" (topo)
                clipsAtFrame.sort((a, b) => (a.lane || 0) - (b.lane || 0));
                splitSpecificAudio(clipsAtFrame[0]);
            }
        }
    }

    function splitSpecificAudio(clip) {
        if (isPlaying) togglePlay();
        const f = Math.round(currentFrame);
        const fps = getFps();
        
        if (f <= clip.startFrame || f >= clip.startFrame + clip.durationFrames) return;

        const framesInFirstPart = f - clip.startFrame;
        const secondsInFirstPart = framesInFirstPart / fps;

        const newClip = {
            id: generateUid(),
            name: clip.name + " (C)",
            element: new Audio(clip.element.src),
            startFrame: f,
            durationFrames: clip.durationFrames - framesInFirstPart,
            startTimeOffset: (clip.startTimeOffset || 0) + secondsInFirstPart
        };

        clip.durationFrames = framesInFirstPart;
        audioClips.push(newClip);
        selectedAudioClip = newClip; // Seleciona a parte da direita automaticamente
        updateTimelineVisual();
    }

    function deleteAudioClip(id) {
        const idx = audioClips.findIndex(c => c.id === id);
        if (idx === -1) return;
        if (selectedAudioClip && selectedAudioClip.id === id) selectedAudioClip = null;
        audioClips[idx].element.pause();
        audioClips.splice(idx, 1);
        updateTotalFrames();
        updateTimelineVisual();
    }

    let lastDrawnMaxFrame = 0;
    function updateTimelineVisual() {
        const kfTrack = document.getElementById('track-keyframes');
        const audioTrack = document.getElementById('track-audio');
        const rulerTrack = document.getElementById('track-ruler');
        const LABEL_OFFSET = 120;

        updateTotalFrames();
        // Determina o limite da timeline: o maior entre o último frame usado, 
        // o frame atual, ou um mínimo de 300. Adiciona 100 frames de "respiro".
        const maxFrames = Math.max(totalFrames, Math.ceil(currentFrame), 300) + 100;
        lastDrawnMaxFrame = maxFrames;

        const totalWidth = (maxFrames * FRAME_WIDTH) + LABEL_OFFSET;
        
        // Aplica a largura dinâmica aos trilhos para permitir o scroll
        kfTrack.style.width = totalWidth + 'px';
        audioTrack.style.width = totalWidth + 'px';
        rulerTrack.style.width = totalWidth + 'px';

        // Limpa marcas antigas
        [...kfTrack.querySelectorAll('.kf-mark')].forEach(m => m.remove());
        [...audioTrack.querySelectorAll('.audio-block')].forEach(m => m.remove());
        [...rulerTrack.querySelectorAll('.frame-number, .frame-tick')].forEach(m => m.remove());

        // Renderiza Régua
        for (let i = 1; i <= maxFrames; i++) {
            if (i === 1 || i % 5 === 0) {
                const num = document.createElement('span');
                num.className = 'frame-number';
                num.style.cssText = `position:absolute; left:${LABEL_OFFSET + (i-1)*FRAME_WIDTH}px; font-size:9px; color:#555; transform:translateX(-50%); top:2px;`;
                num.innerText = i;
                rulerTrack.appendChild(num);
            }
            const tick = document.createElement('div');
            tick.className = 'frame-tick';
            tick.style.left = (LABEL_OFFSET + (i-1) * FRAME_WIDTH) + 'px';
            if (i % 5 === 0) tick.style.height = '10px';
            rulerTrack.appendChild(tick);
        }

        // Renderiza Keyframes
        keyframes.forEach(kf => {
            const div = document.createElement('div');
            div.className = 'kf-mark';
            div.style.left = (LABEL_OFFSET + (kf.frame - 1) * FRAME_WIDTH) + 'px';
            kfTrack.appendChild(div);
        });

        // Renderiza Áudios
        // Renderiza Áudios com Pistas Estáticas
        let maxLane = 0;
        audioClips.forEach(clip => {
            const lane = clip.lane || 0;
            if (lane > maxLane) maxLane = lane;

            const div = document.createElement('div');
            div.className = 'audio-block';
            if (clip === selectedAudioClip) div.style.border = "2px solid white";
            div.style.left = (LABEL_OFFSET + (clip.startFrame - 1) * FRAME_WIDTH) + 'px';
            div.style.width = (clip.durationFrames * FRAME_WIDTH) + 'px';
            div.style.top = (lane * 30 + 4) + 'px';
            div.style.paddingLeft = "20px";
            div.innerText = clip.name;

            const leftHandle = document.createElement('div');
            leftHandle.className = 'resize-handle left';
            leftHandle.onmousedown = (e) => {
                e.stopPropagation();
                resizingAudioClip = clip;
                resizeSide = 'left';
                audioResizeStartX = e.clientX;
                audioInitialStartFrame = clip.startFrame;
                initialResizeDuration = clip.durationFrames;
                initialResizeTimeOffset = clip.startTimeOffset || 0;
            };
            div.appendChild(leftHandle);

            const rightHandle = document.createElement('div');
            rightHandle.className = 'resize-handle right';
            rightHandle.onmousedown = (e) => {
                e.stopPropagation();
                resizingAudioClip = clip;
                resizeSide = 'right';
                audioResizeStartX = e.clientX;
                initialResizeDuration = clip.durationFrames;
            };
            div.appendChild(rightHandle);

            div.onmousedown = (e) => {
                e.stopPropagation(); // Impede que a timeline mude de frame ao clicar no áudio
                e.stopPropagation();
                selectedAudioClip = clip;
                draggedAudioClip = clip;
                audioDragStartX = e.clientX;
                audioDragStartY = e.clientY;
                audioInitialStartFrame = clip.startFrame;
                audioInitialLane = clip.lane || 0;
                updateTimelineVisual();
            };
            div.onclick = (e) => e.stopPropagation();

            const delBtn = document.createElement('span');
            delBtn.innerText = '✕';
            delBtn.style.cssText = "position:absolute; left:2px; top:4px; cursor:pointer; background:#444444; color:white; border-radius:50%; width:14px; height:14px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold;";
            delBtn.onmousedown = (e) => {
                e.stopPropagation(); // Impede que o clique selecione/arraste o áudio
                deleteAudioClip(clip.id);
            };
            div.appendChild(delBtn);
            audioTrack.appendChild(div);
        });
    }

    function handleTimelineClick(e) {
        const rect = document.getElementById('timeline-visual-area').getBoundingClientRect();
        const x = e.clientX - rect.left + document.getElementById('timeline-visual-area').scrollLeft;
        const LABEL_OFFSET = 120;
        if (x < LABEL_OFFSET) return;
        selectedAudioClip = null;
        const frame = Math.round((x - LABEL_OFFSET) / FRAME_WIDTH) + 1;
        seek(Math.max(1, frame), true);
    }

    function computeLayerMatrix(l) {
        let mat = new DOMMatrix();
        if (l.parentId) {
            let parent = layers.find(p => p.uid === l.parentId);
            if (parent) mat = computeLayerMatrix(parent);
        }
        mat.translateSelf(FW / 2 + l.gPos.x, FH / 2 + l.gPos.y);
        mat.rotateSelf(l.gRotation * 180 / Math.PI);
        mat.scaleSelf(l.gScale, l.gScale);
        mat.translateSelf(-FW / 2, -FH / 2);
        return mat;
    }

    function getGlobalMatrix() {
        if (activeLayerIndex === 'bg' && bgAssets[activeBgAssetIndex]) {
            const asset = bgAssets[activeBgAssetIndex];
            const w = asset.img.width;
            const h = asset.img.height;
            if (w === 0) return new DOMMatrix();
            return new DOMMatrix().translate(FW/2 + bgTransform.gPos.x, FH/2 + bgTransform.gPos.y).rotate(bgTransform.gRotation * 180 / Math.PI).scale(bgTransform.gScale, bgTransform.gScale).translate(-w/2, -h/2);
        }

        if (activeLayerIndex === -1 || !layers[activeLayerIndex]) return new DOMMatrix();
        
        const l = layers[activeLayerIndex];
        const m = computeLayerMatrix(l);
        
        if (l.isFolder || !l.assets || l.assets.length === 0) return m;
        
        const activeAsset = l.assets[l.activeAssetIndex || 0];
        if (!activeAsset || !activeAsset.img || activeAsset.img.width === 0) return m;

        const w = activeAsset.img.width;
        const h = activeAsset.img.height;

        const fitScale = Math.min(FW / w, FH / h);
        m.translateSelf(FW/2, FH/2);
        m.scaleSelf(fitScale, fitScale);
        m.translateSelf(-w / 2, -h / 2);
        return m;
    }

    function setMode(m) {
        // Reset de estados de interação para evitar que o desenho "grude" ao trocar de ferramenta
        dragTarget = null;
        rigMode = 'none';
        wasTransforming = false;
        draggedAudioClip = null;
        resizingAudioClip = null;
        selectedPins = [];
        
        mode = m;
        selectedPins = [];
        
        // Só desliga o pan se estivermos mudando para uma ferramenta real (diferente de 'none')
        if (m !== 'none') {
            panMode = false;
            document.getElementById('pan-mode-btn').classList.remove('active');
        }

        const btns = { // Mapeia IDs dos botões para os modos
            'add': 'add', 'move': 'move',
            'g-move': 'g-move',
            'g-rotate': 'g-rotate', 'g-scale': 'g-scale'
        };
        Object.keys(btns).forEach(id => {
            document.getElementById(id).classList.toggle('active', m === id);
            const btn = document.getElementById(id);
            if (btn) btn.classList.toggle('active', m === id);
        });
        dragTarget = null;
    }

    function setRigMode(m) {
        rigMode = (rigMode === m) ? 'none' : m;
        document.getElementById('btn-rig-head').classList.toggle('active', rigMode === 'head');
        document.getElementById('btn-rig-exp').classList.toggle('active', rigMode === 'exp');
        draw();
    }

    function getFps() {
        const val = parseFloat(document.getElementById('fps-input').value);
        return isNaN(val) ? 24 : Math.max(1, Math.min(60, val));
    }

    function togglePins() {
        showPins = !showPins;
        const btn = document.getElementById('togglePinsBtn');
        if (btn) btn.innerText = showPins ? "Ocultar Pins" : "Mostrar Pins";
        if (btn) btn.classList.toggle('active', !showPins);
        draw();
    }

    function setKeyframe(advance = false) {
        const frame = Math.round(currentFrame); 
        syncActiveLayer();
        if (!isPlaying) syncActiveLayer();

        const states = layers.map(l => ({
            pins: (l.pins || []).map(p => ({ x: p.x, y: p.y, z: p.z || 0, radius: p.radius || 100 })),
            gPos: { ...l.gPos }, gScale: l.gScale, gRotation: l.gRotation,
            z: l.z || 0,
            visible: l.visible !== false,
            parentId: l.parentId,
            assetIndex: l.activeAssetIndex || 0,
            exprPins: (l.exprPins || []).map(p => ({ x: p.x, y: p.y })),
            headRot: { ...l.headRot },
            eyeRot: { ...l.eyeRot },
            exprValues: { ...l.exprValues },
            headFocus: { ...l.headFocus },
            headRadius: l.headRadius,
            useHeadRig: l.useHeadRig !== false
        }));

        // Remove se já existir no mesmo frame
        keyframes = keyframes.filter(k => k.frame !== frame);
        
        keyframes.push({
            frame: frame,
            layerStates: states,
            bgVisible: bgVisible !== false,
            bgAssetIndex: activeBgAssetIndex,
            bgTransform: { gPos: { ...bgTransform.gPos }, gScale: bgTransform.gScale, gRotation: bgTransform.gRotation }
        });
        
        keyframes.sort((a, b) => a.frame - b.frame);

        const lastKF = keyframes.length > 0 ? keyframes[keyframes.length - 1].frame : 1;
        totalFrames = lastKF;
        
        if (advance) {
            currentFrame = frame + 1;
            // Se não houver nenhum keyframe à frente, duplicamos a pose atual para o novo frame
            if (!keyframes.some(k => k.frame >= currentFrame)) {
                setKeyframe(false); 
            } else {
                if (currentFrame > totalFrames) totalFrames = currentFrame;
                seek(currentFrame);
            }
        } else {
            updateTimelineVisual();
            updateKfStatus();
            seek(frame);
        }
    }

    function updateTotalFrames() {
        const lastKF = keyframes.length > 0 ? keyframes[keyframes.length - 1].frame : 1;
        const lastAudio = audioClips.reduce((max, c) => Math.max(max, c.startFrame + c.durationFrames - 1), 0);
        totalFrames = Math.max(lastKF, lastAudio, 1);
    }

    function syncActiveLayer() {
        if (activeLayerIndex !== -1 && layers[activeLayerIndex]) {
            layers[activeLayerIndex].pins = pins;
            layers[activeLayerIndex].gPos = { ...gPos };
            layers[activeLayerIndex].gScale = gScale;
            layers[activeLayerIndex].gRotation = gRotation;
            // Background visibility is handled separately in its global var
        } else if (activeLayerIndex === 'bg') {
            bgTransform.gPos = { ...gPos };
            bgTransform.gScale = gScale;
            bgTransform.gRotation = gRotation;
        }
    }

    function stepFrame(n) {
        if (isPlaying) togglePlay();
        seek(Math.max(1, Math.round(currentFrame) + n));
    }

    function nudgeKeyframe(n) {
        if (isPlaying) togglePlay();
        const frame = Math.round(currentFrame);

        // Identifica os keyframes que serão movidos (do frame atual em diante)
        const movingKeyframes = keyframes.filter(k => k.frame >= frame);
        if (movingKeyframes.length === 0) return;

        // Validação para evitar sobreposição ou sair do frame 1
        if (n < 0) {
            const minMovingFrame = Math.min(...movingKeyframes.map(k => k.frame));
            
            // Impede mover para antes do frame 1
            if (minMovingFrame + n < 1) {
                const status = document.getElementById('kf-status');
                status.innerText = "❌ Início da timeline atingido";
                setTimeout(() => updateKfStatus(), 2000);
                return;
            }

            // Impede sobrepor keyframes que não estão sendo movidos (antes do playhead)
            const stationary = keyframes.filter(k => k.frame < frame);
            const maxStationaryFrame = stationary.length > 0 ? Math.max(...stationary.map(k => k.frame)) : 0;

            if (minMovingFrame + n <= maxStationaryFrame) {
                const status = document.getElementById('kf-status');
                status.innerText = "⚠️ Sem espaço para recuar";
                setTimeout(() => updateKfStatus(), 2000);
                return;
            }
        }

        // Aplica o deslocamento apenas nos keyframes do ponto atual em diante
        keyframes.forEach(k => {
            if (k.frame >= frame) {
                k.frame += n;
            }
        });

        keyframes.sort((a, b) => a.frame - b.frame);

        updateTotalFrames();
        updateTimelineVisual();
        // Sincroniza o playhead com o novo frame e atualiza a interface
        seek(Math.max(1, frame + n));
    }

    function deleteKeyframe() {
        const frame = Math.round(currentFrame);
        const index = keyframes.findIndex(k => k.frame === frame);
        
        if (index === -1) return; // Nada para deletar neste frame

        // Remove o keyframe selecionado
        keyframes.splice(index, 1);

        updateTotalFrames();
        updateTimelineVisual();

        if (currentFrame > totalFrames) currentFrame = totalFrames;
        
        // Força o recálculo da pose baseada nos keyframes vizinhos restantes
        // Isso limpa qualquer "resquício" da pose que acabou de ser apagada
        seek(currentFrame);
    }

    function updateKfStatus() {
        const frame = Math.round(currentFrame);
        const hasKf = keyframes.some(k => k.frame === frame);
        const input = document.getElementById('frame-input');
        const status = document.getElementById('kf-status');
        
        if (hasKf) {
            input.classList.add('has-kf');
            status.innerText = "";
        } else {
            input.classList.remove('has-kf');
            status.innerText = "";
        }
    }

    function updateTimeDisplay() {
        const fps = getFps();
        const totalSeconds = (Math.round(currentFrame) - 1) / fps;
        const mins = Math.floor(totalSeconds / 60);
        const secs = Math.floor(totalSeconds % 60);
        const centis = Math.floor((totalSeconds % 1) * 100);
        const timeStr = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${centis.toString().padStart(2, '0')}`;
        const display = document.getElementById('time-display');
        if (display) display.innerText = timeStr;
    }

    function seek(frame, forceAudioSync = false) {
        let f = parseFloat(frame) || 1;
        if (isNaN(f) || f < 1) f = 1;
        currentFrame = f;

        const fps = getFps();
        const timeSeconds = (f - 1) / fps;

        document.getElementById('frame-input').value = Math.round(currentFrame);
        document.getElementById('playhead').style.left = (120 + (currentFrame - 1) * FRAME_WIDTH) + 'px';

        // Se o frame atual chegar perto do fim da timeline desenhada, expande ela
        if (Math.round(currentFrame) > lastDrawnMaxFrame - 20) {
            updateTimelineVisual();
        }

        updateKfStatus();
        updateTimeDisplay();

        layers.forEach(l => {
            // No video layers, so no need to update videoElement.currentTime
            if (l.type === 'image_sequence' && l.images) {
                // Image sequences are handled in draw() based on currentFrame
            }
        });

        applyInterpolation();
        if (!isPlaying) updateLayersUI();

        // Sync Audio (Apenas se não estiver em Play ou se for um comando manual/loop)
        if (!isPlaying || forceAudioSync) {
            audioClips.forEach(clip => {
                const clipTime = timeSeconds - ((clip.startFrame - 1) / fps);
                const targetTime = Math.max(0, clipTime) + (clip.startTimeOffset || 0);
                // Só altera o tempo se o desvio for maior que 100ms para evitar engasgos
                if (Math.abs(clip.element.currentTime - targetTime) > 0.1) {
                    clip.element.currentTime = targetTime;
                }
            });
        }
        draw(!isPlaying);
    }

    
/**
 * COPIA A POSE ATUAL DA CAMADA OU BG (INCLUINDO DADOS DE RIG)
 */
function copyPose() {
    if (activeLayerIndex === -1) return;

    const allStates = getInterpolatedState(Math.round(currentFrame));
    if (!allStates) return;

    if (activeLayerIndex === 'bg') {
        clipboardPose = {
            isBg: true,
            bgVisible: bgVisible,
            bgTransform: JSON.parse(JSON.stringify(allStates.bgTransform)),
            bgAssetIndex: allStates.bgAssetIndex
        };
    } else if (allStates.layerStates && allStates.layerStates[activeLayerIndex]) {
        // Copia o estado completo da camada, preservando toda a estrutura de Rig de Face
        clipboardPose = JSON.parse(JSON.stringify(allStates.layerStates[activeLayerIndex]));
        clipboardPose.isBg = false;
        clipboardPose.bgVisible = allStates.bgVisible;
    }
}

/**
 * COLA A POSE COPIADA (INCLUINDO DADOS DE RIG)
 */
function pastePose() {
    if (!clipboardPose || activeLayerIndex === -1) return;

    if (activeLayerIndex === 'bg') {
        if (!clipboardPose.isBg) return;
        bgTransform = JSON.parse(JSON.stringify(clipboardPose.bgTransform));
        bgVisible = clipboardPose.bgVisible !== false;
        activeBgAssetIndex = clipboardPose.bgAssetIndex;
        
        gPos = bgTransform.gPos;
        gScale = bgTransform.gScale;
        gRotation = bgTransform.gRotation;
    } else {
        if (clipboardPose.isBg) return;
        const l = layers[activeLayerIndex];
        if (!l || l.isFolder) return;
        
        // Aplica Pins
        if (l.pins && clipboardPose.pins && l.pins.length === clipboardPose.pins.length) {
            clipboardPose.pins.forEach((savedPin, i) => {
                l.pins[i].x = savedPin.x;
                l.pins[i].y = savedPin.y;
                l.pins[i].z = savedPin.z || 0;
                l.pins[i].radius = savedPin.radius !== undefined ? savedPin.radius : 100;
            });
        }

        // Aplica Transformações Globais
        l.gPos = { ...clipboardPose.gPos };
        l.gScale = clipboardPose.gScale;
        l.gRotation = clipboardPose.gRotation;
        l.visible = clipboardPose.visible !== false;
        l.activeAssetIndex = clipboardPose.assetIndex || 0;

        // Aplica Dados de Face (Rigging)
        if (clipboardPose.exprValues) l.exprValues = { ...clipboardPose.exprValues };
        if (clipboardPose.exprPins) l.exprPins = clipboardPose.exprPins.map(p => ({...p}));
        if (clipboardPose.headRot) l.headRot = { ...clipboardPose.headRot };
        if (clipboardPose.eyeRot) l.eyeRot = { ...clipboardPose.eyeRot };
        if (clipboardPose.headFocus) l.headFocus = { ...clipboardPose.headFocus };
        if (clipboardPose.headRadius !== undefined) l.headRadius = clipboardPose.headRadius;

        // Sincroniza ponteiros e interface
        pins = l.pins;
        gPos = l.gPos;
        gScale = l.gScale;
        gRotation = l.gRotation;

        syncRigProUI(l); // Atualiza os sliders no painel lateral
        updateDeform(l);
    }

    setKeyframe(false);
    draw();
}

/**
 * COPIA UMA FAIXA DE FRAMES (RANGE)
 */
function copyRange() {
    if (activeLayerIndex === -1) return;

    const start = parseInt(document.getElementById('range-start').value);
    const end = parseInt(document.getElementById('range-end').value);
    
    if (isNaN(start) || isNaN(end) || start > end) return;

    const framesToCopy = keyframes.filter(k => k.frame >= start && k.frame <= end);
    if (framesToCopy.length === 0) return;

    clipboardRange = {
        originalStart: start,
        isBg: activeLayerIndex === 'bg',
        data: framesToCopy.map(kf => ({
            frame: kf.frame,
            bgVisible: kf.bgVisible,
            state: activeLayerIndex === 'bg' 
                ? { bgAssetIndex: kf.bgAssetIndex, bgTransform: kf.bgTransform }
                : JSON.parse(JSON.stringify(kf.layerStates[activeLayerIndex]))
        }))
    };
}

/**
 * COLA UMA FAIXA DE FRAMES (RANGE)
 */
function pasteRange() {
    if (!clipboardRange || activeLayerIndex === -1) return;
    const targetStart = Math.round(currentFrame);
    const offset = targetStart - clipboardRange.originalStart;

    clipboardRange.data.forEach(item => {
        const newFrame = item.frame + offset;
        if (newFrame < 1) return;
        
        let kf = keyframes.find(k => k.frame === newFrame);
        
        if (!kf) {
            const fullState = getInterpolatedState(newFrame) || {
                layerStates: layers.map(l => ({
                    z: l.z || 0, pins: JSON.parse(JSON.stringify(l.pins || [])),
                    gPos: { ...l.gPos }, gScale: l.gScale, gRotation: l.gRotation,
                    visible: l.visible !== false, assetIndex: l.activeAssetIndex, parentId: l.parentId
                })),
                bgAssetIndex: activeBgAssetIndex, bgTransform: { ...bgTransform }
            };
            kf = { frame: newFrame, ...fullState };
            keyframes.push(kf);
        }

        if (activeLayerIndex === 'bg') {
            if (clipboardRange.isBg) {
                kf.bgAssetIndex = item.state.bgAssetIndex;
                kf.bgVisible = item.bgVisible !== false;
                kf.bgTransform = JSON.parse(JSON.stringify(item.state.bgTransform));
            }
        } else if (!clipboardRange.isBg) {
            if (!kf.layerStates[activeLayerIndex]) {
                const l = layers[activeLayerIndex];
                kf.layerStates[activeLayerIndex] = {
                    pins: JSON.parse(JSON.stringify(l.pins || [])),
                    gPos: { ...l.gPos }, gScale: l.gScale, gRotation: l.gRotation,
                    visible: true, assetIndex: 0, parentId: l.parentId
                };
            }
            kf.layerStates[activeLayerIndex] = JSON.parse(JSON.stringify(item.state));
        }
    });

    keyframes.sort((a, b) => a.frame - b.frame);
    updateTimelineVisual();
    totalFrames = keyframes.length > 0 ? keyframes[keyframes.length - 1].frame : 1;
    seek(currentFrame);
}





    // Função de Easing Profissional (Sine Ease In-Out)
    // Melhora o feeling da animação para nível Toon Boom
    function easeInOutSine(t) {
        return -(Math.cos(Math.PI * t) - 1) / 2;
    }

   // Função auxiliar para interpolar entre dois estados completos
    function interpolateBetween(k1, k2, t) {
        // Aplica o easing no fator de tempo
        const easedT = easeInOutSine(t);

        const layerStates = k1.layerStates.map((l1, i) => {
            const l2 = k2.layerStates[i] || l1;
            
            // Se a visibilidade mudou ou o asset (imagem) mudou, tratamos como um "Switch"
            // Nesses casos, não interpolamos a posição/deformação para evitar "fantasmas"
            const isSwitching = (l1.visible !== l2.visible || l1.assetIndex !== l2.assetIndex);
            const it = easedT; // Interpola sempre para garantir que o movimento do rosto não trave

            return {
                pins: l1.pins.map((p1_pin, j) => {
                    const p2_pin = l2.pins[j] || p1_pin;
                    return {
                        x: p1_pin.x + (p2_pin.x - p1_pin.x) * it,
                        y: p1_pin.y + (p2_pin.y - p1_pin.y) * it,
                        z: (p1_pin.z || 0) + ((p2_pin.z || 0) - (p1_pin.z || 0)) * it,
                        radius: (p1_pin.radius || 100) + ((p2_pin.radius || 100) - (p1_pin.radius || 100)) * it
                    };
                }),
                gPos: {
                    x: l1.gPos.x + (l2.gPos.x - l1.gPos.x) * it,
                    y: l1.gPos.y + (l2.gPos.y - l1.gPos.y) * it
                },
                gScale: l1.gScale + (l2.gScale - l1.gScale) * it,
                gRotation: l1.gRotation + (l2.gRotation - l1.gRotation) * it,
                z: (l1.z || 0) + ((l2.z || 0) - (l1.z || 0)) * it,
                visible: l1.visible !== false,
                exprPins: (l1.exprPins || []).map((p1, j) => {
                    const p2 = (l2.exprPins && l2.exprPins[j]) ? l2.exprPins[j] : p1;
                    return { x: p1.x + (p2.x - p1.x) * it, y: p1.y + (p2.y - p1.y) * it };
                }),
                headRot: { 
                    x: l1.headRot.x + (l2.headRot.x - l1.headRot.x) * it, 
                    y: l1.headRot.y + (l2.headRot.y - l1.headRot.y) * it 
                },
                eyeRot: { 
                    x: (l1.eyeRot?.x || 0) + ((l2.eyeRot?.x || 0) - (l1.eyeRot?.x || 0)) * it, 
                    y: (l1.eyeRot?.y || 0) + ((l2.eyeRot?.y || 0) - (l1.eyeRot?.y || 0)) * it 
                },
                exprValues: Object.keys(l1.exprValues || {
                    blinkTop: 0, blinkBottom: 0, smile: 0, stretch: 0, open: 0, browH: 0, browT: 0, tilt: 0, mouthRot: 0, pinRad: 45, mouthRad: 30, browRad: 15
                }).reduce((acc, k) => ({ 
                    ...acc, 
                    [k]: l1.exprValues[k] + ((l2.exprValues[k] ?? l1.exprValues[k]) - l1.exprValues[k]) * it 
                }), {}),
                headRadius: (l1.headRadius || 0) + ((l2.headRadius || 0) - (l1.headRadius || 0)) * it,
                headFocus: { 
                    x: (l1.headFocus?.x ?? (layers[i]?.assets[0]?.img?.width / 2 || 0)) + ((l2.headFocus?.x ?? l1.headFocus?.x ?? (layers[i]?.assets[0]?.img?.width / 2 || 0)) - (l1.headFocus?.x ?? (layers[i]?.assets[0]?.img?.width / 2 || 0))) * it,
                    y: (l1.headFocus?.y ?? (layers[i]?.assets[0]?.img?.height / 3 || 0)) + ((l2.headFocus?.y ?? l1.headFocus?.y ?? (layers[i]?.assets[0]?.img?.height / 3 || 0)) - (l1.headFocus?.y ?? (layers[i]?.assets[0]?.img?.height / 3 || 0))) * it
                },
                assetIndex: l1.assetIndex || 0,
                parentId: l1.parentId
            };
        });

        const bt1 = k1.bgTransform || { gPos: {x:0, y:0}, gScale: 1, gRotation: 0 };
        const bt2 = k2.bgTransform || bt1;

        // Mesma lógica para o Background: se trocar o asset, não interpola movimento
        const bgIt = (k1.bgAssetIndex !== k2.bgAssetIndex) ? 0 : easedT;

        return {
            layerStates,
            bgVisible: k1.bgVisible !== false,
            bgAssetIndex: k1.bgAssetIndex ?? -1,
            bgTransform: {
                gPos: {
                    x: bt1.gPos.x + (bt2.gPos.x - bt1.gPos.x) * bgIt,
                    y: bt1.gPos.y + (bt2.gPos.y - bt1.gPos.y) * bgIt
                },
                gScale: bt1.gScale + (bt2.gScale - bt1.gScale) * bgIt,
                gRotation: bt1.gRotation + (bt2.gRotation - bt1.gRotation) * bgIt
            }
        };
    }

    function getInterpolatedState(frame) {
        if (keyframes.length === 0) return null;
        
        // Se apenas um keyframe, retorna ele mesmo
        if (keyframes.length === 1) {
            return {
                layerStates: keyframes[0].layerStates.map(ls => JSON.parse(JSON.stringify(ls))),
                bgVisible: keyframes[0].bgVisible !== false,
                bgAssetIndex: keyframes[0].bgAssetIndex,
                bgTransform: JSON.parse(JSON.stringify(keyframes[0].bgTransform || { gPos: {x:0, y:0}, gScale: 1, gRotation: 0 }))
            };
        }

        const f = frame;
        let prevKF = null;
        let nextKF = null;

        for (let i = 0; i < keyframes.length; i++) {
            if (keyframes[i].frame <= f) prevKF = keyframes[i];
            if (keyframes[i].frame > f && !nextKF) nextKF = keyframes[i];
        }

        if (!prevKF && nextKF) prevKF = nextKF;
        if (!nextKF && prevKF) nextKF = prevKF;
        if (!prevKF) return null;

        if (prevKF === nextKF) return { 
            layerStates: prevKF.layerStates.map(ls => JSON.parse(JSON.stringify(ls))), 
            bgAssetIndex: prevKF.bgAssetIndex,
            bgVisible: prevKF.bgVisible !== false,
            bgTransform: JSON.parse(JSON.stringify(prevKF.bgTransform || { gPos: {x:0, y:0}, gScale: 1, gRotation: 0 }))
        };

        const range = nextKF.frame - prevKF.frame;
        const t = (f - prevKF.frame) / range;
        return interpolateBetween(prevKF, nextKF, t);
    }

    function isLayerVisible(l) {
        if (l.visible === false) return false;
        if (l.parentId) {
            const parent = layers.find(p => p.uid === l.parentId);
            if (parent) return isLayerVisible(parent);
        }
        return true;
    }

    function applyInterpolation() {
        const fullState = getInterpolatedState(currentFrame);
        if (!fullState) return;

        const { layerStates, bgAssetIndex, bgVisible: interpolatedBgVisible, bgTransform: interpolatedBgTransform } = fullState;

        layerStates.forEach((state, idx) => {
            const l = layers[idx];
            if (!l || state.pins.length !== l.pins.length) return;
            
            l.pins.forEach((p, i) => {
                p.x = state.pins[i].x; 
                p.y = state.pins[i].y;
                p.z = state.pins[i].z || 0;
                p.radius = state.pins[i].radius || 100;
            });
            l.gPos = { ...state.gPos };
            l.gScale = state.gScale;
            l.gRotation = state.gRotation;
            l.z = state.z || 0;
            l.visible = state.visible !== false;
            // Sênior Fix: Só altera o parentId se ele estiver definido no keyframe.
            if (state.parentId !== undefined) l.parentId = state.parentId;
            
            l.exprPins = (state.exprPins || []).map(p => ({...p}));
            l.headRot = { ...state.headRot };
            l.eyeRot = { ...state.eyeRot };
            l.exprValues = { ...state.exprValues };
            l.headFocus = { ...state.headFocus };
            l.headRadius = state.headRadius;
            // Isso evita que camadas "fujam" das pastas ao carregar projetos antigos.
            if (state.parentId !== undefined) l.parentId = state.parentId;
            
            // Correção Sênior: Garante que o índice vindo da animação não aponte para um asset deletado
            const savedAssetIdx = state.assetIndex || 0;
            l.activeAssetIndex = (l.assets && l.assets.length > 0) ? Math.min(savedAssetIdx, l.assets.length - 1) : 0;
            
            updateDeform(l);
        });

        activeBgAssetIndex = bgAssetIndex ?? activeBgAssetIndex;
        bgVisible = interpolatedBgVisible !== false;
        if (interpolatedBgTransform) {
            bgTransform = { ...interpolatedBgTransform };
        }

        if (activeLayerIndex !== -1 && layers[activeLayerIndex]) {
            const l = layers[activeLayerIndex];
            pins = l.pins; gPos = l.gPos; gScale = l.gScale; gRotation = l.gRotation;
            syncRigProUI(l);
        } else if (activeLayerIndex === 'bg') {
            gPos = bgTransform.gPos; gScale = bgTransform.gScale; gRotation = bgTransform.gRotation;
        }
    }

    function togglePlay() {
        isPlaying = !isPlaying;
        document.getElementById('playBtn').innerText = isPlaying ? "⏸ Pause" : "▶ Play";
        
        const fps = getFps();
        const timeSeconds = (currentFrame - 1) / fps;

        if (isPlaying) {
            lastFrameTime = performance.now();
            if (currentFrame >= totalFrames) currentFrame = 1;

            // Sincroniza o áudio uma única vez ao iniciar o play
            seek(currentFrame, true);

            audioClips.forEach(clip => {
                const clipStartTime = (clip.startFrame - 1) / fps;
                if (timeSeconds >= clipStartTime && timeSeconds < clipStartTime + (clip.durationFrames/fps)) {
                    clip.element.currentTime = (timeSeconds - clipStartTime) + (clip.startTimeOffset || 0);
                    clip.element.play();
                }
            });
            requestAnimationFrame(animate); // Chama via requestAnimationFrame para evitar NaN
        } else {
            audioClips.forEach(clip => clip.element.pause());
            draw(); // Garante que os ossos reapareçam imediatamente ao pausar
        }
    }

    function animate(now) {
        if (!isPlaying) return;

        const elapsed = now - lastFrameTime;
        const fps_val = getFps() || 24;

        // Avanço suave: calcula a fração de frame baseada no tempo real decorrido
        currentFrame += (elapsed * fps_val) / 1000;

        const loopLimit = keyframes.length > 0 ? keyframes[keyframes.length - 1].frame : totalFrames;
        // Ajuste para Ciclo Perfeito: Reinicia exatamente no frame do último keyframe
        if (currentFrame >= loopLimit) {
            currentFrame = 1;
            seek(currentFrame, true); // Reset de áudio no loop
            audioClips.forEach(clip => {
                clip.element.pause();
                clip.element.currentTime = clip.startTimeOffset || 0; // Reset audio to start
            });
        }

        // Disparo de áudio durante o play se o playhead cruzar o início do clip
        const timeSeconds = (currentFrame - 1) / fps_val;
        audioClips.forEach(clip => {
            const startT = (clip.startFrame - 1) / fps_val;
            const endT = startT + (clip.durationFrames / fps_val);
            if (timeSeconds >= startT && timeSeconds < endT) {
                if (clip.element.paused) {
                    clip.element.currentTime = (timeSeconds - startT) + (clip.startTimeOffset || 0);
                    clip.element.play();
                }
            } else {
                if (!clip.element.paused) clip.element.pause();
            }
        });

        lastFrameTime = now;
        seek(currentFrame);
        requestAnimationFrame(animate);
    }

    async function waitVideosReady() {
        const vids = [];
        if (activeBgAssetIndex !== -1 && bgAssets[activeBgAssetIndex]?.type === 'video') {
            vids.push(bgAssets[activeBgAssetIndex].videoElement);
        }
        layers.forEach(l => {
            if (l.type === 'video' && l.videoElement) vids.push(l.videoElement);
        });
        
        if (vids.length === 0) return;

        await Promise.all(vids.map(v => {
            if (v.readyState >= 2 && !v.seeking) return Promise.resolve();
            return new Promise(resolve => {
                const onReady = () => {
                    v.removeEventListener('seeked', onReady);
                    resolve();
                };
                v.addEventListener('seeked', onReady);
                setTimeout(resolve, 500); // Timeout de segurança
            });
        }));
    }

    async function audioToDataURL(audioElement) {
        if (!audioElement || !audioElement.src) return "";
        try {
            const response = await fetch(audioElement.src);
            const blob = await response.blob();
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            console.error("Erro ao converter áudio:", e);
            return "";
        }
    }

    function loadProject() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoadingModal("Carregando projeto...");
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (isPlaying) togglePlay();
                    audioClips.forEach(c => c.element.pause());
                    bgAssets = await Promise.all((data.bgAssets || []).map(async a => ({ name: a.name, img: await loadImage(a.imgData) })));
                    bgVisible = data.bgVisible !== false;
                    activeBgAssetIndex = data.activeBgAssetIndex ?? -1;
                    bgTransform = data.bgTransform || { gPos: {x:0, y:0}, gScale: 1.0, gRotation: 0 };
                    layers = await Promise.all((data.layers || []).map(async l => {
                        if (!l.isFolder && l.assets) { l.assets = await Promise.all(l.assets.map(async a => ({ name: a.name, img: await loadImage(a.imgData) }))); }
                        return l;
                    }));
                    audioClips = (data.audioClips || []).map(c => ({ ...c, element: new Audio(c.audioData) }));
                    keyframes = data.keyframes || [];
                    document.getElementById('fps-input').value = data.fps || 24;
                    activeLayerIndex = -1; seek(1); updateLayersUI(); updateTimelineVisual(); draw();
                } catch (err) { console.error(err); alert("Erro ao carregar projeto."); }
                finally { hideLoadingModal(); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    async function exportVideo(btn) {
        // Verifica se a biblioteca de muxing foi carregada
        if (typeof WebMMuxer === 'undefined') {
            alert("Erro: A biblioteca WebMMuxer não foi carregada. Verifique sua conexão com a internet.");
            return;
        }

        // Verifica suporte à API WebCodecs (necessária para exportar vídeo)
        if (typeof VideoEncoder === 'undefined') {
            alert("Seu navegador não suporta a exportação de vídeo (WebCodecs) ou você está acessando o arquivo localmente sem um servidor.\n\n" + 
                  "Para funcionar:\n" +
                  "1. Use Chrome ou Edge.\n" +
                  "2. Rode através de um servidor local (ex: Live Server no VS Code) ou hospede em um site HTTPS.\n" +
                  "3. Browsers como Firefox ainda não suportam essa tecnologia por padrão.");
            return;
        }

        // Verifica se há animação para exportar
        if (keyframes.length < 2) {
            alert("Adicione pelo menos 2 poses (keyframes) em frames diferentes para poder exportar um vídeo.");
            return;
        }

        const wasPlaying = isPlaying;
        if (wasPlaying) togglePlay();

        const originalFrame = currentFrame;
        const menuBtn = document.getElementById('file-menu-btn');
        const originalMenuText = menuBtn.innerText;
        menuBtn.disabled = true;

        
        const projectFps = getFps(); // FPS configurado na sua timeline
        const exportFps = 24; // Forçado para 24fps de saída
        
        // Sincroniza a duração da exportação com o último keyframe da animação
        // Ajuste para Ciclo Perfeito: a duração é a distância entre o primeiro e o último frame
        const lastKF = keyframes.length > 0 ? keyframes[keyframes.length - 1].frame : 1;
        const cycleFrames = Math.max(1, lastKF - 1);

        // Calculamos a duração total baseada na timeline do projeto
        const totalDurationSeconds = cycleFrames / projectFps;
        const totalExportFrames = Math.max(1, Math.round(totalDurationSeconds * exportFps));

        try {
            // 1. Preparar Áudio
            let mixedAudioBuffer = null;
            if (audioClips.length > 0) {
                showLoadingModal("Mixando áudio...");
                mixedAudioBuffer = await getMixedAudioBuffer(totalDurationSeconds, projectFps);
            }

            const muxerOptions = {
                target: new WebMMuxer.ArrayBufferTarget(),
                video: {
                    codec: 'V_VP9', 
                    width: FW,
                    height: FH,
                    frameRate: exportFps
                }
            };

            if (mixedAudioBuffer && mixedAudioBuffer.length > 0) {
                muxerOptions.audio = {
                    codec: 'A_OPUS',
                    sampleRate: 48000,
                    numberOfChannels: 2
                };
            }

            const muxer = new WebMMuxer.Muxer(muxerOptions);

            const videoEncoder = new VideoEncoder({
                output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                error: e => console.error(e)
            });

            videoEncoder.configure({
                codec: 'vp09.00.41.08',
                width: FW,
                height: FH,
                bitrate: 10_000_000
            });

            let audioEncoder = null;
            if (mixedAudioBuffer && mixedAudioBuffer.length > 0) {
                audioEncoder = new AudioEncoder({
                    output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
                    error: e => { console.error(e); alert("Erro no codificador de áudio: " + e.message); }
                });
                audioEncoder.configure({
                    codec: 'opus',
                    sampleRate: 48000,
                    numberOfChannels: 2,
                    bitrate: 128000
                });

                const buffer = mixedAudioBuffer;
                const framesPerChunk = Math.floor(buffer.sampleRate * 0.06);
                for (let i = 0; i < buffer.length; i += framesPerChunk) {
                    const length = Math.min(framesPerChunk, buffer.length - i);
                    const audioData = new AudioData({
                        format: "f32-planar",
                        sampleRate: 48000,
                        numberOfChannels: 2,
                        numberOfFrames: length,
                        timestamp: Math.round(i * 1_000_000 / 48000),
                        data: combinedAudioPlanes(buffer, i, length)
                    });
                    audioEncoder.encode(audioData);
                    audioData.close();
                }
            }

            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = FW; 
            exportCanvas.height = FH;
            const eCtx = exportCanvas.getContext('2d', { alpha: true });

            // Ajuste para Ciclo Perfeito: i < totalExportFrames para não incluir o frame repetido no fim
            for (let i = 0; i < totalExportFrames; i++) {
                const progress = i / totalExportFrames;
                const f = 1 + progress * cycleFrames;
                
                seek(f, true); // Garante a sincronia de quadros de vídeo no background e camadas
                await waitVideosReady(); // Aguarda os vídeos buscarem o frame correto
                eCtx.clearRect(0, 0, FW, FH);
                draw(false, eCtx, false);

                menuBtn.innerText = `⏳ Exportando: ${Math.round(progress * 100)}%`;

                // Cria o frame com o timestamp exato (em microssegundos) para corrigir a velocidade
                const frame = new VideoFrame(exportCanvas, {
                    timestamp: (i * 1_000_000 / exportFps)
                });
                videoEncoder.encode(frame, { keyFrame: i % 60 === 0 });
                frame.close();

                // ACELERAÇÃO: Remove o delay fixo e usa controle de fila inteligente
                // Isso evita o congelamento da UI e exporta o mais rápido que a CPU permitir
                if (i % 8 === 0) {
                    while (videoEncoder.encodeQueueSize > 15) {
                        await new Promise(r => setTimeout(r, 5));
                    }
                    await new Promise(r => requestAnimationFrame(r));
                }
            }

            if (audioEncoder) await audioEncoder.flush();
            await videoEncoder.flush();
            muxer.finalize();

            const { buffer } = muxer.target;
            const blob = new Blob([buffer], { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `animacao_rig.webm`;
            a.click();
            URL.revokeObjectURL(url);
        } catch (err) {
            alert("Ocorreu um erro durante a exportação: " + err.message);
            console.error("Erro na exportação:", err);
        } finally {
            hideLoadingModal();
            currentFrame = originalFrame;
            seek(currentFrame);
            menuBtn.innerText = originalMenuText;
            menuBtn.disabled = false;
            if (wasPlaying) togglePlay();
        }
    }

        const cycleFrames = Math.max(1, lastKF - 1);
        const totalDurationSeconds = cycleFrames / projectFps;

        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = FW; 
        exportCanvas.height = FH;

                // Pequena pausa para evitar travamento do navegador

            showLoadingModal("Exportação concluída com sucesso!");
            setTimeout(hideLoadingModal, 1500);
        } catch (err) {
            alert("Ocorreu um erro durante a exportação PNG: " + err.message);
            console.error("Erro na exportação PNG:", err);
            hideLoadingModal();
        } finally {
            currentFrame = originalFrame;
            seek(currentFrame);
            if (wasPlaying) togglePlay();
        }
    }

    function importLayerFromFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoadingModal("Importando...");
            
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    let importedData = JSON.parse(ev.target.result);
                    // Suporte para exportações antigas de camada única (objeto) e novas (array)
                    if (!Array.isArray(importedData)) {
                        importedData = [importedData];
                    }

                    const uidMap = new Map();
                    const newLayersBatch = [];

                    // Primeira passagem: criar camadas e mapear novos UIDs
                    for (const lData of importedData) {
                        const newUid = generateUid();
                        uidMap.set(lData.uid, newUid);
                        
                        const layer = {
                            uid: newUid,
                            parentId: lData.parentId,
                            isFolder: lData.isFolder,
                            expanded: lData.expanded !== false,
                            name: lData.name,
                            assets: [],
                            activeAssetIndex: 0,
                            pins: lData.pins || [],
                            mesh: lData.mesh || [],
                            gPos: lData.gPos || {x:0, y:0},
                            gScale: lData.gScale || 1,
                            gRotation: lData.gRotation || 0,
                            z: lData.z || 0,
                            visible: lData.visible !== false,
                            poses: lData.poses || [],
                            type: 'image',
                            // Inicializa ou preserva propriedades de Rig de Face na importação
                            headRadius: lData.headRadius || 220,
                            headFocus: lData.headFocus ? { ...lData.headFocus } : null,
                            headRot: lData.headRot || { x: 0, y: 0 },
                            eyeRot: lData.eyeRot || { x: 0, y: 0 },
                            exprValues: lData.exprValues || { 
                                blinkTop: 0, blinkBottom: 0, smile: 0, stretch: 0, open: 0, 
                                browH: 0, browT: 0, tilt: 0, mouthRot: 0, 
                                pinRad: 45, mouthRad: 30, browRad: 15 
                            },
                            exprPins: lData.exprPins || []
                        };

                        if (!lData.isFolder && lData.assets) {
                            for (const aData of lData.assets) {
                                layer.assets.push({ name: aData.name, img: await loadImage(aData.imgData) });
                            }

                            // Inicialização Crítica: Se a malha estiver vazia, reconstrói o grid 
                            // para evitar crash no draw()
                            if (layer.mesh.length === 0 && layer.assets.length > 0) {
                                const firstImg = layer.assets[0].img;
                                if (firstImg.width > 0) {
                                    const w = firstImg.width, h = firstImg.height;
                                    for (let y = 0; y <= GRID; y++) {
                                        for (let x = 0; x <= GRID; x++) {
                                            const px = (x / GRID) * w;
                                            const py = (y / GRID) * h;
                                            layer.mesh.push({ x: px, y: py, ox: px, oy: py });
                                        }
                                    }
                                }
                            }
                            // Garante que pins de face existam mesmo em importações de versões antigas
                            if (!layer.isFolder && layer.assets && layer.assets.length > 0) {
                                const imgRef = layer.assets[0].img;
                                if (!layer.exprPins || layer.exprPins.length === 0) {
                                    initFaceRigProps(layer, imgRef.width, imgRef.height);
                                } else if (!layer.headFocus || (layer.headFocus.x === 0 && layer.headFocus.y === 0)) {
                                    layer.headFocus = { x: imgRef.width / 2, y: imgRef.height / 3 };
                                }
                            }
                        }
                        newLayersBatch.push(layer);
                    }

                    // Segunda passagem: Corrigir referências de parentesco e adicionar ao projeto
                    for (const layer of newLayersBatch) {
                        if (layer.parentId && uidMap.has(layer.parentId)) {
                            layer.parentId = uidMap.get(layer.parentId);
                        } else {
                            layer.parentId = null; 
                        }
                        layers.push(layer);
                        
                        // Adiciona estado inicial aos keyframes para as novas camadas
                        const currentF = Math.round(currentFrame);
                        keyframes.forEach(kf => {
                            kf.layerStates.push({
                                pins: JSON.parse(JSON.stringify(layer.pins)),
                                gPos: { ...layer.gPos },
                                gScale: layer.gScale,
                                gRotation: layer.gRotation,
                                z: layer.z || 0,
                            visible: kf.frame < currentF ? false : (layer.visible !== false),
                                assetIndex: 0,
                            parentId: layer.parentId,
                            exprPins: (layer.exprPins || []).map(p => ({...p})),
                            headRot: { ...layer.headRot },
                            eyeRot: { ...layer.eyeRot },
                            exprValues: { ...layer.exprValues },
                            headFocus: { ...layer.headFocus },
                            headRadius: layer.headRadius
                            });
                        });
                        if (layer.pins && layer.pins.length > 0) updateDeform(layer);
                    }

                    setKeyframe(false);
                    if (newLayersBatch.length > 0) {
                        const firstImportedIndex = layers.indexOf(newLayersBatch[0]);
                        if (firstImportedIndex !== -1) selectLayer(firstImportedIndex);
                    }

                    updateLayersUI();
                    draw();
                } catch (err) {
                    console.error(err);
                    alert("Erro ao importar camada/pasta.");
                } finally {
                    hideLoadingModal();
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

function applyPoseFromList(index) {
    if (activeLayerIndex === -1 || activeLayerIndex === 'bg') return;
    const l = layers[activeLayerIndex];
    const pose = l.poses[index];
    if (!pose || !pose.state) return;

    const s = pose.state;

    // Pins
    if (s.pins) {
        l.pins = JSON.parse(JSON.stringify(s.pins));
    }

    // Transformações globais
    if (s.gPos) l.gPos = { ...s.gPos };
    if (s.gScale !== undefined) l.gScale = s.gScale;
    if (s.gRotation !== undefined) l.gRotation = s.gRotation;

    // Visibilidade e asset
    if (s.visible !== undefined) l.visible = s.visible;
    if (s.assetIndex !== undefined) {
        l.activeAssetIndex = s.assetIndex;
        if (l.assets && l.assets[l.activeAssetIndex]) {
            img = l.assets[l.activeAssetIndex].img;
        }
    }

    // ====================== FACE RIG ======================
    if (s.headRadius !== undefined) l.headRadius = s.headRadius;
    if (s.headFocus) l.headFocus = { ...s.headFocus };
    if (s.headRot) l.headRot = { ...s.headRot };
    if (s.eyeRot) l.eyeRot = { ...s.eyeRot };
    if (s.exprValues) l.exprValues = { ...s.exprValues };
    if (s.exprPins) l.exprPins = s.exprPins.map(p => ({...p}));

    // Atualiza variáveis globais da camada ativa
    pins = l.pins || [];
    gPos = l.gPos || {x:0, y:0};
    gScale = l.gScale || 1;
    gRotation = l.gRotation || 0;

    // Atualiza interface e deformação
    syncRigProUI(l);
    updateDeform(l);
    
    setKeyframe(false);   // Salva como keyframe
    draw();
    updateLayersUI();
}

function handlePoseDrop(toIndex, toRoot = false) {
    if (draggedPoseIndex === null || activeLayerIndex === -1 || activeLayerIndex === 'bg') return;
    const l = layers[activeLayerIndex];
    const fromIndex = draggedPoseIndex;
    
    const item = l.poses[fromIndex];

    if (toRoot) {
        item.parentId = null;
    } else {
        const target = l.poses[toIndex];
        if (target.isFolder && item.uid !== target.uid) {
            item.parentId = target.uid;
        } else {
            item.parentId = target.parentId || null;
        }
    }

    l.poses.splice(fromIndex, 1);
    l.poses.splice(toIndex, 0, item);
    
    draggedPoseIndex = null;
    updatePosesUI();
}

function movePinZ(delta) {
    if (activeLayerIndex === -1 || activeLayerIndex === 'bg') return;
    const l = layers[activeLayerIndex];
    const currentF = Math.round(currentFrame);

    // 1. Aplica a mudança de Z (Frente/Trás) nos pins selecionados ou na camada inteira
    if (selectedPins.length > 0) {
        selectedPins.forEach(p => {
            if (!p) return;
            p.z = (p.z || 0) + delta;
        });
    } else if (!l.isFolder) {
        l.z = (l.z || 0) + delta;
    }

    // 2. O PULO DO GATO: Salva um keyframe no momento atual para fixar a ordem.
    // Isso impede que a interpolação apague a sua edição ao mover a timeline!
    setKeyframe(false);

    // 3. Propaga a nova ordem (Z) para os keyframes do futuro, 
    // para que o pin não volte para trás sozinho durante o resto da animação.
    keyframes.forEach(kf => {
        if (kf.frame > currentF) {
            const layerState = kf.layerStates[activeLayerIndex];
            if (!layerState) return;

            if (selectedPins.length > 0) {
                selectedPins.forEach(p => {
                    const pinIdx = pins.indexOf(p);
                    if (layerState.pins[pinIdx]) {
                        layerState.pins[pinIdx].z = p.z;
                    }
                });
            } else {
                layerState.z = l.z;
            }
        }
    });

    // 4. Atualiza a tela imediatamente
    draw();
}
