<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rigger 2D</title>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
   <script src="https://cdn.jsdelivr.net/npm/webm-muxer@3.0.1/build/webm-muxer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            box-sizing: border-box;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        :root {
            --bg-darker: #050505;
            --bg-panel: #121212;
            --bg-button: #222222;
            --border-color: #333333;
            --accent-blue: #555555;
            --accent-green: #555555;
            --accent-orange: #555555;
            --accent-red: #555555;
            --text-main: #dddddd;
            --text-dim: #777777;
        }

                /* Estilos para o Modal de Carregamento */
        #loading-modal {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: 'Architects Daughter', cursive;
            backdrop-filter: blur(5px);
        }

        body { 
            background: var(--bg-darker); 
            color: var(--text-main); 
            font-family: 'Architects Daughter', cursive; 
            margin: 0;
            overflow: hidden;
            height: 100vh;
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            /* Otimização para Tablet */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        #toolbar { 
            background: var(--bg-panel); 
            padding: 2px 6px; 
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: flex-start; 
            gap: 4px; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
            z-index: 10; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            overflow: visible;
        }
        
        #viewport { 
            flex-grow: 1; 
            display: flex; 
            justify-content: space-between; 
            align-items: stretch; 
            background: #111; 
            padding: 10px;
            gap: 10px;
            flex: 1;
            overflow: hidden;
        }
        
        #canvas-card { 
            background: #000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            aspect-ratio: 16 / 9;
            cursor: crosshair; 
            object-fit: contain;
            touch-action: none; /* Impede scroll ao interagir com o canvas */
            background: rgb(0, 0, 0); /* Área de trabalho real permanece preta */
            box-shadow: 0 0 20px rgba(161, 151, 151, 0.8); /* Sombra para destacar o limite */
            border: 1px solid #333; /* Uma borda sutil para definir o contorno */
        }

        button { 
            padding: 2px 6px; 
            cursor: pointer; 
            border: 1px solid transparent; 
            border-radius: 3px; 
            font-weight: 500; 
            background: var(--bg-button); 
            color: var(--text-main); 
            transition: all 0.15s ease; 
            font-size: 10px;
            letter-spacing: 0.5px;
            touch-action: manipulation;
        }
        button:hover { background: #444; border-color: #555; }
        button:active { background: #222; }
        
        .btn-add { border-bottom: 2px solid var(--accent-green); }
        .btn-move { border-bottom: 2px solid var(--accent-blue); }
        .btn-lattice { border-bottom: 2px solid #ffffff; }
        .btn-global { border-bottom: 2px solid var(--accent-orange); }
        #layers-panel button.active { border-color: #00ff88; color: #00ff88; }
        .btn-cam { border-bottom: 2px solid #ffffff; }
        .btn-delete { border-bottom: 2px solid var(--accent-red); }

        .active { background: #444; border-color: #666; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .btn-add.active { background: #333; }
        .btn-move.active { background: #333; }
        .btn-global.active { background: #333; }
        #move-b { font-size: 10px; padding-left: 8px; padding-right: 8px; }

        #timeline-container { 
            background: var(--bg-panel); 
            padding: 4px 10px; 
            border-top: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            height: auto;
            min-height: 180px;
        }
        .timeline-controls { display: flex; flex-direction: row; gap: 4px; align-items: center; overflow: visible; }
        .controls-row { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
        
        #frame-input { 
            background: #000; 
            border: 1px solid var(--border-color); 
            color: var(--accent-orange); 
            font-family: monospace; 
            font-size: 16px; 
            font-weight: bold; 
            text-align: center; 
            width: 70px; 
            padding: 4px; 
            border-radius: 4px;
            outline: none;
        }
        #frame-input.has-kf { border-color: #ffffff; box-shadow: 0 0 8px rgba(255, 255, 255, 0.2); color: #ffffff; }

        .label-group label { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-weight: bold; }
        .label-group input { 
            background: #111; border: 1px solid var(--border-color); color: var(--accent-blue); 
            padding: 2px 5px; border-radius: 2px; font-family: monospace; outline: none;
        }
        
        .btn-bg {
            width: 100%;
            margin-bottom: 10px;
            background: #1a1a1a;
        }
        .layer-item.active { border-color: var(--accent-blue); background: #333; }
        .layer-item { display: flex; justify-content: space-between; align-items: center; }
        .btn-import-small { 
            background: none; border: none; padding: 0 5px; color: var(--accent-blue); font-size: 14px; cursor: pointer;
            background: none; border: none; padding: 0 5px; color: var(--accent-blue); font-size: 14px; 
            background: none; border: none; padding: 0 2px; color: var(--accent-blue); font-size: 11px; cursor: pointer;
        }

        #layers-panel, #poses-panel {
            width: 22%;
            min-width: 180px;
            max-width: 280px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .side-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            min-height: 0;
        }

        .layer-item {
            background: var(--bg-button);
            border: 1px solid var(--border-color);
            padding: 6px 8px;
            border-radius: 3px;
            margin-bottom: 8px;
            font-size: 13px;
            font-size: 12px;
            color: var(--text-main);
            transition: opacity 0.2s, transform 0.1s;
            cursor: default;
        }

        #layers-list, #poses-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .layer-item.dragging { opacity: 0.4; border: 1px dashed var(--accent-blue); transform: scale(0.98); }
        #layers-list::-webkit-scrollbar, #poses-list::-webkit-scrollbar { width: 4px; }
        #layers-list::-webkit-scrollbar-thumb, #poses-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .rename-input {
            background: #000;
            border: 1px solid var(--accent-blue);
            color: white;
            font-family: inherit;
            padding: 2px 4px;
            border-radius: 2px;
            font-size: 12px;
            width: 120px;
            user-select: text; /* Permite digitar nomes */
        }

        .range-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a1a1a;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin: 0 5px;
        }

        .asset-selector {
            background: #1a1a1a;
            color: var(--accent-blue);
            border: 1px solid #333;
            font-size: 10px;
            padding: 2px;
            border-radius: 3px;
            max-width: 100px;
        }

        .range-input {
            background: #000;
            border: 1px solid #333;
            color: #ffffff;
            color: #ffffff;
            font-family: monospace;
            font-size: 11px;
            width: 35px;
            text-align: center;
            border-radius: 2px;
            outline: none;
        }

        .folder-toggle {
            cursor: pointer;
            margin-right: 8px;
            font-weight: bold;
            color: var(--accent-orange);
            width: 15px;
            display: inline-block;
        }

        .shapekey-slider {
            width: 100%;
            height: 4px;
            appearance: none;
            background: #333;
            outline: none;
            border-radius: 2px;
        }

        /* View Controls Sliders */
        #view-controls {
            background: var(--bg-panel);
            padding: 4px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 10px;
            color: var(--text-dim);
        }
        .view-slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .view-slider {
            width: 100px;
            height: 4px;
            appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
        }
        .view-slider::-webkit-slider-thumb {
            appearance: none;
            width: 10px;
            height: 10px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Dropdown Menu Styles */
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background: var(--bg-panel);
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 1000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            top: 100%;
            left: 0;
            margin-top: 4px;
        }
        
        /* Sidebar Rig Pro Integration */
        .control-group { border-bottom: 1px solid #333; padding-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .control-group label { font-size: 10px; color: #00ff88; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .joy-base { width: 80px; height: 80px; border: 2px solid #00ff88; border-radius: 50%; position: relative; background: #050505; margin: 10px auto; cursor: crosshair; box-shadow: 0 0 10px rgba(0,255,136,0.15); touch-action: none; }
        #knob, #knobEye { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; border: 1px solid #000; box-shadow: 0 0 5px rgba(255,255,255,0.5); }
        #knobEye { background: #00ff88; border: 1px solid #000; }
        .sidebar-span { font-size: 10px; color: #00ff88; display: flex; justify-content: space-between; font-weight: 500; }
        
        input[type="range"].green-slider { 
            accent-color: #00ff88; 
            background: #1a1a1a;
            border: 1px solid #00ff88; 
            height: 10px;
            border-radius: 4px;
            outline: 1px solid #ffffff;
            cursor: pointer;
            margin: 5px 0;
        }
        input[type="range"].green-slider::-webkit-slider-runnable-track {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
        }
        
        #layers-panel {
            overflow-y: auto;
            padding: 15px !important;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

         .dropdown-content button {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 6px 10px;
            width: 100%;
            text-align: left;
            display: block;
            font-size: 10px;
            border-bottom: 1px solid #1a1a1a;
        }
        .dropdown-content button:hover { background: #333; }
        .dropdown-content button:last-child { border-bottom: none; }
        .show { display: block; }

        /* Estilos da Nova Timeline */
        #timeline-visual-area {
            position: relative;
            background: #090909;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            overflow-y: hidden;
            height: 110px;
            display: flex;
            flex-direction: column;
            touch-action: pan-x; /* Permite scroll horizontal na timeline */
        }
        .timeline-track {
            position: relative;
            min-height: 32px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
        }
        #track-ruler { height: 20px; background: #111; border-bottom: 1px solid #333; }
        .track-label {
            position: sticky;
            left: 0;
            background: #181818;
            width: 100px;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 9px;
            color: var(--text-dim);
            border-right: 1px solid var(--border-color);
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
        }
        .kf-mark {
            position: absolute;
            top: 50%;
            width: 10px;
            height: 10px;
            background: var(--accent-orange);
            transform: translate(-50%, -50%) rotate(45deg);
            cursor: pointer;
            z-index: 5;
            border: 1px solid #fff;
        }
        .audio-block {
            position: absolute;
            height: 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #777777;
            color: #dddddd;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 2px;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            align-items: center;
            z-index: 4;
            cursor: grab;
            box-sizing: border-box;
            transition: border-color 0.1s;
        }
        .audio-block .resize-handle {
            position: absolute;
            top: 0;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            background: rgba(255,255,255,0.1);
            z-index: 10;
        }
        .audio-block .resize-handle.left { left: 0; }
        .audio-block .resize-handle.right { right: 0; }
        #playhead {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: #ffffff;
            z-index: 30;
            pointer-events: none;
        }
        .frame-tick {
            position: absolute;
            bottom: 0;
            width: 1px;
            height: 5px;
            background: #444;
        }
        .shapekey-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none; /* Adicionado para compatibilidade */
            width: 12px;
            height: 12px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Estilos das abas do painel lateral direito */
        .panel-tabs {
            display: flex;
            background: #181818;
            border-bottom: 1px solid var(--border-color);
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            overflow: hidden;
        }
        .panel-tab {
            flex: 1;
            padding: 8px 12px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            outline: none;
        }
        .panel-tab:hover {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
        }
        .panel-tab.active {
            color: #ffffff;
            border-bottom: 3px solid #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Ajustes para Tablets */
        @media (max-width: 1024px) {
            #toolbar { gap: 6px; padding: 5px 10px; }
            button { padding: 4px 8px; font-size: 10px; }
            #layers-panel, #poses-panel { width: 200px; }
            #timeline-container { min-height: 140px; gap: 5px; padding: 4px 8px; }
            .timeline-controls { gap: 6px; align-items: center; }
            .controls-row { justify-content: flex-start; width: 100%; flex-wrap: wrap; row-gap: 4px; }
            #timeline-visual-area { height: 90px; }
            .track-label { width: 80px; font-size: 8px; }
        }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="upload" accept="image/*" style="display:none">
    <input type="file" id="folder-import" webkitdirectory directory multiple style="display:none" onchange="importFolderFromDisk(this)">
    <div class="dropdown">
        <button id="file-menu-btn" onclick="toggleFileMenu(event)" style="border-bottom: 2px solid #fff;">Arquivo ▾</button>
        <div id="file-menu" class="dropdown-content">
            <button onclick="document.getElementById('upload').click(); closeFileMenu();">📥 Importar Imagem</button>
            <button onclick="document.getElementById('bg-upload').click(); closeFileMenu();">🖼️ Importar Background</button>
            <button onclick="document.getElementById('folder-import').click(); closeFileMenu();">📂 Importar Pasta de Imagens</button>
            <button onclick="importLayerFromFile(); closeFileMenu();">📥 Importar Camada/Pasta</button>
            <button onclick="document.getElementById('audio-import').click(); closeFileMenu();">🎵 Add Áudio</button>
            <button onclick="saveProject(); closeFileMenu();">💾 Salvar Projeto</button>
            <button onclick="loadProject(); closeFileMenu();">📂 Carregar Projeto</button>
            <button onclick="exportVideo(this); closeFileMenu();">🎬 Exportar Vídeo</button>
            <button onclick="exportPngSequence(); closeFileMenu();">🖼️ Exportar Sequência PNG (Transparente)</button>
        </div>
    </div>

    <button id="add" class="btn-add" onclick="setMode('add')">Adicionar Pins</button>
    <div class="label-group" style="display:flex; gap:5px; align-items:center;">
        <span style="font-size: 10px; color: var(--text-dim);">Tam. Pin</span>
        <input type="range" id="pin-visual-size-slider" min="0.3" max="40" step="0.1" value="5" style="width:50px;" oninput="updatePinVisualSize(this.value)">
    </div>
    <button class="btn-delete" onclick="deleteAllPins()">Apagar Pins</button>
    <button id="move" class="btn-move active" onclick="setMode('move')">Rig</button>
    
    <button id="g-move" class="btn-global" onclick="setMode('g-move')">Mover</button>
    <button id="g-rotate" class="btn-global" onclick="setMode('g-rotate')">Girar</button>
    <button id="g-scale" class="btn-global" onclick="setMode('g-scale')">Escalar</button>
    <button onclick="reset()">Redefinir</button>

    <div style="border-left: 1px solid var(--border-color); height: 20px; margin: 0 5px;"></div>
    <button onclick="movePinZ(1)" title="Trazer parte do personagem para frente">Frente</button>
    <button onclick="movePinZ(-1)" title="Enviar parte do personagem para trás">Tras</button>

    <div style="border-left: 1px solid var(--border-color); height: 20px; margin: 0 5px;"></div>
    <div class="label-group" style="display:flex; gap:10px; font-size:10px;">
        <label>Fps <input type="number" id="fps-input" min="1" max="24" step="1" value="1" style="width:45px;" oninput="seek(currentFrame)"></label>
    </div>
    <input type="file" id="audio-import" accept="audio/*" style="display:none" multiple onchange="importAudio(this)">
</div>

<div id="viewport">
    <div id="layers-panel">
        <div class="control-group">
            <label>Ferramentas de Face</label>
            <div style="display:flex; gap:5px;">
                <button id="btn-rig-head" onclick="setRigMode('head')" style="flex:1; font-size:9px;">Ajustar Cabeça</button>
                <button id="btn-rig-exp" onclick="setRigMode('exp')" style="flex:1; font-size:9px;">Pins Face</button>
            </div>
        </div>

        <div class="control-group">
            <label>Cabeça (Giro 3D)</label>
            <div class="sidebar-span">Raio Rosto</div>
            <input type="range" id="radiusSlider" class="green-slider" min="50" max="600" value="220" oninput="updateExprVal()">
            <div class="joy-base" id="joy"><div id="knob"></div></div>
            <div class="sidebar-span">Inclinação</div>
            <input type="range" id="tiltSlider" class="green-slider" min="-1" max="1" step="0.01" value="0" oninput="updateExprVal()">
        </div>

        <div class="control-group">
            <label>Olhos & Olhar</label>
            <div class="sidebar-span">Influência</div>
            <input type="range" id="pinRadiusSlider" class="green-slider" min="1" max="150" value="45" oninput="updateExprVal()">
            <div class="sidebar-span">Pálpebra Cima</div>
            <input type="range" id="blinkTopSlider" class="green-slider" min="0" max="1" step="0.01" value="0" oninput="updateExprVal()">
            <div class="sidebar-span">Pálpebra Baixo</div>
            <input type="range" id="blinkBottomSlider" class="green-slider" min="0" max="1" step="0.01" value="0" oninput="updateExprVal()">
        </div>

        <div class="control-group">
            <label>Boca</label>
            <div class="sidebar-span">Influência</div>
            <input type="range" id="mouthRadiusSlider" class="green-slider" min="10" max="250" value="30" oninput="updateExprVal()">
            <div class="sidebar-span">Triste / Feliz</div>
            <input type="range" id="smileSlider" class="green-slider" min="-1.2" max="1.2" step="0.01" value="0" oninput="updateExprVal()">
            <div class="sidebar-span">Rotação</div>
            <input type="range" id="mouthRotSlider" class="green-slider" min="-45" max="45" step="1" value="0" oninput="updateExprVal()">
            <div class="sidebar-span">Abertura</div>
            <input type="range" id="openSlider" class="green-slider" min="-1.5" max="1.5" step="0.01" value="0" oninput="updateExprVal()">
            <div class="sidebar-span">Largura</div>
            <input type="range" id="stretchSlider" class="green-slider" min="-0.8" max="1.5" step="0.01" value="0" oninput="updateExprVal()">
        </div>

        <div class="control-group">
            <label>Sobrancelhas</label>
            <div class="sidebar-span">Influência</div>
            <input type="range" id="browRadiusSlider" class="green-slider" min="5" max="150" value="15" oninput="updateExprVal()">
            <div class="sidebar-span">Altura</div>
            <input type="range" id="browHeightSlider" class="green-slider" min="-30" max="30" value="0" oninput="updateExprVal()">
            <div class="sidebar-span">Inclinação</div>
            <input type="range" id="browTiltSlider" class="green-slider" min="-1" max="1" step="0.1" value="0" oninput="updateExprVal()">
        </div>
        
        <div class="control-group" style="border:none">
            <button onclick="resetHeadRig()" style="border-color:#00ff88; color:#00ff88; width: 100%;">Resetar Face</button>
            <div style="font-size: 8px; color: #444; margin-top: 5px;">Use 'Ajustar Cabeça' para posicionar o pivô (ponto verde).</div>
        </div>

    <div id="canvas-card">
        <canvas id="canvas"></canvas>
    </div>

    <div id="poses-panel">
        <div class="panel-tabs">
            <button id="tab-layers" class="panel-tab active" onclick="switchRightTab('layers')">Camadas</button>
            <button id="tab-poses" class="panel-tab" onclick="switchRightTab('poses')">Poses</button>
        </div>
        <div id="section-layers" class="side-section right-tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">
                <span style="font-weight: bold; font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">CAMADAS</span>
                <div style="display:flex; gap:4px;">
                    <button onclick="importLayerFromFile()" style="padding: 2px 6px; font-size: 9px; background: #222;" title="Importar">📥</button>
                    <button onclick="createFolder()" style="padding: 2px 6px; font-size: 9px; background: #222;" title="Nova Pasta">📂+</button>

            <input type="file" id="bg-upload" accept="image/*" style="display:none">

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">
                <span style="font-size: 11px; color: var(--accent-orange); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">POSES</span>
                <div style="display:flex; gap:4px;">
                    <button onclick="saveCurrentPoseToList()" style="padding: 2px 6px; font-size: 9px; background: #222;">+ Salvar</button>
                    <button onclick="createPoseFolder()" style="padding: 2px 6px; font-size: 9px; background: #222;">+ Pasta</button>

</div>

<div id="view-controls">
    <div class="view-slider-group">
        <span>ZOOM</span>
        <input type="range" id="zoom-slider" class="view-slider" min="1" max="10" step="0.01" value="1" oninput="updateZoomFromSlider(this.value)">

<!-- Modal de Carregamento -->

        <p id="loading-modal-text" style="font-size: 1.2em; margin-bottom: 15px;">Processando...</p>

    </div>
</div>
<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>


<div id="timeline-container">
    <div class="timeline-controls">
        <div class="controls-row">
            <button id="playBtn" onclick="togglePlay()" style="min-width: 80px; background: var(--bg-button);">▶ Play</button>

                <input type="number" id="frame-input" min="1" value="1" onchange="seek(this.value)">
                <span id="time-display" style="font-size: 10px; color: #ffffff; font-family: monospace;">00:00.00</span>
            </div>
            <button onclick="nudgeKeyframe(1)" title="Mover pose para frente" style="padding: 6px 8px;">+</button>
            <button onclick="stepFrame(1)">Próximo ▶</button>
            <button onclick="setKeyframe(false)" style="border-bottom: 2px solid var(--accent-orange);" title="Cria um keyframe na pose interpolada atual (Inbetween)">Keyframe</button>

            <div style="border-left: 1px solid var(--border-color); height: 20px; margin: 0 5px;"></div>
            <button onclick="copyPose()" style="font-size: 10px;">Copiar Pose</button>
            <button onclick="pastePose()" style="font-size: 10px;">Colar Pose</button>
            <div class="range-group">
                <span style="font-size: 9px; color: var(--text-dim); text-transform: uppercase;">Frames</span>
                <input type="number" id="range-start" value="1" class="range-input" title="Frame inicial" oninput="const v = parseInt(this.value); if(!isNaN(v)) document.getElementById('range-end').value = v + 1">
                <input type="number" id="range-end" value="2" class="range-input" title="Frame final">
                <button onclick="copyRange()" style="font-size: 10px; padding: 2px 6px; background: #333;">Copiar</button>

            <span id="kf-status" style="font-size: 10px; color: var(--text-dim); width: 120px;"></span>

    <div id="timeline-visual-area" onclick="handleTimelineClick(event)">
        <div class="timeline-track" id="track-ruler">
            <div class="track-label">FRAMES</div>
        </div>
        <div id="playhead"></div>
        <div class="timeline-track" id="track-keyframes">
            <div class="track-label">ANIMAÇÃO</div>
        </div>
        <div class="timeline-track" id="track-audio">
            <div class="track-label">ÁUDIO <span onclick="splitAudio()" style="pointer-events: auto; cursor:pointer; margin-left:10px; font-size:14px;" title="Cortar áudio no frame atual">✂️</span></div>
        </div>
    </div>
</div>

<script>
    // Desabilita o menu de contexto (clique longo em tablets)
    window.addEventListener('contextmenu', (e) => {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
        }
    }, false);

    function toggleFileMenu(e) {
        if (e) e.stopPropagation();
        document.getElementById('file-menu').classList.toggle('show');
    }
    function closeFileMenu() {
        const menu = document.getElementById('file-menu');
        if (menu) menu.classList.remove('show');
    }
    window.addEventListener('click', (e) => {
        if (!e.target.closest('.dropdown')) closeFileMenu();
    });

    function toggleShift() {
        isShiftPressed = !isShiftPressed;
        const btn = document.getElementById('shift-toggle');
        btn.innerText = isShiftPressed ? "Shift: ON" : "Shift: OFF";
        btn.classList.toggle('active', isShiftPressed);
    }
    function toggleCtrl() {
        isCtrlPressed = !isCtrlPressed;
        const btn = document.getElementById('ctrl-toggle');
        btn.innerText = isCtrlPressed ? "Ctrl: ON" : "Ctrl: OFF";
        btn.classList.toggle('active', isCtrlPressed);
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const getDescendants = (uid) => {
        let children = [];
        layers.forEach(l => {
            if (l.parentId === uid) {
                children.push(l);
                if (l.isFolder) children = children.concat(getDescendants(l.uid));
            }
        });
        return children;
    };

    const isDescendant = (parentUid, potentialChildUid) => {
        let current = layers.find(l => l.uid === potentialChildUid);
        while (current && current.parentId) {
            if (current.parentId === parentUid) return true;
            current = layers.find(l => l.uid === current.parentId);
        }
        return false;
    };

    const generateUid = () => Math.random().toString(36).substr(2, 9);
    const FRAME_WIDTH = 20; // Aumentado para melhor visibilidade
    // Mantemos a resolução interna alta (Full HD) para não pixelar
    // Mantemos a resolução interna definida (1920x1080) para não pixelar
    const FW = 1920;
    const FH = 1080;
    const GRID = 32; 
    
    let layers = [];
    let activeLayerIndex = -1;
    let bgAssets = [];
    let bgVisible = true;
    let activeBgAssetIndex = -1;
    let bgTransform = { gPos: {x:0, y:0}, gScale: 1.0, gRotation: 0 };

    let img = new Image();
    // Transformação Global
    let gPos = { x: 0, y: 0 };
    let gScale = 1.0;
    let gRotation = 0; // Radianos
    let currentPinRadius = 80;
    
    // Câmera / Zoom do Viewport
    let camZoom = 1;
    let camOffset = { x: 0, y: 0 };
    let panMode = false;
    let isShiftPressed = false;
    let isCtrlPressed = false;
    let interactionStartedOnCanvas = false;
    let pinVisualSize = 5;

    let pins = []; 
    let mesh = []; // mesh para deformação
    let mode = 'move'; // 'add', 'move', 'g-rotate', 'g-scale'
    let selectionRect = null;
    let selectedPins = [];
    let hoveredPin = null;
    let dragTarget = null;
    let selectedAudioClip = null;
    
    // Variáveis FaceRig Integration
    let rigMode = 'none';
    let draggingJoy = null;
    const radiusSlider = document.getElementById('radiusSlider');
    const pinRadiusSlider = document.getElementById('pinRadiusSlider');
    const mouthRadiusSlider = document.getElementById('mouthRadiusSlider');
    const browRadiusSlider = document.getElementById('browRadiusSlider');

    let draggedAudioClip = null;
    let audioDragStartX = 0;
    let audioDragStartY = 0;
    let audioInitialStartFrame = 0;
    let audioInitialLane = 0;
    
    let isMouseDownOnCanvas = false;

    let resizingAudioClip = null;
    let resizeSide = null;
    let audioResizeStartX = 0;
    let initialResizeDuration = 0;
    let initialResizeTimeOffset = 0;
    
    let draggedLayerIndex = null;
    let draggedPoseIndex = null;
    let wasTransforming = false;
    // Animação
    let keyframes = []; // { frame: 0, pins: [...] }
    let currentFrame = 1;
    let isPlaying = false;
    let showPins = true;
    let totalFrames = 1;
    let clipboardPose = null;
    let clipboardRange = null;
    let lastMousePos = { x: 0, y: 0 };
    let lastRawMousePos = { x: 0, y: 0 };
    let audioClips = []; // { id, buffer, element, startFrame, durationFrames }

    canvas.width = FW;
    canvas.height = FH; // Define a resolução interna do canvas

    document.getElementById('upload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (isPlaying) togglePlay(); // Pausa para garantir o salvamento do novo asset
        const reader = new FileReader();
        reader.onload = (ev) => { 
            const newImg = new Image();
            newImg.onload = () => { 
                const name = file.name.split('.')[0];
                addLayer(name, newImg);
                draw();
            };
            newImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value = "";
    };

    document.getElementById('bg-upload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (isPlaying) togglePlay();

        const reader = new FileReader();
        reader.onload = (ev) => {
            const newBg = new Image();
            newBg.onload = () => {
                bgAssets.push({ name: file.name.split('.')[0], img: newBg });
                const newIndex = bgAssets.length - 1;
                activeBgAssetIndex = newIndex;

                // Correção Sênior: Se for o primeiro background, aplica a todos os keyframes
                // já criados para evitar que ele desapareça ao dar play.
                if (bgAssets.length === 1) {
                    keyframes.forEach(kf => {
                        if (kf.bgAssetIndex === undefined || kf.bgAssetIndex === -1) {
                            kf.bgAssetIndex = newIndex;
                        }
                    });
                }
                updateLayersUI();
                draw();
            };
            newBg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        e.target.value = "";
    };

    function initMesh() {
        mesh = [];
        if (!img.width) return;
        
        const w = img.width;
        const h = img.height;

        for (let y = 0; y <= GRID; y++) {
            for (let x = 0; x <= GRID; x++) {
                const px = (x / GRID) * w;
                const py = (y / GRID) * h;
                mesh.push({ x: px, y: py, ox: px, oy: py }); // x,y (atual), ox,oy (original)
            }
        }
    }

    function initFaceRigProps(l, w, h) {
        l.headRadius = 220;
        l.headFocus = { x: w / 2, y: h / 3 };
        l.headRot = { x: 0, y: 0 };
        l.eyeRot = { x: 0, y: 0 };
        l.exprValues = {
            blinkTop: 0, blinkBottom: 0, smile: 0, stretch: 0, open: 0,
            browH: 0, browT: 0, tilt: 0, mouthRot: 0,
            pinRad: 45, mouthRad: 30, browRad: 15
        };
        l.exprPins = [
            { x: w * 0.46, y: h * 0.32 }, // Olho Esquerdo
            { x: w * 0.54, y: h * 0.32 }, // Olho Direito
            { x: w * 0.5, y: h * 0.42 },  // Boca
            { x: w * 0.43, y: h * 0.28 }, // Sobrancelha Esq Ext
            { x: w * 0.47, y: h * 0.28 }, // Sobrancelha Esq Int
            { x: w * 0.53, y: h * 0.28 }, // Sobrancelha Dir Int
            { x: w * 0.57, y: h * 0.28 }  // Sobrancelha Dir Ext
        ];
    }

    function addLayer(name, imageObj) {
        // Se não estiver no primeiro frame e já existirem keyframes, importa como invisível
        const layer = {
            uid: generateUid(),
            parentId: null,
            name: name,
            assets: [{ name: name, img: imageObj }],
            activeAssetIndex: 0,
            z: 0,
            pins: [],
            mesh: [],
            gPos: { x: 0, y: 0 },
            gScale: 1.0,
            gRotation: 0,
            visible: true,
            poses: []
        };
        initFaceRigProps(layer, imageObj.width, imageObj.height);
        layers.push(layer);

        // Sincroniza keyframes existentes para que conheçam a nova camada
        keyframes.forEach(kf => {
            const isBefore = kf.frame < Math.round(currentFrame);
            if (kf.layerStates.length < layers.length) {
                kf.layerStates.push({
                    pins: [],
                    gPos: { x: 0, y: 0 },
                    gScale: 1.0,
                    gRotation: 0,
                    z: 0,
                    parentId: null,
                    visible: !isBefore,
                    assetIndex: 0,
                    exprPins: layer.exprPins.map(p => ({...p})),
                    headRot: { x: 0, y: 0 },
                    eyeRot: { x: 0, y: 0 },
                    exprValues: { ...layer.exprValues },
                    headFocus: { ...layer.headFocus },
                    headRadius: layer.headRadius
                });
            }
        });

        selectLayer(layers.length - 1);
        initMesh();
        layer.mesh = mesh.map(m => ({...m}));
        setKeyframe(false);
    }

    async function importFolderFromDisk(input) {
        const files = Array.from(input.files);
        // Filtra imagens e ordena numericamente (ex: frame1, frame2, frame10)
        const imageFiles = files.filter(f => f.type.startsWith('image/'))
                                .sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

        if (imageFiles.length === 0) {
            alert("Nenhuma imagem encontrada na pasta selecionada.");
            input.value = "";
            return;
        }

        showLoadingModal(`Importando ${imageFiles.length} imagens...`);

        try {
            const folderName = (imageFiles[0].webkitRelativePath && imageFiles[0].webkitRelativePath.split('/')[0]) || "Pasta Importada";
            const folderUid = generateUid();
            
            const folder = {
                uid: folderUid,
                parentId: null,
                name: folderName,
                isFolder: true,
                expanded: true,
                visible: true,
                pins: [],
                z: 0,
                assets: [],
                gPos: { x: 0, y: 0 },
                gScale: 1.0,
                gRotation: 0,
                poses: []
            };
            layers.push(folder);

            const currentF = Math.round(currentFrame);
            keyframes.forEach(kf => {
                const isBefore = kf.frame < currentF;
                kf.layerStates.push({ visible: !isBefore, assetIndex: 0, parentId: null, pins: [], gPos: {x:0, y:0}, gScale: 1, gRotation: 0, z: 0 });
            });

            for (const file of imageFiles) {
                const imgObj = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => resolve(img);
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                const name = file.name.split('.')[0];
                addLayerToFolder(name, imgObj, folderUid, true);
            }

            setKeyframe(false);
            updateLayersUI();
            draw();
        } catch (err) {
            console.error(err);
            alert("Erro ao carregar imagens da pasta.");
        } finally {
            hideLoadingModal();
            input.value = "";
        }
    }

    function addLayerToFolder(name, imageObj, parentUid) {
        const layer = {
            uid: generateUid(),
            parentId: parentUid,
            name: name,
            assets: [{ name: name, img: imageObj }],
            activeAssetIndex: 0,
            z: 0,
            pins: [],
            mesh: [],
            gPos: { x: 0, y: 0 },
            gScale: 1.0,
            gRotation: 0,
            visible: true,
            poses: []
        };
        layers.push(layer);

        const w = imageObj.width;
        const h = imageObj.height;
        for (let y = 0; y <= GRID; y++) {
            for (let x = 0; x <= GRID; x++) {
                const px = (x / GRID) * w;
                const py = (y / GRID) * h;
                layer.mesh.push({ x: px, y: py, ox: px, oy: py });
            }
        }

        initFaceRigProps(layer, imageObj.width, imageObj.height);
        keyframes.forEach(kf => {
            const isBefore = kf.frame < Math.round(currentFrame);
            kf.layerStates.push({
                pins: [], gPos: {x:0, y:0}, gScale: 1, gRotation: 0, z: 0,
                parentId: parentUid, visible: !isBefore, assetIndex: 0,
                exprPins: layer.exprPins.map(p => ({...p})),
                headRot: { x: 0, y: 0 },
                eyeRot: { x: 0, y: 0 },
                exprValues: { ...layer.exprValues },
                headFocus: { ...layer.headFocus },
                headRadius: layer.headRadius
            });
        });
    }

    function createFolder() {
        const folder = {
            uid: generateUid(),
            parentId: null,
            name: "Nova Pasta",
            isFolder: true,
            expanded: true,
            visible: true,
            pins: [],
            z: 0,
            assets: [],
            gPos: { x: 0, y: 0 },
            gScale: 1.0,
            gRotation: 0,
            poses: []
        };
        layers.push(folder);
        
        keyframes.forEach(kf => {
            kf.layerStates.push({ visible: true, assetIndex: 0, parentId: null, pins: [], gPos: {x:0, y:0}, gScale: 1, gRotation: 0 });
        });

        updateLayersUI();
    }

    function addAssetToLayer(layerIdx) {
        const input = document.getElementById('asset-upload');
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const newImg = new Image();
                newImg.onload = () => {
                    const l = layers[layerIdx];
                    l.assets.push({
                        name: file.name.split('.')[0],
                        img: newImg
                    });
                    l.activeAssetIndex = l.assets.length - 1;
                    
                    if (activeLayerIndex === layerIdx) {
                        img = newImg;
                    }
                    
                    updateDeform(l);
                    updateLayersUI();
                    draw();
                };
                newImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = "";
        };
        input.click();
    }

    function selectLayer(index) {
        // Sincroniza estado global atual com a camada ativa anterior
        syncActiveLayer();
        
        selectedPins = [];
        activeLayerIndex = index;
        selectedPins = []; // Limpa seleção ao trocar de camada para evitar erros de parentesco
        
        if (activeLayerIndex === -1) return;
        if (index !== 'bg') { // Only update if it's a layer, not background
            const l = layers[index];
            if (!l) return;
            img = (l.assets && l.assets.length > 0) ? l.assets[l.activeAssetIndex].img : new Image();
            mesh = l.mesh || [];
            pins = l.pins || [];
            gPos = l.gPos || {x:0, y:0};
            gScale = l.gScale;
            gRotation = l.gRotation;
            syncRigProUI(l);
        }
        
        updateLayersUI();
        updatePosesUI();
    }

    function syncRigProUI(l) {
        if (!l || l.isFolder) return;
        radiusSlider.value = l.headRadius || 220;
        
        const v = l.exprValues || {};
        pinRadiusSlider.value = v.pinRad || 45;
        mouthRadiusSlider.value = v.mouthRad || 30;
        browRadiusSlider.value = v.browRad || 15;
        
        document.getElementById('blinkTopSlider').value = v.blinkTop || 0;
        document.getElementById('blinkBottomSlider').value = v.blinkBottom || 0;
        document.getElementById('smileSlider').value = v.smile || 0;
        document.getElementById('mouthRotSlider').value = v.mouthRot || 0;
        document.getElementById('stretchSlider').value = v.stretch || 0;
        document.getElementById('openSlider').value = v.open || 0;
        document.getElementById('browHeightSlider').value = v.browH || 0;
        document.getElementById('browTiltSlider').value = v.browT || 0;
        document.getElementById('tiltSlider').value = v.tilt || 0;
        
        const hRot = l.headRot || {x:0, y:0};
        document.getElementById('knob').style.left = (hRot.x + 1) * 40 + "px";
        document.getElementById('knob').style.top = (hRot.y + 1) * 40 + "px";
        
    }

    function changeZoom(factor) {
        const oldZoom = camZoom;
        camZoom = Math.max(1, Math.min(10, camZoom * factor));
        if (oldZoom === camZoom) return;
        const actualFactor = camZoom / oldZoom;
        // Zoom centralizado: escala o offset proporcionalmente à mudança de zoom
        camOffset.x *= actualFactor;
        camOffset.y *= actualFactor;
        draw();
    }
    function updateZoomFromSlider(val) {
        const targetZoom = parseFloat(val);
        const factor = targetZoom / camZoom;
        changeZoom(factor);
        updateViewSlidersUI();
    }
    function updateViewSlidersUI() {
        document.getElementById('zoom-slider').value = camZoom;
    }

    function resetCamera() {
        camZoom = 1;
        camOffset = { x: 0, y: 0 };
        updateViewSlidersUI();
        draw();
    }

    function togglePanMode() {
        panMode = !panMode;
        document.getElementById('pan-mode-btn').classList.toggle('active', panMode);
        if (panMode) {
            // Desativa outros modos visuais para evitar confusão
            setMode('none');
        }
    }

    function updateLayersUI() {
        const list = document.getElementById('layers-list');
        list.innerHTML = '';

        const renderedUids = new Set();
        // --- Renderização Senior do Background Item ---

        if (bgAssets.length > 0) {

        if (folderToSwitch && folderToSwitch.isFolder) {

                            // Seleção Silenciosa: atualiza dados internos sem reconstruir a UI (evita perda de foco no slider)

                            const l = layers[activeLayerIndex];

                            mesh = l.mesh || [];

        list.ondragover = (e) => e.preventDefault();
        list.ondrop = (e) => {

        const renderLayer = (l, idx) => {

            let assetSelect = null;

                assetSelect.onclick = (e) => e.stopPropagation();
                assetSelect.onchange = (e) => {

            } else {
                const toggle = document.createElement('span');

            }

            const controls = document.createElement('div');
            controls.style.display = "flex";
            controls.style.gap = "5px";
            controls.style.gap = "3px";

            const btnVis = document.createElement('button');
            btnVis.innerText = (l.visible !== false) ? "👁️" : "🌑";
            btnVis.className = "btn-import-small";
            btnVis.onclick = (e) => { 
                e.stopPropagation();

            if (!l.isFolder) { // Removed video/image_sequence check
                const btnAddAsset = document.createElement('button');
                btnAddAsset.innerText = "➕";
                btnAddAsset.className = "btn-import-small";
                btnAddAsset.title = "Adicionar Variação (Switch)";
                btnAddAsset.onclick = (e) => { e.stopPropagation(); addAssetToLayer(idx); };

            }

            const startRename = (e) => {
                e.stopPropagation();

                renameInput.style.display = "inline";

            nameSpan.ondblclick = startRename;

            const btnRename = document.createElement('button');

            const btnExport = document.createElement('button');

            btnUp.innerText = "↑";
