<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rigger 2D - Poses e Projetos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .canvas-container {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        canvas { touch-action: none; cursor: crosshair; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        .timeline-scroll::-webkit-scrollbar-track { background: #1e1e1e; }
        .timeline-scroll::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 4px; }
        .timeline-scroll::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        .btn-tool { @apply p-2 rounded-lg border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 hover:text-blue-600 transition-colors; }
        .btn-tool.active { @apply bg-blue-50 border-blue-200 text-blue-600; }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <div class="flex-1 flex flex-col md:flex-row min-h-0 overflow-hidden">
        <aside class="w-full md:w-72 bg-white border-r border-gray-200 flex flex-col shadow-xl z-20 h-auto md:h-full shrink-0">
            <div class="p-4 md:p-5 border-b border-gray-100 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-sm">A</div>
                    <h1 class="text-lg font-bold tracking-tight text-gray-900">Rigger <span class="text-blue-600">2D</span></h1>
                </div>
                <div class="flex items-center gap-1">
                    <button id="btn-save-project" class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Salvar Projeto">
                        <i data-lucide="save" class="w-4 h-4"></i>
                    </button>
                    <label class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors cursor-pointer" title="Carregar Projeto">
                        <i data-lucide="folder-open" class="w-4 h-4"></i>
                        <input type="file" id="projectInput" accept=".json" class="hidden">
                    </label>
                </div>
            </div>

            <div class="p-5 flex-1 overflow-y-auto flex flex-col gap-6">
                <div id="step1" class="transition-opacity duration-300">
                    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Etapa 1: Upload</h2>
                    <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i data-lucide="upload-cloud" class="w-8 h-8 mb-3 text-gray-400"></i>
                            <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">Clique para enviar</span></p>
                            <p class="text-xs text-gray-500">PNG transparente</p>
                        </div>
                        <input type="file" id="imageInput" class="hidden" accept="image/*" />
                    </label>
                </div>

                <div id="step2" class="hidden opacity-0 transition-opacity duration-300 flex flex-col h-full">
                    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Etapa 2: Esqueleto</h2>
                    <p class="text-xs text-gray-500 mb-2">Ligue os pontos para formar os "ossos" da malha.</p>
                    <div class="flex gap-2 mb-4">
                        <button id="btn-add-node" class="btn-tool active flex-1 flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar
                        </button>
                        <button id="btn-delete-node" class="btn-tool flex-1 flex items-center justify-center gap-2 text-red-500 hover:text-red-600">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> Remover
                        </button>
                    </div>
                    <button id="btn-clear-skeleton" class="btn-tool w-full mb-6 flex items-center justify-center gap-2 text-red-500 hover:text-red-600">
                        <i data-lucide="x-circle" class="w-4 h-4"></i> Limpar Tudo
                    </button>
                    <div class="mt-auto space-y-3">
                        <button id="btn-next-animate" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg shadow-md transition-all flex justify-center items-center gap-2 disabled:opacity-50" disabled>
                            <span>Ir para Animação</span>
                            <i data-lucide="video" class="w-4 h-4"></i>
                        </button>
                        <button id="btn-reupload" class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 rounded-lg transition-all">Trocar Imagem</button>
                    </div>
                </div>

                <div id="step3" class="hidden opacity-0 transition-opacity duration-300 flex-col gap-4">
                    <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Etapa 3: Animação</h2>
                    
                    <button id="btn-export-video" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-lg shadow-md transition-all flex justify-center items-center gap-2 mb-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Exportar Vídeo Final
                    </button>

                    <div class="bg-white border border-gray-200 rounded-lg p-3">
                        <p class="text-xs font-medium text-gray-700 mb-2">Ordem de Desenho (Z-Order)</p>
                        <div class="flex gap-2">
                            <button id="btn-bring-forward" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 py-1.5 rounded-lg transition-all flex justify-center gap-2 text-sm"><i data-lucide="arrow-up" class="w-4 h-4"></i> Frente</button>
                            <button id="btn-send-backward" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 py-1.5 rounded-lg transition-all flex justify-center gap-2 text-sm"><i data-lucide="arrow-down" class="w-4 h-4"></i> Atrás</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex items-center gap-3 bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                            <input type="checkbox" id="toggleSkeleton" checked class="w-4 h-4 text-blue-600 rounded">
                            <label for="toggleSkeleton" class="text-sm font-medium text-gray-700 cursor-pointer">Mostrar Esqueleto</label>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                            <input type="checkbox" id="toggleMesh" class="w-4 h-4 text-blue-600 rounded">
                            <label for="toggleMesh" class="text-sm font-medium text-gray-700 cursor-pointer">Mostrar Malha</label>
                        </div>
                    </div>

                    <button id="btn-back-rig" class="w-full mt-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2.5 rounded-lg transition-all flex justify-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Editar Esqueleto
                    </button>
                </div>
            </div>
        </aside>

        <main id="canvasArea" class="flex-1 relative flex items-center justify-center p-2 md:p-4 canvas-container bg-gray-100 min-w-0 min-h-0 overflow-hidden">
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 z-10 pointer-events-none">
                <i data-lucide="image" class="w-24 h-24 mb-4 text-gray-300"></i>
                <p class="text-lg font-medium">A área de desenho está vazia</p>
            </div>
            <canvas id="appCanvas" width="800" height="800" class="bg-white shadow-xl rounded-2xl border border-gray-200" style="max-width: 100%; max-height: 100%; aspect-ratio: 1 / 1;"></canvas>

            <div id="zoom-toolbar" class="absolute bottom-4 right-4 z-20 bg-white shadow-lg border border-gray-200 rounded-xl flex items-center gap-1 p-1.5">
                <button id="btn-pan-mode" class="btn-tool !p-2" title="Mover Área (Pan)">
                    <i data-lucide="hand" class="w-4 h-4"></i>
                </button>
                <div class="w-px h-5 bg-gray-200 mx-0.5"></div>
                <button id="btn-zoom-out" class="btn-tool !p-2" title="Diminuir Zoom">
                    <i data-lucide="zoom-out" class="w-4 h-4"></i>
                </button>
                <span id="zoom-level" class="text-xs font-medium text-gray-500 w-10 text-center select-none">100%</span>
                <button id="btn-zoom-in" class="btn-tool !p-2" title="Aumentar Zoom">
                    <i data-lucide="zoom-in" class="w-4 h-4"></i>
                </button>
                <div class="w-px h-5 bg-gray-200 mx-0.5"></div>
                <button id="btn-zoom-reset" class="btn-tool !p-2" title="Restaurar Zoom">
                    <i data-lucide="maximize" class="w-4 h-4"></i>
                </button>
            </div>
        </main>

        <aside id="right-sidebar" class="w-full md:w-64 bg-white border-l border-gray-200 hidden flex-col shadow-xl z-20 h-auto md:h-full shrink-0 transition-opacity duration-300">
            <div class="p-5 border-b border-gray-100 flex items-center gap-3 bg-gray-50 shrink-0">
                <i data-lucide="library" class="w-5 h-5 text-blue-600"></i>
                <h2 class="text-md font-bold text-gray-900 uppercase tracking-wide">Biblioteca de Poses</h2>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto flex flex-col gap-2" id="poses-list">
                <p class="text-xs text-gray-400 text-center mt-4">Nenhuma pose salva.</p>
            </div>

            <div class="p-4 border-t border-gray-100 bg-white shrink-0">
                <button id="btn-save-pose" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg shadow-sm transition-all flex justify-center items-center gap-2">
                    <i data-lucide="bookmark-plus" class="w-4 h-4"></i> Salvar Pose
                </button>
            </div>
        </aside>
    </div>

    <div id="timeline-panel" class="hidden h-32 bg-[#1e1e1e] flex-col shrink-0 text-gray-300 no-select z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.15)] border-t border-black">
        <div class="h-10 border-b border-[#333] flex items-center px-4 gap-4 bg-[#252526] shrink-0">
            <div class="flex items-center gap-1">
                <button id="tl-btn-start" class="p-1.5 hover:bg-[#333] rounded text-gray-400 hover:text-white transition-colors" title="Início"><i data-lucide="skip-back" class="w-4 h-4"></i></button>
                <button id="tl-btn-play" class="p-1.5 hover:bg-[#333] rounded text-gray-400 hover:text-white transition-colors" title="Play/Pause"><i data-lucide="play" class="w-4 h-4"></i></button>
            </div>
            
            <div class="bg-[#111] px-2 py-0.5 rounded border border-[#333] min-w-[80px] text-center">
                <span id="tl-time-display" class="font-mono text-xs text-blue-400 font-semibold">00:00:00</span>
            </div>

            <div class="h-4 w-px bg-[#444] mx-1"></div>

            <button id="tl-btn-add-kf" class="px-2 py-1 bg-[#333] hover:bg-[#444] border border-[#555] rounded flex gap-1.5 items-center text-xs transition-colors text-white">
                <i data-lucide="diamond" class="w-3 h-3 text-blue-400"></i> Salvar Quadro (Keyframe)
            </button>
            
            <div class="h-4 w-px bg-[#444] mx-1"></div>

            <button id="tl-btn-copy" class="p-1.5 hover:bg-[#333] rounded text-gray-400 hover:text-white transition-colors" title="Copiar Keyframe Atual"><i data-lucide="copy" class="w-4 h-4"></i></button>
            <button id="tl-btn-paste" class="p-1.5 hover:bg-[#333] rounded text-gray-400 hover:text-white transition-colors" title="Colar Keyframe"><i data-lucide="clipboard-paste" class="w-4 h-4"></i></button>

            <div id="toast-msg" class="ml-2 text-xs text-green-400 font-medium opacity-0 transition-opacity">Copiado!</div>
            <div class="ml-auto text-xs text-gray-500 italic hidden md:block">Arraste os losangos. Botão direito para excluir.</div>
        </div>

        <div class="flex-1 flex overflow-hidden">
            <div class="w-20 shrink-0 bg-[#252526] border-r border-[#333] flex flex-col relative z-20">
                <div class="h-7 border-b border-[#333] bg-[#1e1e1e]"></div>
                <div class="h-10 border-b border-[#333] bg-[#222] flex items-center justify-center">
                    <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">Master</span>
                </div>
            </div>

            <div id="tl-tracks-scroll" class="flex-1 overflow-x-auto overflow-y-hidden relative bg-[#1e1e1e] timeline-scroll">
                <div id="tl-tracks-container" class="relative h-full min-w-full">
                    <div id="tl-ruler" class="h-7 border-b border-[#333] sticky top-0 bg-[#1e1e1e] z-10 cursor-ew-resize">
                        <canvas id="tl-ruler-canvas" class="block"></canvas>
                    </div>
                    <div class="h-10 border-b border-[#333] relative w-full bg-[#222]" id="tl-master-track"></div>
                    <div id="tl-playhead" class="absolute top-0 bottom-0 w-px bg-red-500 z-30 pointer-events-none transition-transform duration-75 ease-linear" style="transform: translateX(0px);">
                        <div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-red-500 absolute top-0 -left-[5.5px]"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const canvas = document.getElementById('appCanvas');
        const ctx = canvas.getContext('2d');

        // ==================================
        // ZOOM / PAN (área de desenho)
        // ==================================
        let viewScale = 1; let panX = 0; let panY = 0;
        let isPanMode = false; let isPanning = false; let panStart = { x: 0, y: 0 };
        let pinchStartDist = null; let pinchStartScale = 1;

        function applyView() {
            canvas.style.transformOrigin = 'center center';
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${viewScale})`;
            document.getElementById('zoom-level').innerText = Math.round(viewScale * 100) + '%';
        }
        function setZoom(newScale) { viewScale = Math.min(5, Math.max(0.4, newScale)); applyView(); }

        function panPointerDown(e) {
            isPanning = true;
            const p = e.touches ? e.touches[0] : e;
            panStart = { x: p.clientX - panX, y: p.clientY - panY };
            canvas.style.cursor = 'grabbing';
        }
        function panPointerMove(e) {
            const p = e.touches ? e.touches[0] : e;
            panX = p.clientX - panStart.x; panY = p.clientY - panStart.y;
            applyView();
        }
        function panPointerUp() {
            if (isPanning) { isPanning = false; canvas.style.cursor = isPanMode ? 'grab' : 'default'; }
        }

        document.getElementById('btn-zoom-in').addEventListener('click', () => setZoom(viewScale * 1.2));
        document.getElementById('btn-zoom-out').addEventListener('click', () => setZoom(viewScale / 1.2));
        document.getElementById('btn-zoom-reset').addEventListener('click', () => { panX = 0; panY = 0; setZoom(1); });

        const btnPanMode = document.getElementById('btn-pan-mode');
        btnPanMode.addEventListener('click', () => {
            isPanMode = !isPanMode;
            btnPanMode.classList.toggle('active', isPanMode);
            updateToolState();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            setZoom(viewScale * (e.deltaY < 0 ? 1.1 : 0.9));
        }, { passive: false });

        window.addEventListener('mouseup', () => panPointerUp());
        window.addEventListener('touchend', (e) => { if (!e.touches || e.touches.length < 2) pinchStartDist = null; panPointerUp(); });

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); isPanning = false;
                pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                pinchStartScale = viewScale;
            }
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && pinchStartDist) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                setZoom(pinchStartScale * (dist / pinchStartDist));
            }
        }, { passive: false });
        
        let currentStep = 1; 
        let uploadedImage = null;
        let originalImageSrc = null; 
        let imgTransform = { x: 0, y: 0, scale: 1, w: 0, h: 0 };
        
        let showSkeletonInAnim = true;
        let showMeshGrid = false;

        let nodes = {};
        let nextNodeId = 0;
        let selectedNodeId = null;
        let rootNodeId = null;
        let isAddingNodeMode = true;

        let bones = [];
        let nextBoneId = 0;
        let savedPoses = []; 

        let mesh = { vertices: [], triangles: [] };

        let tl_frame = 0;
        let tl_fps = 30; 
        let tl_maxFrames = 150; 
        let tl_pxPerFrame = 10;
        let globalKeyframes = []; 
        let clipboardState = null; 
        
        let tl_isPlaying = false;
        let tl_isScrubbing = false;
        let tl_draggingKf = null;
        
        let tl_lastTime = 0;
        let tl_reqAnimFrame = null;

        // ==================================
        // SISTEMA DE POSES
        // ==================================
        function renderPoses() {
            const list = document.getElementById('poses-list');
            list.innerHTML = '';
            if (savedPoses.length === 0) {
                list.innerHTML = '<p class="text-xs text-gray-400 text-center mt-4">Nenhuma pose salva.</p>';
                return;
            }
            savedPoses.forEach((pose, idx) => {
                const div = document.createElement('div');
                div.className = 'bg-white border border-gray-200 rounded-lg p-2.5 flex justify-between items-center hover:border-blue-400 hover:shadow-sm transition-all cursor-pointer group';
                div.innerHTML = `
                    <span class="text-sm font-medium text-gray-700 pl-1 truncate flex-1" data-pose-name>${pose.name}</span>
                    <div class="flex items-center gap-0.5 shrink-0">
                        <button class="text-gray-300 hover:text-blue-500 p-1 rounded transition-colors" title="Renomear Pose" data-rename-btn><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                        <button class="text-gray-300 hover:text-red-500 p-1 rounded transition-colors" title="Deletar Pose" data-delete-btn><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `;
                div.onclick = () => applyPose(idx);

                const nameSpan = div.querySelector('[data-pose-name]');
                const renameBtn = div.querySelector('[data-rename-btn]');
                const deleteBtn = div.querySelector('[data-delete-btn]');

                function startInlineRename(e) {
                    e.stopPropagation();
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = savedPoses[idx].name;
                    input.maxLength = 40;
                    input.className = 'text-sm font-medium text-gray-700 pl-1 flex-1 min-w-0 border border-blue-400 rounded px-1 py-0.5 outline-none bg-white';
                    input.addEventListener('click', ev => ev.stopPropagation());
                    input.addEventListener('mousedown', ev => ev.stopPropagation());
                    input.addEventListener('keydown', ev => {
                        ev.stopPropagation();
                        if (ev.key === 'Enter') input.blur();
                        else if (ev.key === 'Escape') { input.dataset.cancelled = '1'; input.blur(); }
                    });
                    input.addEventListener('blur', () => {
                        if (input.dataset.cancelled !== '1') {
                            const newName = input.value.trim();
                            if (newName.length > 0) savedPoses[idx].name = newName;
                        }
                        renderPoses();
                    });
                    nameSpan.replaceWith(input);
                    input.focus(); input.select();
                }

                renameBtn.addEventListener('click', startInlineRename);
                nameSpan.addEventListener('dblclick', startInlineRename);
                deleteBtn.addEventListener('click', (e) => { e.stopPropagation(); deletePose(idx); });

                list.appendChild(div);
            });
            lucide.createIcons({root: list});
        }

        document.getElementById('btn-save-pose').addEventListener('click', () => {
            let state = {};
            for (let id in nodes) { state[id] = { x: nodes[id].animX, y: nodes[id].animY, z: nodes[id].zOrder || 0 }; }
            savedPoses.push({ name: 'Pose ' + (savedPoses.length + 1), state: state });
            renderPoses();
        });

        window.deletePose = function(index) {
            savedPoses.splice(index, 1);
            renderPoses();
        };

        window.applyPose = function(index) {
            if(tl_isPlaying) tl_togglePlay();
            let state = savedPoses[index].state;
            for (let id in nodes) {
                if(state[id]) {
                    nodes[id].animX = state[id].x;
                    nodes[id].animY = state[id].y;
                    nodes[id].zOrder = state[id].z || 0;
                }
            }
            updateMeshDeformation();
            drawAnimatedScene();
        };

        // ==================================
        // SISTEMA DE SALVAR / CARREGAR PROJETO
        // ==================================
        document.getElementById('btn-save-project').addEventListener('click', () => {
            if (!uploadedImage || !originalImageSrc) {
                alert('Faça o upload de uma imagem primeiro!');
                return;
            }
            // Observação: propositalmente NÃO salvamos "globalKeyframes" (a animação/timeline),
            // apenas o esqueleto, a malha e as poses salvas.
            const projectData = {
                imageSrc: originalImageSrc,
                imgTransform, nodes, nextNodeId, rootNodeId, bones, nextBoneId, 
                savedPoses
            };
            const blob = new Blob([JSON.stringify(projectData)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'projeto_rigger2d.json'; a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('projectInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    originalImageSrc = data.imageSrc;
                    
                    const img = new Image();
                    img.onload = () => {
                        uploadedImage = img;
                        imgTransform = data.imgTransform;
                        nodes = data.nodes || {};
                        nextNodeId = data.nextNodeId || 0;
                        rootNodeId = data.rootNodeId || null;
                        bones = data.bones || [];
                        nextBoneId = data.nextBoneId || 0;
                        // A animação (keyframes) nunca é salva, então sempre começamos com a timeline vazia/zerada
                        globalKeyframes = [];
                        tl_maxFrames = 150;
                        savedPoses = data.savedPoses || [];
                        
                        document.getElementById('empty-state').style.display = 'none';
                        renderPoses();
                        
                        switchStep(2); 
                        document.getElementById('btn-next-animate').disabled = Object.keys(nodes).length < 2;
                    };
                    img.src = originalImageSrc;
                } catch (err) {
                    alert("Erro ao carregar projeto: O arquivo pode estar corrompido.");
                }
            };
            reader.readAsText(file);
        });

        // ==================================
        // TIMELINE
        // ==================================
        const TL_TAIL_SECONDS = 10; // "respiro" sempre disponível após o último keyframe, para criar novas poses

        function tl_growTimelineIfNeeded() {
            const tailFrames = TL_TAIL_SECONDS * tl_fps;
            const lastKf = getMaxFrame();
            const needed = Math.max(lastKf + tailFrames, tl_frame + Math.round(tailFrames / 2), 150);
            if (needed > tl_maxFrames) { tl_maxFrames = needed; return true; }
            return false;
        }

        function tl_init() {
            if (globalKeyframes.length === 0) { 
                tl_frame = 0; tl_maxFrames = 150; 
                tl_addGlobalKeyframe(0); 
            }
            tl_growTimelineIfNeeded();
            tl_setFrame(0); updatePlayBtnUI(); tl_renderUI();
        }

        function tl_addGlobalKeyframe(f) {
            let state = {};
            for (let id in nodes) { state[id] = { x: nodes[id].animX, y: nodes[id].animY, z: nodes[id].zOrder || 0 }; }
            let existing = globalKeyframes.find(k => k.f === f);
            if (existing) existing.state = state; 
            else { globalKeyframes.push({ f: f, state: state }); globalKeyframes.sort((a,b) => a.f - b.f); }
            tl_growTimelineIfNeeded();
            tl_renderUI();
        }

        function tl_deleteGlobalKeyframe(f) {
            if (f === 0 && globalKeyframes.length === 1) return; 
            globalKeyframes = globalKeyframes.filter(k => k.f !== f);
            tl_growTimelineIfNeeded();
            tl_renderUI(); tl_applyFrame(tl_frame);
        }

        function getMaxFrame() {
            if(globalKeyframes.length === 0) return 0;
            return Math.max(...globalKeyframes.map(k => k.f));
        }

        function tl_applyFrame(f) {
            if (globalKeyframes.length === 0) return;
            let prev = null, next = null;
            for(let i = 0; i < globalKeyframes.length; i++) {
                let kf = globalKeyframes[i];
                if(kf.f === f) { prev = kf; next = kf; break; }
                if(kf.f <= f) prev = kf;
                if(kf.f >= f && !next) next = kf;
            }

            for(let id in nodes) {
                if (prev && next && prev !== next) {
                    let t = (f - prev.f) / (next.f - prev.f);
                    let px = prev.state[id]? prev.state[id].x : nodes[id].x; let py = prev.state[id]? prev.state[id].y : nodes[id].y; let pz = prev.state[id]? prev.state[id].z : 0;
                    let nx = next.state[id]? next.state[id].x : nodes[id].x; let ny = next.state[id]? next.state[id].y : nodes[id].y; let nz = next.state[id]? next.state[id].z : 0;
                    nodes[id].animX = px + (nx - px) * t; nodes[id].animY = py + (ny - py) * t; nodes[id].zOrder = (t < 0.5) ? pz : nz;
                } else if (prev) {
                    nodes[id].animX = prev.state[id]? prev.state[id].x : nodes[id].x; nodes[id].animY = prev.state[id]? prev.state[id].y : nodes[id].y; nodes[id].zOrder = prev.state[id]? prev.state[id].z : 0;
                } else if (next) {
                    nodes[id].animX = next.state[id]? next.state[id].x : nodes[id].x; nodes[id].animY = next.state[id]? next.state[id].y : nodes[id].y; nodes[id].zOrder = next.state[id]? next.state[id].z : 0;
                }
            }
            if (!tl_isPlaying && !isDragging) { updateMeshDeformation(); drawAnimatedScene(); }
        }

        function tl_setFrame(f) {
            tl_frame = Math.max(0, Math.floor(f));
            if (tl_growTimelineIfNeeded()) tl_renderUI();
            tl_applyFrame(tl_frame);
            
            document.getElementById('tl-playhead').style.transform = `translateX(${tl_frame * tl_pxPerFrame}px)`;
            
            let totalSecs = (tl_frame / tl_fps).toFixed(2);
            let m = Math.floor(totalSecs / 60).toString().padStart(2, '0');
            let s = Math.floor(totalSecs % 60).toString().padStart(2, '0');
            let ms = Math.floor((totalSecs % 1) * 100).toString().padStart(2, '0');
            document.getElementById('tl-time-display').innerText = `${m}:${s}:${ms}`;
        }

        function tl_renderUI() {
            const container = document.getElementById('tl-tracks-container');
            const rCanvas = document.getElementById('tl-ruler-canvas');
            const rCtx = rCanvas.getContext('2d');
            const masterTrack = document.getElementById('tl-master-track');
            
            let totalWidth = Math.max(tl_maxFrames * tl_pxPerFrame, container.parentElement.clientWidth);
            container.style.width = totalWidth + 'px';

            rCanvas.width = totalWidth; rCanvas.height = 28;
            rCtx.clearRect(0,0, rCanvas.width, rCanvas.height);
            rCtx.fillStyle = '#6b7280'; rCtx.font = '10px monospace';
            
            for(let i = 0; i <= totalWidth/tl_pxPerFrame; i++) {
                let x = i * tl_pxPerFrame;
                if (i % tl_fps === 0) {
                    rCtx.fillRect(x, 15, 1, 13);
                    rCtx.fillStyle = '#9ca3af'; rCtx.fillText((i/tl_fps) + 's', x + 3, 12); rCtx.fillStyle = '#6b7280';
                } else if (i % 10 === 0) { rCtx.fillRect(x, 22, 1, 6); }
            }

            masterTrack.innerHTML = '';
            globalKeyframes.forEach(kf => {
                let kDiv = document.createElement('div');
                kDiv.className = 'absolute top-3 w-4 h-4 bg-blue-500 border-2 border-[#1e1e1e] cursor-pointer transform rotate-45 hover:bg-white z-10 shadow-sm transition-colors';
                kDiv.style.left = (kf.f * tl_pxPerFrame - 8) + 'px';
                kDiv.title = `Quadro ${kf.f}`;
                kDiv.onmousedown = (e) => { e.stopPropagation(); if(e.button === 2) return; tl_draggingKf = kf; tl_setFrame(kf.f); };
                kDiv.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); tl_deleteGlobalKeyframe(kf.f); };
                masterTrack.appendChild(kDiv);
            });
        }

        window.addEventListener('mousemove', (e) => {
            if (tl_draggingKf) {
                const rect = document.getElementById('tl-tracks-container').getBoundingClientRect();
                let x = e.clientX - rect.left;
                let f = Math.max(0, Math.round(x / tl_pxPerFrame));
                tl_draggingKf.f = f; tl_setFrame(f); tl_renderUI();
            } else if (tl_isScrubbing) { handleTlScrubbing(e); }
        });
        
        window.addEventListener('mouseup', () => {
            if (tl_draggingKf) { globalKeyframes.sort((a,b) => a.f - b.f); tl_draggingKf = null; tl_growTimelineIfNeeded(); tl_renderUI(); }
            tl_isScrubbing = false;
        });

        function tl_playLoop(timestamp) {
            if (!tl_isPlaying) return;
            const delta = timestamp - tl_lastTime;
            const msPerFrame = 1000 / tl_fps;
            
            if (delta >= msPerFrame) {
                tl_lastTime = timestamp - (delta % msPerFrame);
                let nextFrame = tl_frame + 1;
                let maxK = getMaxFrame();
                if (nextFrame > maxK && maxK > 0) nextFrame = 0; 
                tl_setFrame(nextFrame);
            }
            updateMeshDeformation(); drawAnimatedScene();
            tl_reqAnimFrame = requestAnimationFrame(tl_playLoop);
        }

        function tl_togglePlay() {
            tl_isPlaying = !tl_isPlaying; updatePlayBtnUI();
            if (tl_isPlaying) {
                tl_lastTime = performance.now();
                if(tl_reqAnimFrame) cancelAnimationFrame(tl_reqAnimFrame);
                tl_reqAnimFrame = requestAnimationFrame(tl_playLoop);
            } else { cancelAnimationFrame(tl_reqAnimFrame); }
        }

        function updatePlayBtnUI() {
            const btn = document.getElementById('tl-btn-play');
            btn.innerHTML = `<i data-lucide="${tl_isPlaying ? 'pause' : 'play'}" class="w-4 h-4"></i>`;
            btn.classList.toggle('text-blue-400', tl_isPlaying);
            lucide.createIcons({root: btn});
        }

        function handleTlScrubbing(e) {
            const rect = document.getElementById('tl-tracks-container').getBoundingClientRect();
            let x = e.clientX - rect.left; tl_setFrame(Math.round(x / tl_pxPerFrame));
        }

        document.getElementById('tl-ruler').addEventListener('mousedown', (e) => { if(currentStep !== 3) return; tl_isScrubbing = true; if(tl_isPlaying) tl_togglePlay(); handleTlScrubbing(e); });
        document.getElementById('tl-btn-play').addEventListener('click', tl_togglePlay);
        document.getElementById('tl-btn-start').addEventListener('click', () => { tl_isPlaying = false; updatePlayBtnUI(); tl_setFrame(0); });
        document.getElementById('tl-btn-add-kf').addEventListener('click', () => tl_addGlobalKeyframe(tl_frame));
        
        function showToast(msg) { const t = document.getElementById('toast-msg'); t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 1500); }
        
        document.getElementById('tl-btn-copy').addEventListener('click', () => {
            let kf = globalKeyframes.find(k => k.f === tl_frame);
            if(kf) { clipboardState = JSON.parse(JSON.stringify(kf.state)); showToast("Pose Copiada!"); } 
            else { showToast("Crie um Keyframe primeiro!"); }
        });
        
        document.getElementById('tl-btn-paste').addEventListener('click', () => {
            if(clipboardState) {
                let stateCopy = JSON.parse(JSON.stringify(clipboardState));
                let existing = globalKeyframes.find(k => k.f === tl_frame);
                if(existing) { existing.state = stateCopy; } 
                else { globalKeyframes.push({f: tl_frame, state: stateCopy}); globalKeyframes.sort((a,b)=>a.f-b.f); }
                tl_growTimelineIfNeeded(); tl_applyFrame(tl_frame); tl_renderUI(); showToast("Pose Colada!");
            } else { showToast("Nada copiado!"); }
        });

        async function exportVideo() {
            if(globalKeyframes.length === 0) return;
            const btn = document.getElementById('btn-export-video');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Processando...`; btn.disabled = true;

            let oldSkeleton = showSkeletonInAnim; let oldMesh = showMeshGrid;
            showSkeletonInAnim = false; showMeshGrid = false;
            
            if (tl_isPlaying) tl_togglePlay();
            let maxF = getMaxFrame(); if(maxF === 0) maxF = 30;
            
            tl_setFrame(0); updateMeshDeformation(); drawAnimatedScene();
            
            const stream = canvas.captureStream(tl_fps);
            let options = { mimeType: 'video/webm; codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
            
            const recorder = new MediaRecorder(stream, options); const chunks = [];
            recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
            
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'animacao.webm'; a.click();
                showSkeletonInAnim = oldSkeleton; showMeshGrid = oldMesh;
                btn.innerHTML = `<i data-lucide="download" class="w-4 h-4"></i> Exportar Vídeo Final`; btn.disabled = false; tl_setFrame(0);
            };
            
            recorder.start();
            let currentF = 0;
            let exportInterval = setInterval(() => {
                tl_applyFrame(currentF); updateMeshDeformation(); drawAnimatedScene(); currentF++;
                if (currentF > maxF) { clearInterval(exportInterval); setTimeout(() => recorder.stop(), 50); }
            }, 1000 / tl_fps);
        }
        document.getElementById('btn-export-video').addEventListener('click', exportVideo);

        // FUNÇÃO CORRIGIDA: Agora busca o Z-Order a partir dos nós conectados ao osso (bone)
        function getBoneZ(boneId) { 
            const bone = bones.find(b => b.id === boneId);
            if (!bone) return 0;
            const z1 = nodes[bone.p1] ? (nodes[bone.p1].zOrder || 0) : 0;
            const z2 = nodes[bone.p2] ? (nodes[bone.p2].zOrder || 0) : 0;
            return (z1 + z2) / 2;
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
            let clientX = evt.clientX, clientY = evt.clientY;
            if (evt.touches && evt.touches.length > 0) { clientX = evt.touches[0].clientX; clientY = evt.touches[0].clientY; }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function distToSegment(px, py, x1, y1, x2, y2) {
            let A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
            let dot = A * C + B * D; let len_sq = C * C + D * D; let param = -1;
            if (len_sq != 0) param = dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; } else if (param > 1) { xx = x2; yy = y2; } else { xx = x1 + param * C; yy = y1 + param * D; }
            let dx = px - xx, dy = py - yy; return Math.sqrt(dx * dx + dy * dy);
        }

        function addNode(x, y) {
            const id = 'node_' + nextNodeId++;
            nodes[id] = { x, y, children: [], zOrder: 0 };
            
            if (rootNodeId === null) { rootNodeId = id; } 
            else if (selectedNodeId) { 
                nodes[selectedNodeId].children.push(id);
                nodes[id].children.push(selectedNodeId);
                bones.push({ id: 'bone_' + nextBoneId++, p1: selectedNodeId, p2: id });
            }
            selectedNodeId = id; 
            document.getElementById('btn-next-animate').disabled = Object.keys(nodes).length < 2;
            drawRigScene();
        }

        function deleteSelectedNode() {
            if (!selectedNodeId) return;
            delete nodes[selectedNodeId];
            bones = bones.filter(b => b.p1 !== selectedNodeId && b.p2 !== selectedNodeId);
            for (let id in nodes) { nodes[id].children = nodes[id].children.filter(childId => childId !== selectedNodeId); }
            if (selectedNodeId === rootNodeId) rootNodeId = Object.keys(nodes)[0] || null;
            selectedNodeId = null; 
            document.getElementById('btn-next-animate').disabled = Object.keys(nodes).length < 2;
            drawRigScene();
        }

        function clearSkeleton() { 
            nodes = {}; nextNodeId = 0; selectedNodeId = null; rootNodeId = null; 
            bones = []; nextBoneId = 0;
            globalKeyframes = []; savedPoses = []; renderPoses();
            document.getElementById('btn-next-animate').disabled = true;
            drawRigScene(); 
        }

        let isDragging = false; let lastMousePos = {x:0, y:0};

        function handleRigMouseDown(e) {
            if (isPanMode) { panPointerDown(e); return; }
            if (currentStep !== 2) return;
            const pos = getMousePos(e); let clickedNodeId = null; let minDist = 10;
            for (let id in nodes) {
                let dist = Math.hypot(pos.x - nodes[id].x, pos.y - nodes[id].y);
                if (dist < minDist) { minDist = dist; clickedNodeId = id; }
            }
            if (clickedNodeId) {
                if (isAddingNodeMode && selectedNodeId && selectedNodeId !== clickedNodeId) {
                    let boneExists = bones.some(b => (b.p1 === selectedNodeId && b.p2 === clickedNodeId) || (b.p1 === clickedNodeId && b.p2 === selectedNodeId));
                    if(!boneExists) {
                        bones.push({ id: 'bone_' + nextBoneId++, p1: selectedNodeId, p2: clickedNodeId });
                        nodes[selectedNodeId].children.push(clickedNodeId);
                        nodes[clickedNodeId].children.push(selectedNodeId);
                    }
                }
                selectedNodeId = clickedNodeId; 
                if (!isAddingNodeMode) isDragging = true; 
            } 
            else if (isAddingNodeMode) { addNode(pos.x, pos.y); }
            updateToolState(); drawRigScene();
        }

        function handleRigMouseMove(e) {
            if (isPanning) { panPointerMove(e); return; }
            if (currentStep !== 2 || !isDragging || !selectedNodeId || isAddingNodeMode) return;
            e.preventDefault(); const pos = getMousePos(e);
            nodes[selectedNodeId].x = pos.x; nodes[selectedNodeId].y = pos.y; drawRigScene();
        }

        function getImageAlphaSampler() {
            // Desenha a imagem "descartável" fora da tela, no mesmo lugar/tamanho em que é exibida,
            // para que possamos consultar o canal alfa (transparência) de cada ponto da malha.
            if (!uploadedImage) return () => 0;
            const off = document.createElement('canvas');
            off.width = canvas.width; off.height = canvas.height;
            const offCtx = off.getContext('2d');
            offCtx.drawImage(uploadedImage, imgTransform.x, imgTransform.y, imgTransform.w, imgTransform.h);
            const imgData = offCtx.getImageData(0, 0, off.width, off.height).data;
            return (x, y) => {
                const ix = Math.round(x); const iy = Math.round(y);
                if (ix < 0 || iy < 0 || ix >= off.width || iy >= off.height) return 0;
                return imgData[(iy * off.width + ix) * 4 + 3]; // canal alfa (0-255)
            };
        }

        function buildMesh() {
            mesh.vertices = []; mesh.triangles = [];
            const COLS = 32; const ROWS = 32; const pad = 30; 
            const startX = imgTransform.x - pad; const startY = imgTransform.y - pad;
            const stepX = (imgTransform.w + pad * 2) / COLS; const stepY = (imgTransform.h + pad * 2) / ROWS;
            for (let r = 0; r <= ROWS; r++) { for (let c = 0; c <= COLS; c++) { mesh.vertices.push({ u: startX + c * stepX, v: startY + r * stepY, animX: 0, animY: 0, weights: [] }); } }

            const getAlpha = getImageAlphaSampler();
            const ALPHA_THRESHOLD = 10; // abaixo disso, consideramos o ponto "fundo transparente"

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let p0 = r * (COLS + 1) + c; let p1 = p0 + 1; let p2 = p0 + (COLS + 1); let p3 = p2 + 1;
                    const verts = [p0, p1, p2, p3];
                    // Mantemos o quadrado (2 triângulos) se QUALQUER um dos 4 cantos tocar o desenho
                    // (não só o centro) — isso "dilata" a malha em 1 célula, evitando bordas cortadas,
                    // enquanto ainda descarta o retângulo vazio de fundo (mais parecido com o
                    // recorte por silhueta usado no Animated Drawings da Meta).
                    const touchesDrawing = verts.some(i => getAlpha(mesh.vertices[i].u, mesh.vertices[i].v) > ALPHA_THRESHOLD);
                    if (touchesDrawing) {
                        mesh.triangles.push([p0, p1, p2], [p1, p3, p2]);
                    }
                }
            }
        }

        function calculateWeights() {
            mesh.vertices.forEach(vert => {
                let totalWeight = 0; vert.weights = [];
                bones.forEach(bone => {
                    let p1 = nodes[bone.p1], p2 = nodes[bone.p2];
                    let dist = distToSegment(vert.u, vert.v, p1.x, p1.y, p2.x, p2.y);
                    let weight = 1.0 / Math.pow(dist + 10, 4); vert.weights.push({ boneId: bone.id, w: weight }); totalWeight += weight;
                });
                if (totalWeight > 0) vert.weights.forEach(bw => bw.w /= totalWeight);
            });
        }

        function prepareAnimation() { 
            for (let id in nodes) { 
                if (nodes[id].animX === undefined || currentStep !== 3) {
                    nodes[id].animX = nodes[id].x; nodes[id].animY = nodes[id].y; 
                }
            } 
        }

        function handleAnimMouseDown(e) {
            if (isPanMode) { panPointerDown(e); return; }
            if (currentStep !== 3) return;
            if (tl_isPlaying) tl_togglePlay();
            const pos = getMousePos(e); let clickedNodeId = null; let minDist = 15;
            for (let id in nodes) {
                let dist = Math.hypot(pos.x - nodes[id].animX, pos.y - nodes[id].animY);
                if (dist < minDist) { minDist = dist; clickedNodeId = id; }
            }
            if (clickedNodeId) { selectedNodeId = clickedNodeId; isDragging = true; lastMousePos = pos; tl_renderUI(); }
        }

        function handleAnimMouseMove(e) {
            if (isPanning) { panPointerMove(e); return; }
            if (currentStep !== 3 || !isDragging || !selectedNodeId) return;
            e.preventDefault(); const pos = getMousePos(e); 
            let dx = pos.x - lastMousePos.x; let dy = pos.y - lastMousePos.y;
            nodes[selectedNodeId].animX += dx; nodes[selectedNodeId].animY += dy;
            lastMousePos = pos; updateMeshDeformation(); drawAnimatedScene();
        }

        window.addEventListener('mouseup', () => { if (currentStep === 3 && isDragging) tl_addGlobalKeyframe(tl_frame); isDragging = false; });
        canvas.addEventListener('touchstart', e => { e.preventDefault(); currentStep === 2 ? handleRigMouseDown(e) : handleAnimMouseDown(e); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); currentStep === 2 ? handleRigMouseMove(e) : handleAnimMouseMove(e); }, {passive:false});
        window.addEventListener('touchend', () => { if (currentStep === 3 && isDragging) tl_addGlobalKeyframe(tl_frame); isDragging = false; });
        canvas.addEventListener('mousedown', e => currentStep === 2 ? handleRigMouseDown(e) : handleAnimMouseDown(e));
        canvas.addEventListener('mousemove', e => currentStep === 2 ? handleRigMouseMove(e) : handleAnimMouseMove(e));

        function updateMeshDeformation() {
            if (!rootNodeId) return;
            let boneTransforms = {};
            bones.forEach(b => {
                let n1 = nodes[b.p1], n2 = nodes[b.p2];
                let restLen = Math.hypot(n2.x - n1.x, n2.y - n1.y); let animLen = Math.hypot(n2.animX - n1.animX, n2.animY - n1.animY);
                let scale = restLen > 0 ? animLen / restLen : 1;
                let rAngle = Math.atan2(n2.y - n1.y, n2.x - n1.x); let aAngle = Math.atan2(n2.animY - n1.animY, n2.animX - n1.animX);
                boneTransforms[b.id] = { dx: n1.animX, dy: n1.animY, ox: n1.x, oy: n1.y, angle: aAngle - rAngle, scale: scale };
            });
            mesh.vertices.forEach(vert => {
                let finalX = 0, finalY = 0; let totalWeight = 0;
                vert.weights.forEach(bw => {
                    let t = boneTransforms[bw.boneId];
                    if (t) {
                        let lx = vert.u - t.ox; let ly = vert.v - t.oy;
                        let rx = (lx * Math.cos(t.angle) - ly * Math.sin(t.angle)) * t.scale; let ry = (lx * Math.sin(t.angle) + ly * Math.cos(t.angle)) * t.scale;
                        finalX += (rx + t.dx) * bw.w; finalY += (ry + t.dy) * bw.w; totalWeight += bw.w;
                    }
                });
                vert.animX = totalWeight === 0 ? vert.u : finalX; vert.animY = totalWeight === 0 ? vert.v : finalY;
            });
        }

        function drawRigScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (uploadedImage) { ctx.globalAlpha = 0.6; ctx.drawImage(uploadedImage, imgTransform.x, imgTransform.y, imgTransform.w, imgTransform.h); ctx.globalAlpha = 1.0; }
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#9ca3af'; 
            bones.forEach(b => { ctx.beginPath(); ctx.moveTo(nodes[b.p1].x, nodes[b.p1].y); ctx.lineTo(nodes[b.p2].x, nodes[b.p2].y); ctx.stroke(); });
            for (let id in nodes) {
                let isSelected = id === selectedNodeId;
                ctx.beginPath(); ctx.arc(nodes[id].x, nodes[id].y, isSelected ? 6 : 4, 0, Math.PI * 2); 
                ctx.fillStyle = id === rootNodeId ? (isSelected ? '#9333ea' : '#a855f7') : (isSelected ? '#2563eb' : '#3b82f6');
                ctx.fill(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
            }
        }

        function drawTexturedTriangle(img, u0, v0, u1, v1, u2, v2, x0, y0, x1, y1, x2, y2) {
            ctx.save();
            let cx = (x0 + x1 + x2) / 3; let cy = (y0 + y1 + y2) / 3; let pad = 0.6; 
            function dilate(x, y, cx, cy) {
                let dx = x - cx; let dy = y - cy; let dist = Math.hypot(dx, dy);
                if (dist === 0) return {x, y};
                return {x: x + (dx/dist)*pad, y: y + (dy/dist)*pad};
            }
            let p0 = dilate(x0, y0, cx, cy); let p1 = dilate(x1, y1, cx, cy); let p2 = dilate(x2, y2, cx, cy);
            ctx.beginPath(); ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.closePath(); ctx.clip();
            let det = u0 * (v1 - v2) - v0 * (u1 - u2) + (u1 * v2 - u2 * v1);
            if (Math.abs(det) > 0.0001) {
                let a = (x0 * (v1 - v2) - x1 * (v0 - v2) + x2 * (v0 - v1)) / det; let b = (y0 * (v1 - v2) - y1 * (v0 - v2) + y2 * (v0 - v1)) / det;
                let c = -(x0 * (u1 - u2) - x1 * (u0 - u2) + x2 * (u0 - u1)) / det; let d = -(y0 * (u1 - u2) - y1 * (u0 - u2) + y2 * (u0 - u1)) / det;
                let e = (x0 * (u1 * v2 - u2 * v1) - x1 * (u0 * v2 - u2 * v0) + x2 * (u0 * v1 - u1 * v0)) / det; let f = (y0 * (u1 * v2 - u2 * v1) - y1 * (u0 * v2 - u2 * v0) + y2 * (u0 * v1 - u1 * v0)) / det;
                ctx.transform(a, b, c, d, e, f); 
                ctx.imageSmoothingQuality = "high"; ctx.drawImage(img, imgTransform.x, imgTransform.y, imgTransform.w, imgTransform.h);
            }
            ctx.restore();
        }

        function drawAnimatedScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!uploadedImage) return;
            
            // CORREÇÃO: Utilizando a nova função getBoneZ ao invés de buscar osso no objeto nodes.
            const trianglesWithZ = mesh.triangles.map(tri => {
                let totalZ = 0; let totalW = 0;
                tri.forEach(i => { mesh.vertices[i].weights.forEach(w => { totalZ += getBoneZ(w.boneId) * w.w; totalW += w.w; }); });
                return { tri, z: totalW > 0 ? totalZ / totalW : 0 };
            });
            
            trianglesWithZ.sort((a, b) => a.z - b.z);
            trianglesWithZ.forEach(item => {
                let v0 = mesh.vertices[item.tri[0]]; let v1 = mesh.vertices[item.tri[1]]; let v2 = mesh.vertices[item.tri[2]];
                drawTexturedTriangle(uploadedImage, v0.u, v0.v, v1.u, v1.v, v2.u, v2.v, v0.animX, v0.animY, v1.animX, v1.animY, v2.animX, v2.animY);
            });
            if (showMeshGrid) {
                ctx.lineWidth = 0.5; ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                trianglesWithZ.forEach(item => {
                    let v0 = mesh.vertices[item.tri[0]]; let v1 = mesh.vertices[item.tri[1]]; let v2 = mesh.vertices[item.tri[2]];
                    ctx.beginPath(); ctx.moveTo(v0.animX, v0.animY); ctx.lineTo(v1.animX, v1.animY); ctx.lineTo(v2.animX, v2.animY); ctx.closePath(); ctx.stroke();
                });
            }
            if (showSkeletonInAnim) {
                ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(59, 130, 246, 0.6)';
                bones.forEach(b => { ctx.beginPath(); ctx.moveTo(nodes[b.p1].animX, nodes[b.p1].animY); ctx.lineTo(nodes[b.p2].animX, nodes[b.p2].animY); ctx.stroke(); });
                for (let id in nodes) {
                    let isSel = id === selectedNodeId;
                    ctx.beginPath(); ctx.arc(nodes[id].animX, nodes[id].animY, isSel ? 6 : 4, 0, Math.PI * 2);
                    ctx.fillStyle = id === rootNodeId ? '#a855f7' : (isSel?'#60a5fa':'#3b82f6'); 
                    ctx.fill(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
                }
            }
        }

        const btnAdd = document.getElementById('btn-add-node');
        const btnDel = document.getElementById('btn-delete-node');

        function updateToolState() {
            if (isPanMode) { canvas.style.cursor = 'grab'; return; }
            if (isAddingNodeMode) { btnAdd.classList.add('active'); canvas.style.cursor = 'crosshair'; if(currentStep === 2) isDragging = false; } 
            else { btnAdd.classList.remove('active'); canvas.style.cursor = 'default'; }
        }

        btnAdd.addEventListener('click', () => { isAddingNodeMode = !isAddingNodeMode; if (isAddingNodeMode) selectedNodeId = null; updateToolState(); drawRigScene(); });
        btnDel.addEventListener('click', deleteSelectedNode);
        document.getElementById('btn-clear-skeleton').addEventListener('click', clearSkeleton);

        function switchStep(step) {
            currentStep = step;
            [1, 2, 3].forEach(s => document.getElementById(`step${s}`).classList.add('hidden', 'opacity-0'));
            
            setTimeout(() => {
                const target = document.getElementById(`step${step}`); target.classList.remove('hidden');
                setTimeout(() => target.classList.remove('opacity-0'), 10);
            }, 300);
            
            if (tl_isPlaying) tl_togglePlay();
            
            const tlPanel = document.getElementById('timeline-panel');
            const rightSidebar = document.getElementById('right-sidebar');
            
            if (step === 3) { 
                tlPanel.classList.remove('hidden'); tlPanel.classList.add('flex'); 
                rightSidebar.classList.remove('hidden'); rightSidebar.classList.add('flex');
            } else { 
                tlPanel.classList.add('hidden'); tlPanel.classList.remove('flex'); 
                rightSidebar.classList.add('hidden'); rightSidebar.classList.remove('flex');
            }
            
            if (step === 2) { isAddingNodeMode = true; selectedNodeId = null; updateToolState(); drawRigScene(); } 
            else if (step === 3) {
                isDragging = false; prepareAnimation(); buildMesh(); calculateWeights(); 
                tl_init(); updateMeshDeformation(); drawAnimatedScene();
            }
        }

        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImageSrc = event.target.result;
                const img = new Image();
                img.onload = () => {
                    uploadedImage = img; document.getElementById('empty-state').style.display = 'none';
                    const scale = Math.min(700 / img.width, 700 / img.height);
                    imgTransform.w = img.width * scale; imgTransform.h = img.height * scale;
                    imgTransform.x = (800 - imgTransform.w) / 2; imgTransform.y = (800 - imgTransform.h) / 2;
                    clearSkeleton(); switchStep(2);
                };
                img.src = originalImageSrc;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('btn-next-animate').addEventListener('click', () => { if (Object.keys(nodes).length >= 2) switchStep(3); });
        document.getElementById('btn-reupload').addEventListener('click', () => switchStep(1));
        document.getElementById('btn-back-rig').addEventListener('click', () => switchStep(2));
        document.getElementById('toggleSkeleton').addEventListener('change', (e) => { showSkeletonInAnim = e.target.checked; if(currentStep===3 && !tl_isPlaying) drawAnimatedScene(); });
        document.getElementById('toggleMesh').addEventListener('change', (e) => { showMeshGrid = e.target.checked; if(currentStep===3 && !tl_isPlaying) drawAnimatedScene(); });

        document.getElementById('btn-bring-forward').addEventListener('click', () => {
            if (!selectedNodeId || currentStep !== 3) return; nodes[selectedNodeId].zOrder = (nodes[selectedNodeId].zOrder || 0) + 1;
            tl_addGlobalKeyframe(tl_frame); drawAnimatedScene();
        });
        document.getElementById('btn-send-backward').addEventListener('click', () => {
            if (!selectedNodeId || currentStep !== 3) return; nodes[selectedNodeId].zOrder = (nodes[selectedNodeId].zOrder || 0) - 1;
            tl_addGlobalKeyframe(tl_frame); drawAnimatedScene();
        });
    </script>
</body>
