    function imageToDataURL(img) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = img.width;
        tempCanvas.height = img.height;
        tempCanvas.getContext('2d').drawImage(img, 0, 0);
        return tempCanvas.toDataURL('image/png');
    }

    // Suporte a Zoom com o Mouse
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        // Zoom exponencial para maior suavidade
        const factor = Math.exp(-e.deltaY * 0.001);
        
        const r = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - r.left) * (FW / r.width);
        const mouseY = (e.clientY - r.top) * (FH / r.height);

        const oldZoom = camZoom;
        camZoom = Math.max(1, Math.min(10, camZoom * factor));
        if (oldZoom === camZoom) return;
        const k = camZoom / oldZoom;
        
        // Mantém o ponto exato sob o mouse fixo durante o zoom
        const cx = FW / 2, cy = FH / 2;
        camOffset.x = camOffset.x * k + (mouseX - cx) * (1 - k);
        camOffset.y = camOffset.y * k + (mouseY - cy) * (1 - k);

        updateViewSlidersUI();
        draw();
    }, { passive: false });

    async function getMixedAudioBuffer(totalDuration, projectFps) {
        const sampleRate = 48000;
        const offlineCtx = new OfflineAudioContext(2, Math.max(1, Math.round(sampleRate * totalDuration)), sampleRate);

        for (const clip of audioClips) {
            try {
                const response = await fetch(clip.element.src);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await offlineCtx.decodeAudioData(arrayBuffer);

                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineCtx.destination);

                const startTime = (clip.startFrame - 1) / projectFps;
                const durationSeconds = clip.durationFrames / projectFps;
                source.start(startTime, clip.startTimeOffset || 0, durationSeconds);
            } catch (e) {
                console.error("Erro ao processar clipe para exportação:", clip.name, e);
            }
        }
        return await offlineCtx.startRendering();
    }

    function combinedAudioPlanes(buffer, start, length) {
        const combined = new Float32Array(length * buffer.numberOfChannels);
        for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
            combined.set(buffer.getChannelData(ch).subarray(start, start + length), ch * length);
        }
        return combined;
    }

    function loadImage(src) {
        return new Promise((resolve) => {
            if (!src || src === "" || src === "data:,") return resolve(new Image());
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => {
                console.warn("Falha ao carregar imagem, usando placeholder vazio.");
                resolve(new Image());
            };
            img.src = src;
        });
    }

    function getCoords(e) {
        const r = canvas.getBoundingClientRect();
        const rawX = (e.clientX - r.left) * (FW / r.width);
        const rawY = (e.clientY - r.top) * (FH / r.height);
        
        const viewMat = new DOMMatrix();
        viewMat.translateSelf(FW/2 + camOffset.x, FH/2 + camOffset.y);
        viewMat.scaleSelf(camZoom, camZoom);
         viewMat.translateSelf(-FW/2, -FH/2);
         const m = viewMat.multiply(getGlobalMatrix()).inverse();
         const pt = new DOMPoint(rawX, rawY).matrixTransform(m);
         return { x: pt.x, y: pt.y };
     }
 
     // Handlers para Joysticks
     document.getElementById('joy').onpointerdown = (e) => { 
         e.preventDefault(); 
         e.target.setPointerCapture(e.pointerId); 
         draggingJoy = 'head'; 
     };
 
     window.addEventListener('pointermove', (e) => {
         if (draggingJoy && draggingJoy === 'head' && activeLayerIndex !== -1) {
             const l = layers[activeLayerIndex];
             const targetJoy = document.getElementById('joy');
             const rect = targetJoy.getBoundingClientRect();
             const rx = Math.max(-1, Math.min(1, ((e.clientX - rect.left) / rect.width) * 2 - 1));
             const ry = Math.max(-1, Math.min(1, ((e.clientY - rect.top) / rect.height) * 2 - 1));
             l.headRot = { x: rx, y: ry };
             document.getElementById('knob').style.left = (rx + 1) * 40 + "px";
             document.getElementById('knob').style.top = (ry + 1) * 40 + "px";
             updateDeform(l); draw();
         }
     });
 
    canvas.addEventListener('pointerdown', (e) => {
        isMouseDownOnCanvas = true;
        const l = layers[activeLayerIndex];
        const c = getCoords(e);
        const gMat = getGlobalMatrix();
        const visualScale = Math.sqrt(gMat.a * gMat.a + gMat.b * gMat.b) * camZoom;

        if (rigMode === 'head' && l) {
            if (Math.hypot(l.headFocus.x - c.x, l.headFocus.y - c.y) < (60 / visualScale)) {
                dragTarget = { type: 'headFocus' };
            } else {
                l.headFocus = { x: c.x, y: c.y };
                dragTarget = { type: 'headFocus' };
            }
            return;
        }
        if (rigMode === 'exp' && l) {
            let foundIdx = -1;
            l.exprPins.forEach((p, i) => {
                if (Math.hypot(p.x - c.x, p.y - c.y) < (80 / visualScale)) foundIdx = i;
            });
            if (foundIdx !== -1) {
                dragTarget = { type: 'expr', index: foundIdx };
                return;
            }
        }
    });

    canvas.addEventListener('pointermove', (e) => {
        if (isMouseDownOnCanvas && dragTarget) {
             const l = layers[activeLayerIndex];
             const c = getCoords(e);
             if (dragTarget.type === 'headFocus') l.headFocus = { x: c.x, y: c.y };
             else if (dragTarget.type === 'expr') l.exprPins[dragTarget.index] = { x: c.x, y: c.y };
             updateDeform(l); draw();
        }
    });

    canvas.onpointerdown = (e) => {
        // Captura o ponteiro para que o movimento continue mesmo fora do canvas (Pro behavior)
        canvas.setPointerCapture(e.pointerId);
        interactionStartedOnCanvas = true;
        
        const r = canvas.getBoundingClientRect();
        wasTransforming = false;
        // Registra a posição inicial do clique mesmo em modo Pan
        lastRawMousePos = { x: (e.clientX - r.left) * (FW / r.width), y: (e.clientY - r.top) * (FH / r.height) };
        
        // Em tablets, o botão 0 é o toque. 
        if (e.button === 1 || (e.button === 0 && e.altKey) || panMode) return; 

        const c = getCoords(e);
        lastMousePos = c;
        if (isPlaying) togglePlay(); // Pausa para edição precisa ao clicar no canvas

        if (mode.startsWith('g-')) return; // Modos globais não selecionam pins

        // 1. Coleta todos os pins próximos ao clique
        const threshold = (mode === 'add' ? pinVisualSize * 2.4 : pinVisualSize * 3.6);
        let pinCandidates = pins
            .map((p, idx) => ({ p, idx, dist: Math.hypot(p.x - c.x, p.y - c.y) }))
            .filter(item => item.dist < threshold);

        // 2. Ordena por distância e depois por Z (quem está na frente tem prioridade)
        pinCandidates.sort((a, b) => a.dist - b.dist || (b.p.z || 0) - (a.p.z || 0));
        
        let target = pinCandidates.length > 0 ? pinCandidates[0].p : null;

        // 3. Se não clicou em um pin, verifica se clicou em um osso (segmento)
        if (!target && mode !== 'add') {
            let boneCandidates = [];
            pins.forEach((p, idx) => {
                if (p.parentId !== null && pins[p.parentId]) {
                    const parent = pins[p.parentId];
                    const dSeg = distToSegmentSquared(c.x, c.y, parent.x, parent.y, p.x, p.y);
                    if (dSeg < Math.pow(pinVisualSize * 2, 2)) { 
                        boneCandidates.push({ p: parent, dist: dSeg });
                    }
                }
            });
            boneCandidates.sort((a, b) => a.dist - b.dist);
            if (boneCandidates.length > 0) target = boneCandidates[0].p;
        }

        if (mode === 'add') {
            if (target) {
                if (e.shiftKey || isShiftPressed) {
                    const idx = selectedPins.indexOf(target);
                    if (idx > -1) selectedPins.splice(idx, 1);
                    else selectedPins.push(target);
                } else {
                    const lastSelected = selectedPins.length > 0 ? selectedPins[selectedPins.length - 1] : null;
                    // Só cria o vínculo (fecha o pin) se o CTRL estiver pressionado
                    if ((e.ctrlKey || isCtrlPressed) && lastSelected && target !== lastSelected) {
                        target.parentId = pins.indexOf(lastSelected);
                    }
                    selectedPins = [target];
                }
                dragTarget = target;
            } else {
                const lastSelected = selectedPins.length > 0 ? selectedPins[selectedPins.length - 1] : null;
                const newPin = {
                    x: c.x, y: c.y, ox: c.x, oy: c.y, z: 0,
                    radius: currentPinRadius,
                    parentId: (e.shiftKey || isShiftPressed || !lastSelected) ? null : pins.indexOf(lastSelected)
                };
                pins.push(newPin);
                if (e.shiftKey || isShiftPressed) {
                    selectedPins = []; // Ao criar um pino independente, limpamos a seleção para não "grudar" no próximo
                } else {
                    selectedPins = [newPin]; // Continua a corrente normalmente
                }

                keyframes.forEach(kf => {
                    if (kf.layerStates && kf.layerStates[activeLayerIndex]) kf.layerStates[activeLayerIndex].pins.push({ x: newPin.x, y: newPin.y, z: 0, radius: newPin.radius });
                });
            }
        } else {
            if (target) {
                if (e.shiftKey || isShiftPressed) {
                    const idx = selectedPins.indexOf(target);
                    if (idx > -1) selectedPins.splice(idx, 1);
                    else selectedPins.push(target);
                } else {
                    selectedPins = [target]; // Seleciona apenas o pino clicado
                }
                dragTarget = target;
            } else {
                if (!e.shiftKey) selectedPins = [];
            }
        }

        // Sincroniza o slider de influência com o pino selecionado (Update Live)
        if (selectedPins.length > 0) {
            const lastPin = selectedPins[selectedPins.length - 1];
            const r = lastPin.radius || 100;
            const slider = document.getElementById('influence-slider');
            if (slider) slider.value = r;
            currentPinRadius = r;
        }

        draw();
    };

    // Função única e robusta para encerrar qualquer arrasto (Mouse, Touch ou Caneta)
    const stopAllInteractions = (e) => {
        if (draggingJoy) {
            draggingJoy = null;
            setKeyframe(false);
        }

        if (isMouseDownOnCanvas) {
            if (wasTransforming || mode === 'move' || rigMode !== 'none') {
                setKeyframe(false);
            }
            isMouseDownOnCanvas = false;
        }

        // Libera a captura do ponteiro do elemento que a detém
        try {
            if (e && e.target && e.target.releasePointerCapture) {
                e.target.releasePointerCapture(e.pointerId);
            }
        } catch (err) {}

        wasTransforming = false;
        interactionStartedOnCanvas = false;
        dragTarget = null;
        draggedAudioClip = null;
        resizingAudioClip = null;
        draw();
    };

    window.addEventListener('pointerup', stopAllInteractions);
    window.addEventListener('pointercancel', stopAllInteractions);

    window.onpointermove = (e) => {
        const c = getCoords(e);
        const r = canvas.getBoundingClientRect();
        const rawX = (e.clientX - r.left) * (FW / r.width);
        const rawY = (e.clientY - r.top) * (FH / r.height);

        // Panning da Câmera (Botão do meio ou Alt+Click)
        if (e.buttons === 4 || (e.buttons === 1 && (e.altKey || panMode))) {
            // Divide pelo zoom para o movimento ser 1:1 com o mouse na tela
            camOffset.x += (rawX - lastRawMousePos.x) * 2.5 / camZoom;
            camOffset.y += (rawY - lastRawMousePos.y) * 2.5 / camZoom;
            updateViewSlidersUI();
            lastRawMousePos = { x: rawX, y: rawY };
            draw();
            return;
        }

        // Lógica de Transformação Global
        if (interactionStartedOnCanvas && e.buttons === 1) {
            const centerX = FW/2 + gPos.x;
            const centerY = FH/2 + gPos.y;
            if (mode === 'g-move') {
                // Move o objeto considerando o zoom da câmera para manter a precisão
                const dx = (rawX - lastRawMousePos.x) / camZoom;
                const dy = (rawY - lastRawMousePos.y) / camZoom;
                
                gPos.x += dx;
                gPos.y += dy;
                wasTransforming = true;
                syncActiveLayer();
                draw();
            } else if (mode === 'g-rotate') {
                // Usa coordenadas RAW para evitar o tremor (sem interferência da própria rotação)
                const a1 = Math.atan2(lastRawMousePos.y - centerY, lastRawMousePos.x - centerX);
                const a2 = Math.atan2(rawY - centerY, rawX - centerX);
                let da = a2 - a1;
                
                // Normaliza o delta para evitar saltos de 360º ao cruzar a linha de 180º (PI)
                if (da > Math.PI) da -= 2 * Math.PI;
                if (da < -Math.PI) da += 2 * Math.PI;
                
                gRotation += da;
                wasTransforming = true;
                syncActiveLayer();
                draw();
            } else if (mode === 'g-scale') {
                const dist1 = Math.hypot(lastRawMousePos.x - centerX, lastRawMousePos.y - centerY);
                const dist2 = Math.hypot(rawX - centerX, rawY - centerY);
                if (dist1 > 20) {
                    gScale *= (dist2 / dist1);
                    wasTransforming = true;
                    gScale = Math.max(0.01, Math.min(100, gScale));
                }
                syncActiveLayer();
                draw();
            }
        }

        // Lógica de Hover para feedback visual
        const threshold = (mode === 'add' ? pinVisualSize * 2.4 : pinVisualSize * 3.6);
        const lastHover = hoveredPin;
        hoveredPin = null;
        let minDist = threshold;
        pins.forEach(p => {
            const d = Math.hypot(p.x - c.x, p.y - c.y);
            if (d < minDist) { minDist = d; hoveredPin = p; }
        });

        canvas.style.cursor = hoveredPin ? 'pointer' : 'crosshair';
        if (lastHover !== hoveredPin) draw();

        // LÓGICA DE RIG (TRANSLAÇÃO HIERÁRQUICA + ROTAÇÃO POR ATALHO)
        if (mode === 'move' && dragTarget) {
            // Usar o delta do mouse (lastMousePos) garante fluidez absoluta.
            const dx = c.x - lastMousePos.x;
            const dy = c.y - lastMousePos.y;

            // Se Shift estiver pressionado, move apenas o ponto individual (ideal para criar perspectiva)
            // Se não, move o ponto e toda a sua hierarquia de descendentes
            if (e.shiftKey || isShiftPressed) {
                dragTarget.x += dx;
                dragTarget.y += dy;
            } else {
                movePinAndChildren(dragTarget, dx, dy);
            }
            
            const l = (activeLayerIndex !== -1 && activeLayerIndex !== 'bg') ? layers[activeLayerIndex] : null;
            updateDeform(l);
            wasTransforming = true;
            syncActiveLayer();
            draw();
        }

        if (draggedAudioClip) {
            const dx = e.clientX - audioDragStartX;
            const dy = e.clientY - audioDragStartY;
            
            const frameDelta = Math.round(dx / FRAME_WIDTH);
            const laneDelta = Math.round(dy / 30);

            draggedAudioClip.startFrame = Math.max(1, audioInitialStartFrame + frameDelta);
            draggedAudioClip.lane = Math.max(0, audioInitialLane + laneDelta);
            updateTimelineVisual();
        }

        if (resizingAudioClip) {
            const dx = e.clientX - audioResizeStartX;
            const fps = getFps();
            const frameDelta = Math.round(dx / FRAME_WIDTH);

            if (resizeSide === 'right') {
                resizingAudioClip.durationFrames = Math.max(1, initialResizeDuration + frameDelta);
            } else {
                const possibleDelta = Math.min(frameDelta, initialResizeDuration - 1);
                resizingAudioClip.startFrame = Math.max(1, audioInitialStartFrame + possibleDelta);
                resizingAudioClip.durationFrames = initialResizeDuration - possibleDelta;
                resizingAudioClip.startTimeOffset = (initialResizeTimeOffset || 0) + (possibleDelta / fps);
            }
            updateTotalFrames();
            updateTimelineVisual();
        }
        
        lastMousePos = c;
        lastRawMousePos = { x: rawX, y: rawY };
    
    };

    

    // Função recursiva para mover toda a hierarquia
    // Mantemos a função original para transladar (mover) a raiz que não tem pai
function movePinAndChildren(parent, dx, dy, visited = new Set()) {
    if (visited.has(parent)) return;
    visited.add(parent);

    parent.x += dx;
    parent.y += dy;
    const pIdx = pins.indexOf(parent);
    pins.forEach(p => {
        if (p.parentId === pIdx) {
            movePinAndChildren(p, dx, dy, visited);
        }
    });
}


    function deleteAllPins() {
        if (activeLayerIndex === -1 || activeLayerIndex === 'bg') return;
        
        const l = layers[activeLayerIndex];
        if (!l) return;

        if (selectedPins.length > 0) {
            // Se houver seleção, apaga apenas os pins selecionados
            const indicesToRemove = selectedPins
                .map(p => l.pins.indexOf(p))
                .filter(idx => idx !== -1)
                .sort((a, b) => b - a);

            indicesToRemove.forEach(idx => {
                // 1. Atualiza a hierarquia: se um pin tem como pai o pin que será deletado, 
                // ele fica órfão. Se o pai tiver um índice maior, decrementamos para manter a referência.
                l.pins.forEach(p => {
                    if (p.parentId === idx) p.parentId = null;
                    else if (p.parentId > idx) p.parentId--;
                });

                // 2. Remove do array da camada ativa
                l.pins.splice(idx, 1);

                // 3. Remove das poses de todos os keyframes existentes
                keyframes.forEach(kf => {
                    if (kf.layerStates && kf.layerStates[activeLayerIndex]) {
                        kf.layerStates[activeLayerIndex].pins.splice(idx, 1);
                    }
                });
            });
        } else {
            // Se não houver nada selecionado, apaga todos os pins da camada
            l.pins.length = 0;
            keyframes.forEach(kf => {
                if (kf.layerStates && kf.layerStates[activeLayerIndex]) {
                    kf.layerStates[activeLayerIndex].pins = [];
                }
            });

            if (l.mesh) {
                l.mesh.forEach(m => { m.x = m.ox; m.y = m.oy; });
            }
        }

        pins = l.pins; 
        selectedPins = [];
        hoveredPin = null;
        dragTarget = null;

        // Recalcula deformação MLS ou reseta mesh se sobrarem poucos pins
        if (l.pins.length >= 2) {
            updateDeform(l);
        } else if (l.mesh) {
            l.mesh.forEach(m => { m.x = m.ox; m.y = m.oy; });
        }

        draw();
    }

    // Funções auxiliares para cálculo de osso (segmento)
    function distToSegmentSquared(px, py, x1, y1, x2, y2) {
        const l2 = (x2 - x1) ** 2 + (y2 - y1) ** 2;
        if (l2 === 0) return (px - x1) ** 2 + (py - y1) ** 2;
        let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
        t = Math.max(0, Math.min(1, t));
        return (px - (x1 + t * (x2 - x1))) ** 2 + (py - (y1 + t * (y2 - y1))) ** 2;
    }

    function getProjectionFactor(px, py, x1, y1, x2, y2) {
        const l2 = (x2 - x1) ** 2 + (y2 - y1) ** 2;
        if (l2 === 0) return 0;
        let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
        return Math.max(0, Math.min(1, t));
    }

   

function updateDeform(targetLayer) {
    const l = targetLayer || layers[activeLayerIndex];
    if (!l || l.isFolder || !l.mesh || l.mesh.length === 0) return;

    const pins = l.pins || [];
    if (pins.length === 0) {
        l.mesh.forEach(m => { m.x = m.ox; m.y = m.oy; });
        return;
    }

    // ====================== PASS 1: Face Rig ======================
    const hRad = Math.max(50, l.headRadius || 220);
    const hRot = l.headRot || {x:0, y:0};
    const eRot = l.eyeRot || {x:0, y:0};
    const fHead = l.headFocus || {x: l.assets[0]?.img?.width/2 || FW/2, y: l.assets[0]?.img?.height/3 || FH/3};
    const v = l.exprValues || {};
    const exprPins = l.exprPins || [];

    const mouthRotRad = (v.mouthRot || 0) * Math.PI / 180;
    const stretchFactor = 1 + (v.stretch || 0);

    l.mesh.forEach(m => {
        let tx = m.ox, ty = m.oy;

        let maxEyeWeight = 0, blinkShift = 0, blinkExpand = 0, mouthShiftY = 0, browShiftY = 0;

        exprPins.forEach((exp, idx) => {
            const edx = m.ox - exp.x;
            const edy = m.oy - exp.y;
            const edist = Math.hypot(edx, edy);

            if (idx < 2 && edist < (v.pinRad || 45)) {
                const weight = Math.pow(Math.max(0, 1 - edist / (v.pinRad || 45)), 0.5);
                if (weight > maxEyeWeight) {
                    maxEyeWeight = weight;
                    const isUpper = (m.oy < exp.y);
                    const blinkVal = isUpper ? (v.blinkTop ?? 0) : (v.blinkBottom ?? 0);
                    blinkShift = (exp.y - m.oy) * blinkVal * weight * 1.7;
                    blinkExpand = edx * blinkVal * weight * 0.4;
                }
            } else if (idx === 2) { // Boca
                const mouthRad = v.mouthRad || 30;
                const distC = Math.hypot(m.ox - exp.x, m.oy - exp.y);
                const wC = Math.max(0, 1 - distC / (mouthRad * 2.2));
                const smoothC = 3 * wC * wC - 2 * wC * wC * wC;

                const smileVal = v.smile || 0;
                const openVal = v.open || 0;
                mouthShiftY += (-smileVal * 20 * smoothC) + (openVal * (m.oy > exp.y ? 32 : 8) * smoothC);

                // Stretch (Largura)
                if (Math.abs(v.stretch || 0) > 0.05) {
                    const dx = m.ox - exp.x;
                    tx += dx * (stretchFactor - 1) * smoothC * 1.1;
                }

                // Rotação da Boca
                if (mouthRotRad !== 0 && distC < mouthRad * 2.8) {
                    const dx = m.ox - exp.x;
                    const dy = m.oy - exp.y;
                    const rx = dx * Math.cos(mouthRotRad) - dy * Math.sin(mouthRotRad);
                    const ry = dx * Math.sin(mouthRotRad) + dy * Math.cos(mouthRotRad);
                    tx += (rx - dx) * smoothC * 0.95;
                    ty += (ry - dy) * smoothC * 0.95;
                }
            } else if (idx >= 3 && idx <= 6 && edist < (v.browRad || 15)) {
                const w = Math.pow(Math.max(0, 1 - edist / (v.browRad || 15)), 0.7);
                browShiftY += (-(v.browH || 0) * w) + (((idx === 4 || idx === 5) ? 1 : -1) * (v.browT || 0) * 20 * w);
            }
        });

        tx += (eRot.x * 95 * maxEyeWeight) + blinkExpand;
        ty += (eRot.y * 70 * maxEyeWeight) + blinkShift + mouthShiftY + browShiftY;

        // Cabeça 3D
        const dxH = tx - fHead.x;
        const dyH = ty - fHead.y;
        const distH = Math.hypot(dxH, dyH);
        const normDist = Math.min(1, distH / hRad);
        const headInf = normDist < 1 ? (1 - (3 * normDist**2 - 2 * normDist**3)) : 0;

        tx += hRot.x * 140 * headInf;
        ty += hRot.y * 100 * headInf;

        m.tx = tx;
        m.ty = ty;
    });

    // ====================== PASS 2: MLS Global Inteligente (estilo Meta AI) ======================
    const pinsData = pins.map(p => ({
        ...p,
        radius: p.radius || 140,           // Influência global maior
        radiusSq: Math.pow(p.radius || 140, 2),
        hasParent: p.parentId !== null && pins[p.parentId],
        parent: p.parentId !== null ? pins[p.parentId] : null
    }));

    l.mesh.forEach(m => {
        let sumW = 0;
        let weights = new Array(pinsData.length);
        let pStar = {x: 0, y: 0};
        let qStar = {x: 0, y: 0};

        for (let i = 0; i < pinsData.length; i++) {
            const pin = pinsData[i];
            let distSq = pin.hasParent 
                ? distToSegmentSquared(m.ox, m.oy, pin.parent.ox, pin.parent.oy, pin.ox, pin.oy)
                : (m.ox - pin.ox)**2 + (m.oy - pin.oy)**2;

            let w = 0;
            if (distSq < pin.radiusSq * 1.8) {                    // Influência mais ampla
                const ratio = Math.sqrt(distSq) / pin.radius;
                w = Math.pow(Math.max(0, 1 - ratio), 4.2) / (distSq + 0.0001); // Falloff mais suave
            }

            weights[i] = w;
            sumW += w;

            if (w > 0) {
                if (pin.hasParent) {
                    const t = getProjectionFactor(m.ox, m.oy, pin.parent.ox, pin.parent.oy, pin.ox, pin.oy);
                    const px = pin.parent.ox + t * (pin.ox - pin.parent.ox);
                    const py = pin.parent.oy + t * (pin.oy - pin.parent.oy);
                    const qx = pin.parent.x + t * (pin.x - pin.parent.x);
                    const qy = pin.parent.y + t * (pin.y - pin.parent.y);

                    pStar.x += w * px; pStar.y += w * py;
                    qStar.x += w * qx; qStar.y += w * qy;
                } else {
                    pStar.x += w * pin.ox; pStar.y += w * pin.oy;
                    qStar.x += w * pin.x;   qStar.y += w * pin.y;
                }
            }
        }

        if (sumW < 0.00001) {
            m.x = m.tx || m.ox;
            m.y = m.ty || m.oy;
            return;
        }

        pStar.x /= sumW; pStar.y /= sumW;
        qStar.x /= sumW; qStar.y /= sumW;

        let M11 = 0, M12 = 0;
        const tx = m.tx || m.ox;
        const ty = m.ty || m.oy;

        for (let i = 0; i < pinsData.length; i++) {
            const w = weights[i];
            if (w <= 0) continue;
            const pin = pinsData[i];

            let px, py, qx, qy;
            if (pin.hasParent) {
                const t = getProjectionFactor(m.ox, m.oy, pin.parent.ox, pin.parent.oy, pin.ox, pin.oy);
                px = (pin.parent.ox + t * (pin.ox - pin.parent.ox)) - pStar.x;
                py = (pin.parent.oy + t * (pin.oy - pin.parent.oy)) - pStar.y;
                qx = (pin.parent.x + t * (pin.x - pin.parent.x)) - qStar.x;
                qy = (pin.parent.y + t * (pin.y - pin.parent.y)) - qStar.y;
            } else {
                px = pin.ox - pStar.x;
                py = pin.oy - pStar.y;
                qx = pin.x - qStar.x;
                qy = pin.y - qStar.y;
            }

            M11 += w * (px * qx + py * qy);
            M12 += w * (px * qy - py * qx);
        }

        const mag = Math.hypot(M11, M12) || 0.0001;
        const cos = M11 / mag;
        const sin = M12 / mag;

        const dx = tx - pStar.x;
        const dy = ty - pStar.y;

        m.x = qStar.x + (dx * cos - dy * sin);
        m.y = qStar.y + (dx * sin + dy * cos);
    });

    // Relaxamento forte (suavidade Meta AI)
    const GRID1 = GRID + 1;
    for (let it = 0; it < 8; it++) {
        for (let i = 0; i < l.mesh.length; i++) {
            const xIdx = i % GRID1;
            const yIdx = Math.floor(i / GRID1);
            if (xIdx > 0 && xIdx < GRID && yIdx > 0 && yIdx < GRID) {
                const n1 = i-1, n2 = i+1, n3 = i-GRID1, n4 = i+GRID1;
                const ax = (l.mesh[n1].x + l.mesh[n2].x + l.mesh[n3].x + l.mesh[n4].x) / 4;
                const ay = (l.mesh[n1].y + l.mesh[n2].y + l.mesh[n3].y + l.mesh[n4].y) / 4;

                const factor = it < 4 ? 0.45 : 0.26;
                l.mesh[i].x += (ax - l.mesh[i].x) * factor;
                l.mesh[i].y += (ay - l.mesh[i].y) * factor;
            }
        }
    }
}




function draw(showUI = true, targetCtx = ctx, ignoreBg = false) {
    targetCtx.clearRect(0, 0, FW, FH);
    
    const viewMat = new DOMMatrix();
    viewMat.translateSelf(FW/2 + camOffset.x, FH/2 + camOffset.y);
    viewMat.scaleSelf(camZoom, camZoom); // Apply camera zoom
    viewMat.translateSelf(-FW/2, -FH/2);

    if (activeBgAssetIndex !== -1 && bgAssets[activeBgAssetIndex] && bgVisible && !ignoreBg) {
        const asset = bgAssets[activeBgAssetIndex];
        const currentBg = asset.img;
        const contentWidth = currentBg.width;
        const contentHeight = currentBg.height;

        if (currentBg && currentBg.width > 0) {
            const fitScale = Math.max(FW / contentWidth, FH / contentHeight);
            targetCtx.save();
            targetCtx.setTransform(viewMat);
            targetCtx.translate(FW / 2 + bgTransform.gPos.x, FH / 2 + bgTransform.gPos.y);
            targetCtx.rotate(bgTransform.gRotation);
            targetCtx.scale(fitScale * bgTransform.gScale, fitScale * bgTransform.gScale);
            targetCtx.drawImage(currentBg, -contentWidth / 2, -contentHeight / 2);
            targetCtx.restore();
        }
    }

    if (layers.length === 0) return;
    targetCtx.imageSmoothingEnabled = true;
    targetCtx.imageSmoothingQuality = 'high';

    const allTriangles = [];

    layers.forEach((l, idx) => {
        if (!isLayerVisible(l) || l.isFolder) return;

        let refImg = l.assets[0]?.img;
        if (!refImg || !refImg.width) return;
        const assetIdx = (l.activeAssetIndex >= 0 && l.activeAssetIndex < l.assets.length) ? l.activeAssetIndex : 0;
        let currentImg = l.assets[assetIdx]?.img;
        if (!currentImg) return;
        const contentWidth = currentImg.width;
        const contentHeight = currentImg.height;

        const gMat = computeLayerMatrix(l);
        const fitScale = Math.min(FW / contentWidth, FH / contentHeight);
        gMat.translateSelf(FW / 2, FH / 2);
        gMat.scaleSelf(fitScale, fitScale);
        gMat.translateSelf(-contentWidth / 2, -contentHeight / 2);

        const finalGMat = viewMat.multiply(gMat); // Apply camera view matrix to layer's global matrix

        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
                const i = y * (GRID + 1) + x;
                const triA = [l.mesh[i], l.mesh[i + 1], l.mesh[i + GRID + 1]];
                const triB = [l.mesh[i + 1], l.mesh[i + GRID + 2], l.mesh[i + GRID + 1]];

                [triA, triB].forEach(tri => {
                            const centerX = (tri[0].ox + tri[1].ox + tri[2].ox) / 3;
                            const centerY = (tri[0].oy + tri[1].oy + tri[2].oy) / 3;
                            let sumZ = 0;
                            let sumW = 0;
                            const expoenteZ = 3.0; // Falloff mais forte para Z-sorting local

                            l.pins.forEach((p, pIdx) => {
                                let distSq;
                                let rSq = (p.radius || 100) ** 2;
                                let interpZ = p.z || 0;

                                if (p.parentId !== null && l.pins[p.parentId]) {
                                    const parent = l.pins[p.parentId];
                                    distSq = distToSegmentSquared(centerX, centerY, parent.ox, parent.oy, p.ox, p.oy);
                                    const t = getProjectionFactor(centerX, centerY, parent.ox, parent.oy, p.ox, p.oy);
                                    const interpRadius = (parent.radius || 100) * (1 - t) + (p.radius || 100) * t;
                                    rSq = interpRadius * interpRadius;
                                    interpZ = (parent.z || 0) * (1 - t) + (p.z || 0) * t;
                                } else {
                                    distSq = (centerX - p.ox) ** 2 + (centerY - p.oy) ** 2;
                                }

                                if (distSq < rSq) {
                                    let w = Math.pow(1 - (distSq / rSq), expoenteZ);
                                    sumZ += interpZ * w;
                                    sumW += w;
                                }
                            });

                            const pinZ = (l.z || 0) + (sumW > 0.001 ? (sumZ / sumW) : 0);
                            allTriangles.push({ tri, z: (pinZ * 100) + (idx * 0.01), gMat: finalGMat, img: currentImg, refImg });
                        });
            }
        }
    });

    allTriangles.sort((a, b) => a.z - b.z).forEach(item => {
        renderT(item.tri[0], item.tri[1], item.tri[2], item.gMat, item.img, targetCtx, item.refImg);
    });

   

    if (showUI) {
        // Feedback visual para seleção do Background
        if (activeLayerIndex === 'bg' && activeBgAssetIndex !== -1 && bgAssets[activeBgAssetIndex] && mode.startsWith('g-')) {
            const asset = bgAssets[activeBgAssetIndex];
            const contentWidth = asset.img.width;
            const contentHeight = asset.img.height;
            const fitScale = Math.max(FW / contentWidth, FH / contentHeight);
            const gMat = new DOMMatrix();
            gMat.translateSelf(FW / 2 + bgTransform.gPos.x, FH / 2 + bgTransform.gPos.y);
            gMat.rotateSelf(bgTransform.gRotation * 180 / Math.PI);
            gMat.scaleSelf(fitScale * bgTransform.gScale, fitScale * bgTransform.gScale);
            gMat.translateSelf(-contentWidth / 2, -contentHeight / 2);
            const finalGMat = viewMat.multiply(gMat);
            drawUI([], finalGMat, targetCtx, true, contentWidth, contentHeight);
        }

        layers.forEach((l, idx) => {
            if (!isLayerVisible(l) || l.isFolder) return;
            if (idx === activeLayerIndex || activeLayerIndex === -1) {
                const contentWidth = l.assets[0].img.width;
                const contentHeight = l.assets[0].img.height;
                const layerBaseMat = computeLayerMatrix(l);
                const gMat = new DOMMatrix(layerBaseMat);
                gMat.translateSelf(FW / 2, FH / 2);
                const fitScale = Math.min(FW / contentWidth, FH / contentHeight);
                gMat.scaleSelf(fitScale, fitScale);
                gMat.translateSelf(-contentWidth / 2, -contentHeight / 2);
                const finalGMat = viewMat.multiply(gMat);
                const isMedia = false; // No more video/image sequence layers
                drawUI(l.pins, finalGMat, targetCtx, isMedia, contentWidth, contentHeight);
            }
        });
    }
}

       



function drawUI(lPins, gMat, targetCtx = ctx, isMedia = false, width = 0, height = 0) {
    targetCtx.save();
    targetCtx.setTransform(gMat);

    const l = (activeLayerIndex !== -1 && activeLayerIndex !== 'bg') ? layers[activeLayerIndex] : null;
    if (!l || l.isFolder) {
        targetCtx.restore();
        return;
    }

    const s = Math.sqrt(gMat.a * gMat.a + gMat.b * gMat.b);

    const neonGreen = "#00ff88";
    const neonBright = "#00ffcc";
    const neonCyan = "#00ffff";

    const v = l.exprValues || { pinRad: 45, mouthRad: 30, browRad: 15 };
    const exprPins = l.exprPins || [];

    // ====================== FACE RIG - SEMPRE FORTE E VISÍVEL ======================
    if ((rigMode === 'head' || rigMode === 'exp') && showPins) {

        // 1. CÍRCULO DA CABEÇA
        if (l.headFocus) {
            targetCtx.beginPath();
            targetCtx.arc(l.headFocus.x, l.headFocus.y, (l.headRadius || 220), 0, Math.PI * 2);
            targetCtx.strokeStyle = neonGreen;
            targetCtx.lineWidth = 7 / s;
            targetCtx.setLineDash([8, 5]);
            targetCtx.stroke();
            targetCtx.setLineDash([]);

            targetCtx.fillStyle = "#ffffff";
            targetCtx.beginPath();
            targetCtx.arc(l.headFocus.x, l.headFocus.y, 9 / s, 0, Math.PI * 2);
            targetCtx.fill();
        }

        // 2. ÁREA DA BOCA
        if (exprPins.length >= 3) {
            const m = exprPins[2];
            
            // Círculo da boca
            targetCtx.beginPath();
            targetCtx.arc(m.x, m.y, (v.mouthRad || 30) * 1.4, 0, Math.PI * 2);
            targetCtx.strokeStyle = neonGreen;
            targetCtx.lineWidth = 5 / s;
            targetCtx.stroke();

            // Círculo interno
            targetCtx.beginPath();
            targetCtx.arc(m.x, m.y, v.mouthRad || 30, 0, Math.PI * 2);
            targetCtx.strokeStyle = neonBright;
            targetCtx.lineWidth = 3.5 / s;
            targetCtx.stroke();

            // Curva da boca
            const mouthW = (v.mouthRad || 30) * (1 + Math.abs(v.stretch || 0) * 0.6);
            const smileOffset = (v.smile || 0) * 30;

            targetCtx.save();
            targetCtx.translate(m.x, m.y);
            targetCtx.rotate((v.mouthRot || 0) * Math.PI / 180);
            targetCtx.beginPath();
            targetCtx.moveTo(-mouthW, 0);
            targetCtx.bezierCurveTo(-mouthW*0.7, smileOffset, mouthW*0.7, smileOffset, mouthW, 0);
            targetCtx.strokeStyle = neonBright;
            targetCtx.lineWidth = 5 / s;
            targetCtx.stroke();
            targetCtx.restore();
        }

        // 3. OLHOS
        if (exprPins.length >= 2) {
            [0, 1].forEach(i => {
                const p = exprPins[i];
                targetCtx.beginPath();
                targetCtx.arc(p.x, p.y, v.pinRad || 45, 0, Math.PI * 2);
                targetCtx.strokeStyle = neonCyan;
                targetCtx.lineWidth = 4 / s;
                targetCtx.stroke();
            });
        }

        // ====================== SOBRANCELHAS - APENAS 2 RISQUINHOS ======================
        if (exprPins.length >= 7) {
            targetCtx.strokeStyle = neonGreen;
            targetCtx.lineWidth = 6.5 / s;        // Mais grosso e visível
            targetCtx.lineCap = "round";

            // Sobrancelha Esquerda (pontos 3 e 4)
            targetCtx.beginPath();
            targetCtx.moveTo(exprPins[3].x, exprPins[3].y);
            targetCtx.lineTo(exprPins[4].x, exprPins[4].y);
            targetCtx.stroke();

            // Sobrancelha Direita (pontos 5 e 6)
            targetCtx.beginPath();
            targetCtx.moveTo(exprPins[5].x, exprPins[5].y);
            targetCtx.lineTo(exprPins[6].x, exprPins[6].y);
            targetCtx.stroke();

            // Pequenos círculos nos extremos para melhor visualização
            targetCtx.fillStyle = neonBright;
            [3,4,5,6].forEach(i => {
                targetCtx.beginPath();
                targetCtx.arc(exprPins[i].x, exprPins[i].y, 5 / s, 0, Math.PI * 2);
                targetCtx.fill();
            });
        }

        // 5. Labels dos pins da face (mantido)
        const labels = ["OLHO ESQ", "OLHO DIR", "BOCA", "SOBR ESQ", "SOBR ESQ", "SOBR DIR", "SOBR DIR"];
        exprPins.forEach((p, i) => {
            const rad = i < 2 ? (v.pinRad || 45) : (i === 2 ? (v.mouthRad || 30) : (v.browRad || 15));
            
            targetCtx.beginPath();
            targetCtx.arc(p.x, p.y, rad, 0, Math.PI * 2);
            targetCtx.strokeStyle = neonGreen;
            targetCtx.lineWidth = 3 / s;
            targetCtx.stroke();

            targetCtx.fillStyle = "#ffffff";
            targetCtx.beginPath();
            targetCtx.arc(p.x, p.y, 7 / s, 0, Math.PI * 2);
            targetCtx.fill();

            targetCtx.fillStyle = neonBright;
            targetCtx.font = `bold ${Math.round(13 / s)}px Arial`;
            targetCtx.textAlign = "center";
            targetCtx.fillText(labels[i] || "PIN", p.x, p.y - (24 / s));
        });
    }

    // ====================== PINS DO CORPO ======================
    lPins.forEach(p => {
        const isSelected = selectedPins.includes(p);
        const isHovered = (p === hoveredPin);
        if (!showPins && !isSelected && !isHovered) return;

        const alpha = (isSelected || isHovered) ? 1.0 : 0.13;

        targetCtx.globalAlpha = alpha;

        if (isSelected || isHovered) {
            targetCtx.beginPath();
            targetCtx.arc(p.x, p.y, p.radius || 100, 0, Math.PI * 2);
            targetCtx.strokeStyle = neonGreen;
            targetCtx.lineWidth = 3.5 / s;
            targetCtx.setLineDash([6, 4]);
            targetCtx.stroke();
            targetCtx.setLineDash([]);
        }

        targetCtx.beginPath();
        targetCtx.arc(p.x, p.y, pinVisualSize * 0.9, 0, Math.PI * 2);
        targetCtx.fillStyle = isSelected ? "#ffffff" : neonBright;
        targetCtx.fill();
        targetCtx.strokeStyle = "#000";
        targetCtx.lineWidth = 2 / s;
        targetCtx.stroke();

        targetCtx.globalAlpha = 1;
    });

    targetCtx.restore();
}





    function renderT(p1, p2, p3, gMat, lImg, targetCtx = ctx, refImg) {
        // Coordenadas de Origem (Textura)
        const u0 = p1.ox, v0 = p1.oy, u1 = p2.ox, v1 = p2.oy, u2 = p3.ox, v2 = p3.oy;
        
        // Transformação de matriz manual (Screen Space)
        // Mais rápido que instanciar DOMPoint milhares de vezes por frame
        const x0 = p1.x * gMat.a + p1.y * gMat.c + gMat.e;
        const y0 = p1.x * gMat.b + p1.y * gMat.d + gMat.f;
        const x1 = p2.x * gMat.a + p2.y * gMat.c + gMat.e;
        const y1 = p2.x * gMat.b + p2.y * gMat.d + gMat.f;
        const x2 = p3.x * gMat.a + p3.y * gMat.c + gMat.e;
        const y2 = p3.x * gMat.b + p3.y * gMat.d + gMat.f;

        // Determinante para o mapeamento afim
        const det = (u1 - u0) * (v2 - v0) - (u2 - u0) * (v1 - v0);
        if (Math.abs(det) < 0.1) return;

        targetCtx.save();
        
        // --- CORREÇÃO DO QUADRICULADO (Overlap Fix) ---
        // Expandimos os vértices levemente para fora do centro para criar uma pequena 
        // sobreposição (overlap) entre os triângulos, eliminando frestas de sub-pixel.
        const epsilon = 1.4; // Aumentado para compensar a suavização da malha
        const cx = (x0 + x1 + x2) / 3;
        const cy = (y0 + y1 + y2) / 3;

        const x0e = x0 + (x0 - cx) * (epsilon / (Math.hypot(x0 - cx, y0 - cy) || 1));
        const y0e = y0 + (y0 - cy) * (epsilon / (Math.hypot(x0 - cx, y0 - cy) || 1));
        const x1e = x1 + (x1 - cx) * (epsilon / (Math.hypot(x1 - cx, y1 - cy) || 1));
        const y1e = y1 + (y1 - cy) * (epsilon / (Math.hypot(x1 - cx, y1 - cy) || 1));
        const x2e = x2 + (x2 - cx) * (epsilon / (Math.hypot(x2 - cx, y2 - cy) || 1));
        const y2e = y2 + (y2 - cy) * (epsilon / (Math.hypot(x2 - cx, y2 - cy) || 1));

        targetCtx.beginPath();
        targetCtx.moveTo(x0e, y0e);
        targetCtx.lineTo(x1e, y1e);
        targetCtx.lineTo(x2e, y2e);
        targetCtx.closePath();
        targetCtx.clip();

        // --- MATEMÁTICA AFIM 2D ESTÁVEL ---
        // Calcula os coeficientes da matriz que mapeia (u, v) -> (screen x, screen y)
        const a = ((x1 - x0) * (v2 - v0) - (x2 - x0) * (v1 - v0)) / det;
        const b = ((y1 - y0) * (v2 - v0) - (y2 - y0) * (v1 - v0)) / det;
        const c = ((x2 - x0) * (u1 - u0) - (x1 - x0) * (u2 - u0)) / det;
        const d = ((y2 - y0) * (u1 - u0) - (y1 - y0) * (u2 - u0)) / det;
        const f_x = x0 - a * u0 - c * v0;
        const f_y = y0 - b * u0 - d * v0;

        // Aplica a transformação diretamente no contexto do Canvas
        // Isso garante que a imagem rotacione como um objeto plano comum
        targetCtx.setTransform(a, b, c, d, f_x, f_y);
        // Força a imagem atual a preencher o espaço da imagem de referência para manter o sync
        targetCtx.drawImage(lImg, 0, 0, refImg.width, refImg.height);
        targetCtx.restore();
    }

    function reset() { 
        location.reload();
    }

    function switchRightTab(tabName) {
        document.querySelectorAll('.right-tab-content').forEach(content => {
            content.style.display = 'none';
        });
        document.querySelectorAll('.panel-tab').forEach(tab => {
            tab.classList.remove('active');
        });
        
        if (tabName === 'layers') {
            document.getElementById('section-layers').style.display = 'flex';
            document.getElementById('tab-layers').classList.add('active');
        } else if (tabName === 'poses') {
            document.getElementById('section-poses').style.display = 'flex';
            document.getElementById('tab-poses').classList.add('active');
        }
    }

    // Inicialização do sistema para corrigir os bugs de interface inicial
    updateTimelineVisual(); // Renderiza os números e a régua da timeline
    seek(1);               // Posiciona a linha vermelha (playhead) no frame 1
    updateViewSlidersUI();  // Inicializa os sliders da câmera
    updateLayersUI();      // Garante que a lista de camadas esteja pronta
    draw();                // Renderiza o canvas inicial
</script>
